version: '3.8'

# ============================================
# DEVELOPMENT OVERRIDE CONFIGURATION
# Copy to docker-compose.override.yml
# ============================================

services:
  app:
    build:
      target: development
    environment:
      - NODE_ENV=development
      - APP_DEBUG=true
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./tests:/app/tests
    command: npm run dev

  # Adminer for database management
  adminer:
    image: adminer:latest
    container_name: arsip-surat-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: database
    depends_on:
      - database
    networks:
      - arsip-network

  # Mail testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: arsip-surat-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    networks:
      - arsip-network
