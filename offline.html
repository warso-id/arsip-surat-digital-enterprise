<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a56db">
    <title>Offline - Arsip Surat Digital Enterprise</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0 New("#764ba2") 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .offline-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .offline-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        h1 { color: #1f2937; margin-bottom: 10px; }
        p { color: #6b7280; margin-bottom: 20px; }
        .status { color: #ef4444; font-weight: 600; margin-bottom: 20px; }
        .btn {
            display: inline-block;
            background: #1a56db;
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 16px;
        }
        .btn:hover { background: #1e40af; }
        .retry-text { margin-top: 20px; font-size: 14px; color: #9ca3af; }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="offline-icon">📡</div>
        <h1>Anda Sedang Offline</h1>
        <p class="status">⚠️ Tidak terhubung ke internet</p>
        <p>Maaf, koneksi internet Anda terputus. Silakan coba lagi saat sudah terhubung.</p>
        <button class="btn" onclick="location.reload()">🔄 Coba Lagi</button>
        <p class="retry-text">Mencoba menghubungkan kembali secara otomatis...</p>
    </div>
    
    <script>
        // Auto-retry every 10 seconds
        setInterval(() => {
            fetch('./').then(response => {
                if (response.ok) location.reload();
            }).catch(() => {});
        }, 10000);
        
        // Reload when coming online
        window.addEventListener('online', () => location.reload());
    </script>
</body>
</html>
