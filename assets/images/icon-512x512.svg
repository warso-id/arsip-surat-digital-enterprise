<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8"/>
      <stop offset="50%" style="stop-color:#4285f4"/>
      <stop offset="100%" style="stop-color:#1a73e8"/>
    </linearGradient>
    <filter id="shadow512">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg512)"/>
  
  <!-- Decorative circles -->
  <circle cx="128" cy="128" r="64" fill="rgba(255,255,255,0.1)"/>
  <circle cx="384" cy="384" r="96" fill="rgba(255,255,255,0.05)"/>
  <circle cx="400" cy="100" r="32" fill="rgba(255,255,255,0.08)"/>
  
  <!-- Document icon -->
  <g transform="translate(156,120)" filter="url(#shadow512)">
    <!-- Document body -->
    <rect x="0" y="0" width="200" height="260" rx="16" fill="white" opacity="0.95"/>
    
    <!-- Folded corner -->
    <path d="M160 0 L200 0 L200 40 L160 40 Z" fill="#e8f0fe"/>
    <path d="M160 0 L200 40 L160 40 Z" fill="#d2e3fc"/>
    
    <!-- Lines -->
    <rect x="30" y="60" width="140" height="16" rx="4" fill="#1a73e8" opacity="0.9"/>
    <rect x="30" y="90" width="120" height="12" rx="4" fill="#5f6368" opacity="0.6"/>
    <rect x="30" y="114" width="150" height="12" rx="4" fill="#5f6368" opacity="0.6"/>
    <rect x="30" y="138" width="100" height="12" rx="4" fill="#5f6368" opacity="0.6"/>
    
    <!-- More lines -->
    <rect x="30" y="164" width="140" height="8" rx="4" fill="#dadce0" opacity="0.7"/>
    <rect x="30" y="182" width="130" height="8" rx="4" fill="#dadce0" opacity="0.7"/>
    <rect x="30" y="200" width="145" height="8" rx="4" fill="#dadce0" opacity="0.7"/>
    <rect x="30" y="218" width="110" height="8" rx="4" fill="#dadce0" opacity="0.7"/>
    
    <!-- Checkmark stamp -->
    <circle cx="140" cy="180" r="30" fill="#34a853" opacity="0.9"/>
    <path d="M125 180 L135 190 L155 170" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Floating elements -->
  <g opacity="0.6">
    <!-- Envelope -->
    <g transform="translate(120,340) rotate(-15)">
      <rect x="0" y="0" width="80" height="56" rx="8" fill="white"/>
      <path d="M0 0 L40 30 L80 0" fill="none" stroke="#1a73e8" stroke-width="3"/>
    </g>
    
    <!-- Checkmark badge -->
    <g transform="translate(380,320) rotate(10)">
      <circle cx="30" cy="30" r="30" fill="#34a853"/>
      <path d="M18 30 L26 38 L42 22" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
  
  <!-- Enterprise text -->
  <text x="256" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" opacity="0.9">
    ENTERPRISE
  </text>
  
  <!-- Version badge -->
  <rect x="356" y="450" width="100" height="30" rx="15" fill="rgba(255,255,255,0.2)"/>
  <text x="406" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.8">
    v2026.1
  </text>
</svg>
