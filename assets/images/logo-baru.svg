<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60">
    <defs>
        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#007bff;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0056b3;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <!-- Icon -->
    <rect x="5" y="5" width="50" height="50" rx="10" fill="url(#logoGrad)"/>
    <rect x="15" y="15" width="30" height="30" rx="3" fill="white" opacity="0.9"/>
    <line x1="20" y1="22" x2="40" y2="22" stroke="#007bff" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="28" x2="35" y2="28" stroke="#007bff" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="34" x2="30" y2="34" stroke="#007bff" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Text -->
    <text x="65" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#007bff">
        ARSIP SURAT
    </text>
    <text x="65" y="48" font-family="Arial, sans-serif" font-size="10" fill="#6c757d">
        DIGITAL ENTERPRISE
    </text>
</svg>
