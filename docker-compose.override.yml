version: '3.8'

services:
  app:
    build:
      target: development
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - APP_DEBUG=true
    command: npm run dev

  mysql:
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword

  redis:
    ports:
      - "6379:6379"

  # Adminer for database management
  adminer:
    image: adminer:latest
    container_name: arsip_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - arsip_network

  # Mailhog for email testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: arsip_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - arsip_network
