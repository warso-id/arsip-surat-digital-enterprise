<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Cek File 404</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a2e; color: #eee; }
        .ok { color: #10b981; }
        .error { color: #ef4444; }
        .checking { color: #f59e0b; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border: 1px solid #333; text-align: left; }
        th { background: #16213e; }
    </style>
</head>
<body>
    <h1>🔍 Cek File 404 - Arsip Surat Digital</h1>
    <p>Base URL: <code id="baseUrl"></code></p>
    
    <table>
        <thead>
            <tr>
                <th>No</th>
                <th>File</th>
                <th>Status</th>
                <th>Response</th>
            </tr>
        </thead>
        <tbody id="results">
            <tr><td colspan="4">Memeriksa...</td></tr>
        </tbody>
    </table>

    <div id="summary" style="margin-top:20px;"></div>

    <script>
        const baseUrl = window.location.origin + window.location.pathname.replace('check-files.html', '');
        document.getElementById('baseUrl').textContent = baseUrl;

        const filesToCheck = [
            // Root files
            '',
            'index.html',
            'manifest.json',
            'service-worker.js',
            'version.json',
            'offline.html',
            'robots.txt',
            'sitemap.xml',
            '.htaccess',
            
            // CSS
            'src/public/css/app.css',
            'src/public/css/landing.css',
            'src/public/css/auth.css',
            'src/public/css/dashboard.css',
            
            // JS
            'src/public/js/app.js',
            'src/public/js/landing.js',
            'src/public/js/dashboard.js',
            
            // Images
            'src/public/images/logo.svg',
            'src/public/images/favicon.svg',
            
            // Fonts
            'src/public/fonts/fonts.css',
            
            // Source files
            'src/app.js',
            'src/models/Surat.js',
            'src/controllers/SuratController.js',
            'src/routes/api.js',
            'src/config/database.js',
            
            // GitHub specific
            '.github/workflows/deploy.yml',
            'README.md',
            'LICENSE',
            'CHANGELOG.md'
        ];

        async function checkFiles() {
            const tbody = document.getElementById('results');
            tbody.innerHTML = '';
            
            let okCount = 0;
            let errorCount = 0;
            
            for (let i = 0; i < filesToCheck.length; i++) {
                const file = filesToCheck[i];
                const url = baseUrl + file;
                
                // Show checking status
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${i + 1}</td>
                    <td>${file || '(root)'}</td>
                    <td class="checking">⏳ Memeriksa...</td>
                    <td>-</td>
                `;
                
                try {
                    const response = await fetch(url, { method: 'HEAD' });
                    
                    if (response.ok) {
                        row.cells[2].className = 'ok';
                        row.cells[2].textContent = `✅ ${response.status} OK`;
                        row.cells[3].textContent = `${(response.headers.get('content-length') || 0)} bytes`;
                        okCount++;
                    } else {
                        row.cells[2].className = 'error';
                        row.cells[2].textContent = `❌ ${response.status} ${response.statusText}`;
                        row.cells[3].textContent = 'File tidak ditemukan';
                        errorCount++;
                    }
                } catch (error) {
                    row.cells[2].className = 'error';
                    row.cells[2].textContent = `❌ ERROR`;
                    row.cells[3].textContent = error.message;
                    errorCount++;
                }
            }
            
            // Summary
            document.getElementById('summary').innerHTML = `
                <h2>📊 Ringkasan</h2>
                <p class="ok">✅ OK: ${okCount} file</p>
                <p class="error">❌ Error/404: ${errorCount} file</p>
                <p>Total dicek: ${filesToCheck.length} file</p>
                ${errorCount === 0 ? '<p class="ok">🎉 Semua file tersedia!</p>' : '<p class="error">⚠️ Ada file yang perlu diperbaiki!</p>'}
            `;
        }

        checkFiles();
    </script>
</body>
</html>
