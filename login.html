<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login - Arsip Surat Digital Enterprise v30.1.0">
    <meta name="theme-color" content="#1976D2">
    <title>Login - Arsip Surat Digital Enterprise v30.1.0</title>
    
    <style>
        :root {
            --primary: #1976D2;
            --primary-dark: #1565C0;
            --bg: #F0F4F8;
            --surface: #FFFFFF;
            --text: #212121;
            --text-secondary: #757575;
            --border: #E0E0E0;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
            --radius: 16px;
            --radius-sm: 10px;
            --font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        [data-theme="dark"] {
            --bg: #0F172A;
            --surface: #1E293B;
            --text: #F1F5F9;
            --text-secondary: #94A3B8;
            --border: #334155;
            --shadow: 0 4px 20px rgba(0,0,0,0.3);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-family);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
            padding: 20px;
        }

        .bg-pattern {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(25,118,210,0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(38,166,154,0.05) 0%, transparent 50%),
                radial-gradient(circle at 50% 20%, rgba(255,112,67,0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, var(--primary), #42A5F5);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 8px 24px rgba(25,118,210,0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 8px 24px rgba(25,118,210,0.3); }
            50% { box-shadow: 0 12px 32px rgba(25,118,210,0.5); }
        }

        .app-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
        }

        .app-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .login-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 32px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
        }

        .login-card h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }

        .login-card .welcome-text {
            text-align: center;
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: var(--text-secondary);
            pointer-events: none;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 14px 12px 44px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: var(--font-family);
            background: var(--bg);
            color: var(--text);
            transition: all 0.3s;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(25,118,210,0.1);
            background: var(--surface);
        }

        .input-wrapper input::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: var(--text-secondary);
            padding: 4px;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--primary);
        }

        .forgot-password {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: var(--font-family);
            position: relative;
            overflow: hidden;
        }

        .btn-login:hover {
            box-shadow: 0 6px 20px rgba(25,118,210,0.4);
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-login .btn-text { display: inline; }
        .btn-login .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }

        .btn-login.loading .btn-text { display: none; }
        .btn-login.loading .spinner { display: block; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(244,67,54,0.08);
            color: #F44336;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            border: 1px solid rgba(244,67,54,0.2);
        }

        .error-message.show {
            display: block;
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .biometric-section {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .btn-biometric {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 25px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            transition: all 0.3s;
            font-family: var(--font-family);
        }

        .btn-biometric:hover {
            border-color: var(--primary);
            background: rgba(25,118,210,0.05);
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .feature-item {
            text-align: center;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .feature-item .feature-icon {
            font-size: 20px;
            display: block;
            margin-bottom: 4px;
        }

        .version {
            text-align: center;
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 20px;
            opacity: 0.7;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            z-index: 9999;
            animation: slideIn 0.3s;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }

        .toast.success { background: #4CAF50; }
        .toast.error { background: #F44336; }
        .toast.info { background: #2196F3; }
        .toast.warning { background: #FF9800; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .quick-login-info {
            background: rgba(25,118,210,0.05);
            border: 1px dashed rgba(25,118,210,0.3);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            margin-top: 16px;
            font-size: 11px;
            color: var(--text-secondary);
            text-align: center;
        }

        @media (max-width: 480px) {
            .login-card { padding: 24px 20px; }
            .logo { width: 64px; height: 64px; font-size: 32px; }
            .app-title { font-size: 18px; }
            .features { gap: 16px; }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    
    <div class="login-container">
        <div class="logo-section">
            <div class="logo">📄</div>
            <h1 class="app-title">Arsip Surat Digital</h1>
            <p class="app-subtitle">Enterprise v30.1.0 | AI Powered</p>
        </div>
        
        <div class="login-card">
            <h2>👋 Selamat Datang</h2>
            <p class="welcome-text">Silakan login untuk mengakses sistem</p>
            
            <div class="error-message" id="errorMessage"></div>
            
            <form id="loginForm" onsubmit="return false;">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <span class="icon">👤</span>
                        <input 
                            type="text" 
                            id="username" 
                            name="username" 
                            placeholder="Masukkan username" 
                            required 
                            autocomplete="username"
                            autofocus
                        >
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <span class="icon">🔒</span>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Masukkan password" 
                            required 
                            autocomplete="current-password"
                        >
                        <button type="button" class="password-toggle" onclick="togglePassword()" title="Tampilkan password">
                            👁️
                        </button>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>Ingat saya</span>
                    </label>
                    <a class="forgot-password" onclick="forgotPassword()">Lupa password?</a>
                </div>
                
                <button type="button" class="btn-login" id="btnLogin" onclick="handleLogin()">
                    <span class="btn-text">🔐 Masuk</span>
                    <span class="spinner"></span>
                </button>
            </form>
            
            <div class="biometric-section" id="biometricSection" style="display:none;">
                <button class="btn-biometric" onclick="loginWithBiometric()">
                    <span>🖐️</span>
                    <span>Login dengan Fingerprint / Face ID</span>
                </button>
            </div>
            
            <div class="quick-login-info">
                ℹ️ Hubungi <strong>Administrator</strong> jika belum memiliki akun.
            </div>
        </div>
        
        <div class="features">
            <div class="feature-item">
                <span class="feature-icon">🤖</span>
                AI Smart Search
            </div>
            <div class="feature-item">
                <span class="feature-icon">🔗</span>
                Blockchain
            </div>
            <div class="feature-item">
                <span class="feature-icon">🔐</span>
                Biometric
            </div>
            <div class="feature-item">
                <span class="feature-icon">🎤</span>
                Voice
            </div>
            <div class="feature-item">
                <span class="feature-icon">🌙</span>
                Dark Mode
            </div>
        </div>
        
        <div class="version">
            Arsip Surat Digital Enterprise v30.1.0 &copy; 2026
        </div>
    </div>
    
    <div id="toastContainer"></div>

    <script>
        // ========== KONFIGURASI ==========
        const API_URL = 'https://script.google.com/macros/s/AKfycbxhx4JXI_yX9MIEhYmSVAjxy-_9McM0-2WKzA2OvW4h8T9QT2nh5bJcio0KiWEyL4VRsQ/exec';
        
        // ========== INISIALISASI ==========
        (function() {
            console.log('🚀 Login v30.1.0 initializing...');
            console.log('🔗 API URL:', API_URL);
            
            // Cek apakah sudah login
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            
            if (token && user) {
                console.log('✅ Token ditemukan, verifikasi...');
                verifyTokenAndRedirect(token);
            } else {
                console.log('ℹ️ Belum login, tampilkan form');
            }
            
            // Load saved username
            const savedUsername = localStorage.getItem('savedUsername');
            if (savedUsername) {
                document.getElementById('username').value = savedUsername;
                document.getElementById('rememberMe').checked = true;
            }
            
            // Cek biometric
            checkBiometricAvailability();
            
            // Apply theme
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            
        })();
        
        // ========== VERIFIKASI TOKEN ==========
        async function verifyTokenAndRedirect(token) {
            try {
                const url = API_URL + '?action=me&token=' + encodeURIComponent(token);
                console.log('🔍 Verifikasi token ke:', url);
                
                const response = await fetch(url);
                const data = await response.json();
                console.log('📥 Response verifikasi:', data);
                
                if (data.status === 'success' && data.data) {
                    console.log('✅ Token valid, redirect ke dashboard');
                    // Update user data di localStorage
                    localStorage.setItem('user', JSON.stringify(data.data));
                    // Redirect ke index.html
                    window.location.replace('/index.html');
                } else {
                    console.log('❌ Token tidak valid, hapus storage');
                    // Token expired atau invalid
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    showToast('Sesi telah berakhir, silakan login kembali', 'warning');
                }
            } catch (error) {
                console.error('❌ Error verifikasi token:', error);
                // Jika network error, biarkan user tetap login (offline mode)
                if (!navigator.onLine) {
                    console.log('⚠️ Offline, gunakan data cached');
                    window.location.replace('/index.html');
                } else {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                }
            }
        }
        
        // ========== HANDLE LOGIN ==========
        async function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const btnLogin = document.getElementById('btnLogin');
            const errorMessage = document.getElementById('errorMessage');
            
            // Validasi
            if (!username) {
                showError('Username harus diisi');
                document.getElementById('username').focus();
                return;
            }
            if (!password) {
                showError('Password harus diisi');
                document.getElementById('password').focus();
                return;
            }
            
            // Show loading
            btnLogin.classList.add('loading');
            btnLogin.disabled = true;
            hideError();
            
            console.log('🔐 Mencoba login dengan username:', username);
            
            try {
                const url = API_URL + '?action=login';
                console.log('📤 POST ke:', url);
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        username: username, 
                        password: password 
                    })
                });
                
                const data = await response.json();
                console.log('📥 Response login:', data);
                
                if (data.status === 'success' && data.data && data.data.token) {
                    console.log('✅ Login berhasil');
                    
                    // SIMPAN TOKEN & USER - SAMA SEPERTI DI INDEX.HTML
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('user', JSON.stringify(data.data.user));
                    
                    // Simpan username jika remember me
                    if (rememberMe) {
                        localStorage.setItem('savedUsername', username);
                    } else {
                        localStorage.removeItem('savedUsername');
                    }
                    
                    // Tambahkan flag biometric untuk testing
                    localStorage.setItem('hasBiometric', 'true');
                    
                    showToast('✅ Login berhasil! Mengalihkan...', 'success');
                    
                    // Blockchain log
                    logBlockchainLogin(data.data.user);
                    
                    // Redirect ke dashboard
                    setTimeout(() => {
                        window.location.replace('/index.html');
                    }, 500);
                    
                } else if (data.status === 'error' && data.code === 401) {
                    showError('Username atau password salah');
                } else {
                    showError(data.message || 'Login gagal, silakan coba lagi');
                }
                
            } catch (error) {
                console.error('❌ Login error:', error);
                
                if (!navigator.onLine) {
                    showError('Tidak ada koneksi internet. Periksa koneksi Anda.');
                    // Coba offline login
                    attemptOfflineLogin(username, password);
                } else {
                    showError('Gagal terhubung ke server. Silakan coba lagi.');
                }
            } finally {
                btnLogin.classList.remove('loading');
                btnLogin.disabled = false;
            }
        }
        
        // ========== OFFLINE LOGIN ==========
        function attemptOfflineLogin(username, password) {
            const cachedUser = localStorage.getItem('user');
            const cachedToken = localStorage.getItem('token');
            
            if (cachedUser && cachedToken) {
                try {
                    const user = JSON.parse(cachedUser);
                    if (user.username === username) {
                        showToast('⚠️ Mode offline - menggunakan data tersimpan', 'warning');
                        setTimeout(() => {
                            window.location.replace('/index.html');
                        }, 1000);
                        return;
                    }
                } catch (e) {}
            }
            
            showError('Tidak dapat login offline. Diperlukan koneksi internet untuk login pertama kali.');
        }
        
        // ========== BLOCKCHAIN LOG ==========
        function logBlockchainLogin(user) {
            try {
                let chain = JSON.parse(localStorage.getItem('bc_chain') || '[]');
                if (chain.length === 0) {
                    chain = [{ index: 0, hash: '0', prevHash: '0', data: 'Genesis v30.1.0' }];
                }
                
                const prev = chain[chain.length - 1];
                const blockData = JSON.stringify({
                    action: 'LOGIN',
                    user: user.username,
                    role: user.role,
                    timestamp: new Date().toISOString()
                });
                
                let hash = 0;
                const str = (prev.index + 1) + JSON.stringify(blockData) + prev.hash;
                for (let i = 0; i < str.length; i++) {
                    const char = str.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash |= 0;
                }
                
                const block = {
                    index: prev.index + 1,
                    timestamp: new Date().toISOString(),
                    data: blockData,
                    prevHash: prev.hash,
                    hash: Math.abs(hash).toString(16)
                };
                
                chain.push(block);
                localStorage.setItem('bc_chain', JSON.stringify(chain));
                console.log('🔗 Blockchain login recorded');
            } catch (e) {
                console.log('Blockchain log error:', e);
            }
        }
        
        // ========== BIOMETRIC ==========
        async function checkBiometricAvailability() {
            try {
                if (window.PublicKeyCredential) {
                    document.getElementById('biometricSection').style.display = 'block';
                    console.log('✅ Biometric tersedia');
                }
            } catch (error) {
                console.log('Biometric tidak tersedia');
            }
        }
        
        async function loginWithBiometric() {
            const credentialId = localStorage.getItem('biometricCredentialId');
            
            if (!credentialId) {
                showToast('⚠️ Belum ada biometric terdaftar. Login dengan username/password terlebih dahulu.', 'info');
                return;
            }
            
            showToast('🔐 Memindai biometric...', 'info');
            
            try {
                const publicKey = {
                    challenge: new Uint8Array(32),
                    rpId: window.location.hostname,
                    allowCredentials: [{
                        id: Uint8Array.from(atob(credentialId), c => c.charCodeAt(0)),
                        type: 'public-key',
                    }],
                    userVerification: 'required',
                    timeout: 30000,
                };
                
                const assertion = await navigator.credentials.get({ publicKey });
                
                if (assertion) {
                    const token = localStorage.getItem('token');
                    if (token) {
                        // Verify with backend
                        const url = API_URL + '?action=biometric.verify&token=' + encodeURIComponent(token) + '&credentialId=' + encodeURIComponent(credentialId);
                        const response = await fetch(url);
                        const data = await response.json();
                        
                        if (data.status === 'success') {
                            showToast('✅ Biometric verified! Mengalihkan...', 'success');
                            setTimeout(() => {
                                window.location.replace('/index.html');
                            }, 500);
                        } else {
                            showToast('❌ Biometric gagal, silakan gunakan password', 'error');
                        }
                    } else {
                        showToast('⚠️ Silakan login dengan password terlebih dahulu', 'warning');
                    }
                }
            } catch (error) {
                console.error('Biometric error:', error);
                showToast('❌ Biometric error: ' + error.message, 'error');
            }
        }
        
        // ========== TOGGLE PASSWORD ==========
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleBtn = document.querySelector('.password-toggle');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                toggleBtn.textContent = '👁️';
            }
        }
        
        // ========== FORGOT PASSWORD ==========
        function forgotPassword() {
            showToast('ℹ️ Hubungi Administrator untuk reset password', 'info');
        }
        
        // ========== UI HELPERS ==========
        function showError(message) {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = '❌ ' + message;
            errorMessage.classList.add('show');
            
            errorMessage.style.animation = 'none';
            errorMessage.offsetHeight;
            errorMessage.style.animation = 'shake 0.4s';
        }
        
        function hideError() {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.classList.remove('show');
            errorMessage.textContent = '';
        }
        
        function showToast(message, type = 'info') {
            // Hapus toast yang sudah ada
            document.querySelectorAll('.toast').forEach(t => {
                t.style.opacity = '0';
                setTimeout(() => t.remove(), 300);
            });
            
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;
            
            const iconMap = {
                success: '✅',
                error: '❌',
                warning: '⚠️',
                info: 'ℹ️'
            };
            
            toast.textContent = (iconMap[type] || '') + ' ' + message;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        // ========== KEYBOARD SHORTCUTS ==========
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleLogin();
            }
        });
        
        // ========== ENTER KEY PADA FORM ==========
        document.getElementById('username').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('password').focus();
            }
        });
        
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleLogin();
            }
        });
        
        console.log('✅ Login.html v30.1.0 - SINKRON DENGAN INDEX.HTML');
        console.log('📋 Token akan disimpan di localStorage dengan key: token');
        console.log('📋 User akan disimpan di localStorage dengan key: user');
        console.log('🔗 Redirect ke: /index.html setelah login sukses');
    </script>
</body>
</html>
