    <style>
        /* ============ CSS RESET & VARIABLES ============ */
        :root {
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            --font-mono: 'SF Mono', 'Fira Code', 'Fira Mono', monospace;
            --primary: #1a56db;
            --primary-dark: #1e40af;
            --primary-light: #3b82f6;
            --secondary: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #1f2937;
            --light: #f9fafb;
            --lighter: #ffffff;
            --border: #e5e7eb;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.3);
            --radius: 12px;
            --radius-lg: 24px;
            --transition: all 0.3s ease;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255,255,255,0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(255,255,255,0.06) 0%, transparent 50%);
            animation: bgFloat 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(1deg); }
            66% { transform: translate(-20px, 20px) rotate(-1deg); }
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
            backdrop-filter: blur(4px);
        }
        
        .loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .loading-spinner {
            background: white;
            padding: 30px 40px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            text-align: center;
        }
        
        .spinner-circle {
            width: 48px;
            height: 48px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: var(--secondary);
            font-size: 14px;
            font-weight: 500;
        }
        
        /* Auth Container */
        .auth-container {
            width: 100%;
            max-width: 460px;
            position: relative;
            z-index: 1;
        }
        
        /* Auth Card */
        .auth-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 40px;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Auth Header */
        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .auth-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(26, 86, 219, 0.3);
            transition: transform 0.3s;
        }
        
        .auth-logo:hover {
            transform: scale(1.05) rotate(-5deg);
        }
        
        .auth-header h1 {
            font-size: 24px;
            color: var(--dark);
            margin-bottom: 6px;
            font-weight: 800;
        }
        
        .auth-header p {
            color: var(--secondary);
            font-size: 14px;
        }
        
        .system-version {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 8px;
        }
        
        /* Form Styles */
        .auth-form .form-group {
            margin-bottom: 20px;
        }
        
        .auth-form label {
            display: block;
            margin-bottom: 8px;
            color: var(--dark);
            font-weight: 600;
            font-size: 14px;
        }
        
        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .input-icon {
            position: absolute;
            left: 14px;
            font-size: 18px;
            z-index: 1;
            pointer-events: none;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px 14px 14px 44px;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            font-size: 15px;
            font-family: var(--font-sans);
            transition: var(--transition);
            background: var(--light);
            color: var(--dark);
        }
        
        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(26, 86, 219, 0.1);
        }
        
        .input-group input.error {
            border-color: var(--danger);
            background: #fef2f2;
        }
        
        .input-group input.success {
            border-color: var(--success);
            background: #f0fdf4;
        }
        
        .error-message {
            color: var(--danger);
            font-size: 12px;
            margin-top: 4px;
            display: none;
            animation: fadeIn 0.3s;
        }
        
        .error-message.show {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }

        .toggle-password {
            position: absolute;
            right: 14px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: var(--secondary);
            padding: 4px;
            transition: var(--transition);

        .toggle-password:hover {

            transform: scale(1.1);

        /* Form Options */
        .form-options {
            display: flex;

            font-size: 13px;

            position: relative;
            overflow: hidden;

        .btn-submit::before {

            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        
        .btn-submit:hover:not(:disabled) {

            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
        }
        
        .btn-submit:hover:not(:disabled)::before {
            left: 100%;
        }
        
        .btn-submit:active:not(:disabled) {
            transform: translateY(0);
        }
        
        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        
        .btn-submit.loading .btn-spinner {
            display: inline-block;
        }
        
        .btn-submit.loading .btn-text {
            display: none;
        }
        
        /* Alert Messages */
        .alert {
            padding: 14px 16px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
            animation: fadeIn 0.3s ease;
            border-left: 4px solid;
        }
        
        .alert.show {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border-color: var(--danger);
        }
        
        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border-color: var(--success);
        }
        
        .alert-warning {
            background: #fef3c7;
            color: #92400e;
            border-color: var(--warning);
        }
        
        .alert-info {
            background: #dbeafe;
            color: #1e40af;
            border-color: var(--primary);
        }
        
        .alert-close {
            margin-left: auto;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: inherit;
            opacity: 0.6;
            padding: 0 4px;
        }
        
        .alert-close:hover {
            opacity: 1;
        }
        
        /* Auth Footer */
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--secondary);
        }
        
        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }
        
        .auth-footer a:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }
        
        /* Back Home Link */
        .back-home {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        
        .back-home:hover {

        }
        
        /* Connection Status */
        .connection-status {
            text-align: center;
            margin-top: 16px;
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }
        
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }
        
        .status-dot.online {
            background: var(--success);
        }
        
        .status-dot.offline {
            background: var(--danger);
        }
        
        .status-dot.connecting {
            background: var(--warning);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* ============ RESPONSIVE ============ */
        @media (max-width: 480px) {
            .auth-card {

            }

            }

            }
            
            .form-options {

                gap: 12px;
                align-items: flex-start;
            }
            
            .input-group input {
                padding: 12px 12px 12px 40px;
                font-size: 14px;
            }
        }
    </style>

    <script>
        // ==================== GOOGLE APPS SCRIPT CONFIGURATION ====================
        const GAS_CONFIG = {
            // Google Apps Script Web App URL
            BASE_URL: 'https://script.google.com/macros/s/AKfycbwblauw29Cv8rmrjQHhfXgdl0csBHlxO3xvZJimyBsSyA4F5f9qH25Ej5QYIu--OGy6Bw/exec',
            
            // API Version
            API_VERSION: 'v2.1.0',
            
            // Request timeout (ms)
            TIMEOUT: 30000,
            
            // Retry attempts
            MAX_RETRIES: 3,
            
            // Retry delay (ms)
            RETRY_DELAY: 1000,
            
            // ==================== BASE64 ENCODING/DECODING ====================
            /**
             * Encode string to Base64 (UTF-8 safe)
             * @param {string} str - String to encode
             * @returns {string} Base64 encoded string
             */
            encodeBase64(str) {
                try {
                    // Handle Unicode characters properly
                    const utf8Bytes = new TextEncoder().encode(str);
                    let binary = '';
                    utf8Bytes.forEach(byte => {
                        binary += String.fromCharCode(byte);
                    });
                    return btoa(binary);
                } catch (error) {
                    console.error('Base64 encode error:', error);
                    // Fallback to basic btoa
                    try {
                        return btoa(unescape(encodeURIComponent(str)));
                    } catch (e) {
                        console.error('Base64 fallback encode error:', e);
                        return null;
                    }
                }
            },
            
            /**
             * Decode Base64 string to UTF-8
             * @param {string} str - Base64 encoded string
             * @returns {string} Decoded string
             */
            decodeBase64(str) {
                try {
                    const binary = atob(str);
                    const bytes = new Uint8Array(binary.length);
                    for (let i = 0; i < binary.length; i++) {
                        bytes[i] = binary.charCodeAt(i);
                    }
                    return new TextDecoder().decode(bytes);
                } catch (error) {
                    console.error('Base64 decode error:', error);
                    // Fallback
                    try {
                        return decodeURIComponent(escape(atob(str)));
                    } catch (e) {
                        console.error('Base64 fallback decode error:', e);
                        return null;
                    }
                }
            },
            
            /**
             * Create a secure payload with Base64 encoding
             * @param {Object} data - Data to encode
             * @returns {Object} Encoded payload
             */
            createPayload(data) {
                const timestamp = new Date().toISOString();
                const nonce = this.generateNonce();
                
                const payload = {
                    version: this.API_VERSION,
                    timestamp: timestamp,
                    nonce: nonce,
                    data: data
                };
                
                // Encode entire payload to Base64
                const jsonString = JSON.stringify(payload);
                const encodedData = this.encodeBase64(jsonString);
                
                return {
                    encoded: encodedData,
                    checksum: this.generateChecksum(encodedData),
                    timestamp: timestamp
                };
            },
            
            /**
             * Generate random nonce for security
             * @returns {string} Random nonce
             */
            generateNonce() {
                const array = new Uint8Array(16);
                crypto.getRandomValues(array);
                return Array.from(array, byte => byte.toString(16).padStart(2, '0')).join('');
            },
            
            /**
             * Generate checksum for data integrity
             * @param {string} data - Data to checksum
             * @returns {string} Checksum
             */
            generateChecksum(data) {
                let hash = 0;
                for (let i = 0; i < data.length; i++) {
                    const char = data.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash = hash & hash; // Convert to 32-bit integer
                }
                return Math.abs(hash).toString(16);
            },
            
            /**
             * Build API URL with parameters
             * @param {string} action - API action
             * @param {Object} params - Request parameters
             * @returns {string} Full URL
             */
            buildUrl(action, params = {}) {
                const baseUrl = this.BASE_URL;
                const separator = baseUrl.includes('?') ? '&' : '?';
                
                // Create payload
                const payload = this.createPayload(params);
                
                // Build URL parameters
                const urlParams = new URLSearchParams();
                urlParams.append('action', action);
                urlParams.append('payload', payload.encoded);
                urlParams.append('checksum', payload.checksum);
                urlParams.append('_t', Date.now()); // Cache buster
                
                return `${baseUrl}${separator}${urlParams.toString()}`;
            },
            
            /**
             * Make API call with retry logic
             * @param {string} action - API action
             * @param {Object} params - Request parameters
             * @param {Object} options - Fetch options
             * @returns {Promise<Object>} API response
             */
            async call(action, params = {}, options = {}) {
                let lastError = null;
                
                for (let attempt = 1; attempt <= this.MAX_RETRIES; attempt++) {
                    try {
                        const url = this.buildUrl(action, params);
                        
                        const controller = new AbortController();
                        const timeoutId = setTimeout(() => controller.abort(), this.TIMEOUT);
                        
                        const response = await fetch(url, {
                            method: options.method || 'GET',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-Requested-With': 'XMLHttpRequest',
                                'X-API-Version': this.API_VERSION,
                                ...options.headers
                            },
                            signal: controller.signal,
                            ...options.fetchOptions
                        });
                        
                        clearTimeout(timeoutId);
                        
                        if (!response.ok) {
                            throw new Error(`HTTP Error: ${response.status} ${response.statusText}`);
                        }
                        
                        // Try to parse response
                        const contentType = response.headers.get('content-type');
                        let data;
                        
                        if (contentType && contentType.includes('application/json')) {
                            data = await response.json();
                        } else {
                            const text = await response.text();
                            // Try to decode Base64 response
                            try {
                                const decoded = this.decodeBase64(text);
                                data = JSON.parse(decoded);
                            } catch {
                                data = { raw: text };
                            }
                        }
                        
                        // Verify response
                        if (data && data.success !== undefined) {
                            return data;
                        }
                        
                        return { success: true, data: data };
                        
                    } catch (error) {
                        lastError = error;
                        console.warn(`API call attempt ${attempt}/${this.MAX_RETRIES} failed:`, error.message);
                        
                        if (attempt < this.MAX_RETRIES) {
                            // Wait before retry with exponential backoff
                            await new Promise(resolve => 
                                setTimeout(resolve, this.RETRY_DELAY * Math.pow(2, attempt - 1))
                            );
                        }
                    }
                }
                
                throw lastError || new Error('All API call attempts failed');
            },
            
            /**
             * Test connection to Google Apps Script
             * @returns {Promise<Object>} Connection test result
             */
            async testConnection() {
                try {
                    const result = await this.call('ping', {}, { 
                        method: 'GET',
                        fetchOptions: { mode: 'cors' }
                    });
                    return { 
                        connected: true, 
                        latency: result.latency || 0,
                        version: result.version || 'unknown'
                    };
                } catch (error) {
                    return { 
                        connected: false, 
                        error: error.message 
                    };
                }
            }
        };

        // ==================== AUTHENTICATION SERVICE ====================
        const AuthService = {
            /**
             * Login user
             * @param {string} email - User email
             * @param {string} password - User password
             * @param {boolean} remember - Remember me flag
             * @returns {Promise<Object>} Login result
             */
            async login(email, password, remember = false) {
                try {
                    // Encode credentials with Base64
                    const encodedCredentials = GAS_CONFIG.encodeBase64(
                        JSON.stringify({
                            email: email,
                            password: password
                        })
                    );
                    
                    // Call Google Apps Script API
                    const response = await GAS_CONFIG.call('auth/login', {
                        credentials: encodedCredentials,
                        remember: remember,
                        clientInfo: {
                            userAgent: navigator.userAgent,
                            platform: navigator.platform,
                            language: navigator.language,
                            screenResolution: `${window.screen.width}x${window.screen.height}`,
                            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
                        }
                    });
                    
                    if (response && response.success) {
                        // Store tokens securely
                        this.storeTokens(response.data.tokens);
                        
                        // Store user data
                        this.storeUserData(response.data.user);
                        
                        // Store remember preference
                        if (remember) {
                            localStorage.setItem('rememberedEmail', email);
                        } else {
                            localStorage.removeItem('rememberedEmail');
                        }
                        
                        // Update last login
                        localStorage.setItem('lastLogin', new Date().toISOString());
                        
                        return {
                            success: true,
                            user: response.data.user,
                            redirect: response.data.redirect || './dashboard'
                        };
                    } else {
                        return {
                            success: false,
                            message: response.message || 'Login gagal. Periksa kembali kredensial Anda.'
                        };
                    }
                } catch (error) {
                    console.error('Login error:', error);
                    
                    // Check if offline - use demo mode
                    if (!navigator.onLine) {
                        return this.demoLogin(email, password, remember);
                    }
                    
                    // Try demo login as fallback
                    const demoResult = this.demoLogin(email, password, remember);
                    if (demoResult.success) {
                        return {
                            ...demoResult,
                            message: '⚠️ Mode Offline/Demo - Beberapa fitur mungkin terbatas'
                        };
                    }
                    
                    return {
                        success: false,
                        message: 'Gagal terhubung ke server. Silakan coba lagi atau gunakan mode demo.'
                    };
                }
            },
            
            /**
             * Demo login fallback
             * @param {string} email - User email
             * @param {string} password - User password
             * @param {boolean} remember - Remember me flag
             * @returns {Object} Login result
             */
            demoLogin(email, password, remember) {
                // Demo credentials
                const demoAccounts = [
                    {
                        email: 'admin@arsipsurat.id',
                        password: 'password123',
                        user: {
                            id: 1,
                            nama_lengkap: 'Administrator',
                            email: 'admin@arsipsurat.id',
                            role: { id: 1, nama: 'Super Admin', slug: 'super-admin' },
                            instansi: { id: 1, nama: 'Dinas Komunikasi dan Informatika' },
                            jabatan: 'Administrator Sistem',
                            avatar: null
                        }
                    },
                    {
                        email: 'operator@arsipsurat.id',
                        password: 'operator123',
                        user: {
                            id: 2,
                            nama_lengkap: 'Operator Surat',
                            email: 'operator@arsipsurat.id',
                            role: { id: 2, nama: 'Operator', slug: 'operator' },
                            instansi: { id: 1, nama: 'Dinas Komunikasi dan Informatika' },
                            jabatan: 'Staff Administrasi',
                            avatar: null
                        }
                    }
                ];
                
                const account = demoAccounts.find(
                    acc => acc.email === email && acc.password === password
                );
                
                if (account) {
                    // Generate demo tokens
                    const tokens = {
                        accessToken: 'demo_access_' + GAS_CONFIG.encodeBase64(email + Date.now()),
                        refreshToken: 'demo_refresh_' + GAS_CONFIG.encodeBase64(email + Date.now()),
                        expiresIn: 86400 // 24 hours
                    };
                    
                    this.storeTokens(tokens);
                    this.storeUserData(account.user);
                    
                    if (remember) {
                        localStorage.setItem('rememberedEmail', email);
                    }
                    
                    localStorage.setItem('lastLogin', new Date().toISOString());
                    
                    return {
                        success: true,
                        user: account.user,
                        redirect: './dashboard',
                        demo: true
                    };
                }
                
                return {
                    success: false,
                    message: 'Email atau password salah'
                };
            },
            
            /**
             * Store authentication tokens
             * @param {Object} tokens - Token object
             */
            storeTokens(tokens) {
                if (tokens.accessToken) {
                    // Encrypt token before storing
                    const encryptedToken = GAS_CONFIG.encodeBase64(tokens.accessToken);
                    localStorage.setItem('accessToken', encryptedToken);
                    sessionStorage.setItem('accessToken', encryptedToken);
                }
                
                if (tokens.refreshToken) {
                    const encryptedRefresh = GAS_CONFIG.encodeBase64(tokens.refreshToken);
                    localStorage.setItem('refreshToken', encryptedRefresh);
                }
                
                if (tokens.expiresIn) {
                    const expiryTime = Date.now() + (tokens.expiresIn * 1000);
                    localStorage.setItem('tokenExpiry', expiryTime.toString());
                }
            },
            
            /**
             * Store user data
             * @param {Object} user - User object
             */
            storeUserData(user) {
                const encodedUser = GAS_CONFIG.encodeBase64(JSON.stringify(user));
                localStorage.setItem('userData', encodedUser);
            },
            
            /**
             * Get stored user data
             * @returns {Object|null} User data
             */
            getUserData() {
                try {
                    const encoded = localStorage.getItem('userData');
                    if (!encoded) return null;
                    
                    const decoded = GAS_CONFIG.decodeBase64(encoded);
                    return JSON.parse(decoded);
                } catch (error) {
                    console.error('Failed to parse user data:', error);
                    return null;
                }
            },
            
            /**
             * Get access token
             * @returns {string|null} Access token
             */
            getAccessToken() {
                const encrypted = localStorage.getItem('accessToken') || 
                                 sessionStorage.getItem('accessToken');
                if (!encrypted) return null;
                
                try {
                    return GAS_CONFIG.decodeBase64(encrypted);
                } catch {
                    return null;
                }
            },
            
            /**
             * Check if user is authenticated
             * @returns {boolean} Authentication status
             */
            isAuthenticated() {
                const token = this.getAccessToken();
                const user = this.getUserData();
                const expiry = localStorage.getItem('tokenExpiry');
                
                if (!token || !user) return false;
                
                // Check token expiry
                if (expiry && Date.now() > parseInt(expiry)) {
                    this.logout();
                    return false;
                }
                
                return true;
            },
            
            /**
             * Logout user
             */
            logout() {
                localStorage.removeItem('accessToken');
                localStorage.removeItem('refreshToken');
                localStorage.removeItem('tokenExpiry');
                localStorage.removeItem('userData');
                sessionStorage.removeItem('accessToken');
            },
            
            /**
             * Refresh access token
             * @returns {Promise<Object>} Refresh result
             */
            async refreshToken() {
                try {
                    const refreshToken = localStorage.getItem('refreshToken');
                    if (!refreshToken) throw new Error('No refresh token');
                    
                    const decoded = GAS_CONFIG.decodeBase64(refreshToken);
                    
                    const response = await GAS_CONFIG.call('auth/refresh', {
                        refreshToken: decoded
                    });
                    
                    if (response.success) {
                        this.storeTokens(response.data.tokens);
                        return { success: true };
                    }
                    
                    throw new Error('Token refresh failed');
                } catch (error) {
                    this.logout();
                    return { success: false, error: error.message };
                }
            }
        };

        // ==================== UI HELPER FUNCTIONS ====================
        function showAlert(type, message, duration = 5000) {
            const alertMap = {
                error: 'alertError',
                success: 'alertSuccess',
                warning: 'alertWarning'
            };
            
            const alertId = alertMap[type];
            if (!alertId) return;
            
            const alertElement = document.getElementById(alertId);
            const messageElement = document.getElementById(`${alertId}Message`);
            
            if (alertElement && messageElement) {
                // Hide all alerts first
                document.querySelectorAll('.alert').forEach(el => el.classList.remove('show'));
                
                messageElement.textContent = message;
                alertElement.classList.add('show');
                
                // Auto hide after duration
                if (duration > 0) {
                    setTimeout(() => {
                        alertElement.classList.remove('show');
                    }, duration);
                }
            }
        }
        
        function hideAlert(alertId) {
            const alertElement = document.getElementById(alertId);
            if (alertElement) {
                alertElement.classList.remove('show');
            }
        }
        
        function showLoading(message = 'Memproses...') {
            const overlay = document.getElementById('loadingOverlay');
            const text = overlay.querySelector('.loading-text');
            if (text) text.textContent = message;
            overlay.classList.add('active');
        }
        
        function hideLoading() {
            const overlay = document.getElementById('loadingOverlay');
            overlay.classList.remove('active');
        }
        
        function setButtonLoading(button, isLoading) {
            if (isLoading) {
                button.classList.add('loading');
                button.disabled = true;
            } else {
                button.classList.remove('loading');
                button.disabled = false;
            }
        }
        
        function showFieldError(fieldId, message) {
            const input = document.getElementById(fieldId);
            const errorElement = document.getElementById(fieldId + 'Error');
            
            if (input) {
                input.classList.add('error');
                input.classList.remove('success');
            }
            
            if (errorElement) {
                errorElement.textContent = message;
                errorElement.classList.add('show');
            }
        }
        
        function clearFieldError(fieldId) {
            const input = document.getElementById(fieldId);
            const errorElement = document.getElementById(fieldId + 'Error');
            
            if (input) {
                input.classList.remove('error');
            }
            
            if (errorElement) {
                errorElement.classList.remove('show');
            }
        }
        
        function updateConnectionStatus(status, text) {
            const dot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            
            if (dot) {
                dot.className = 'status-dot ' + status;
            }
            
            if (statusText) {
                statusText.textContent = text;
            }
        }

        // ==================== MAIN APPLICATION ====================
        document.addEventListener('DOMContentLoaded', function() {
            // DOM Elements
            const loginForm = document.getElementById('loginForm');
            const btnSubmit = document.getElementById('btnSubmit');
            const togglePasswordBtn = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            const emailInput = document.getElementById('email');
            const rememberCheckbox = document.getElementById('remember');
            const forgotPasswordLink = document.getElementById('forgotPasswordLink');
            const registerLink = document.getElementById('registerLink');
            
            // ==================== CHECK CONNECTION ====================
            async function checkConnection() {
                updateConnectionStatus('connecting', 'Menghubungkan ke server...');
                
                const result = await GAS_CONFIG.testConnection();
                
                if (result.connected) {
                    updateConnectionStatus('online', `Terhubung | Latency: ${result.latency}ms`);
                } else {
                    updateConnectionStatus('offline', 'Mode Offline - Menggunakan data lokal');
                }
                
                return result;
            }
            
            // ==================== CHECK EXISTING SESSION ====================
            function checkExistingSession() {
                if (AuthService.isAuthenticated()) {
                    const user = AuthService.getUserData();
                    const lastLogin = localStorage.getItem('lastLogin');
                    
                    if (user && lastLogin) {
                        const hoursSinceLogin = (Date.now() - new Date(lastLogin).getTime()) / (1000 * 60 * 60);
                        
                        // If logged in within last 24 hours, redirect
                        if (hoursSinceLogin < 24) {
                            showAlert('success', `Selamat datang kembali, ${user.nama_lengkap}! Mengalihkan...`);
                            setTimeout(() => {
                                window.location.href = './dashboard';
                            }, 1000);
                            return true;
                        } else {
                            // Token expired, try refresh
                            AuthService.refreshToken().then(result => {
                                if (result.success) {
                                    showAlert('success', 'Sesi diperpanjang. Mengalihkan...');
                                    setTimeout(() => {
                                        window.location.href = './dashboard';
                                    }, 1000);
                                }
                            });
                        }
                    }
                }
                return false;
            }
            
            // ==================== TOGGLE PASSWORD ====================
            togglePasswordBtn.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.textContent = type === 'password' ? '👁️' : '🙈';
                this.setAttribute('aria-label', type === 'password' ? 'Tampilkan password' : 'Sembunyikan password');
            });
            
            // ==================== FORM VALIDATION ====================
            function validateEmail(email) {
                const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return re.test(email);
            }
            
            function validateForm() {
                let isValid = true;
                
                // Clear previous errors
                clearFieldError('email');
                clearFieldError('password');
                
                // Validate email
                const email = emailInput.value.trim();
                if (!email) {
                    showFieldError('email', 'Email harus diisi');
                    isValid = false;
                } else if (!validateEmail(email)) {
                    showFieldError('email', 'Format email tidak valid');
                    isValid = false;
                }
                
                // Validate password
                const password = passwordInput.value;
                if (!password) {
                    showFieldError('password', 'Password harus diisi');
                    isValid = false;
                } else if (password.length < 6) {
                    showFieldError('password', 'Password minimal 6 karakter');
                    isValid = false;
                }
                
                return isValid;
            }
            
            // Real-time validation
            emailInput.addEventListener('input', function() {
                if (this.value.trim() && !validateEmail(this.value.trim())) {
                    showFieldError('email', 'Format email tidak valid');
                } else {
                    clearFieldError('email');
                    if (this.value.trim()) {
                        this.classList.add('success');
                    }
                }
            });
            
            passwordInput.addEventListener('input', function() {
                if (this.value && this.value.length < 6) {
                    showFieldError('password', 'Password minimal 6 karakter');
                } else {
                    clearFieldError('password');
                }
            });
            
            // ==================== LOGIN FORM SUBMISSION ====================
            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                // Hide all alerts
                document.querySelectorAll('.alert').forEach(el => el.classList.remove('show'));
                
                // Validate form
                if (!validateForm()) {
                    return;
                }
                
                const email = emailInput.value.trim();
                const password = passwordInput.value;
                const remember = rememberCheckbox.checked;
                
                // Set loading state
                setButtonLoading(btnSubmit, true);
                showLoading('Memproses login...');
                
                try {
                    const result = await AuthService.login(email, password, remember);
                    
                    if (result.success) {
                        // Success
                        setButtonLoading(btnSubmit, false);
                        hideLoading();
                        
                        const message = result.demo 
                            ? '✅ Login berhasil (Mode Demo)!' 
                            : '✅ Login berhasil!';
                        
                        showAlert('success', `${message} Mengalihkan...`, 2000);
                        
                        // Redirect to dashboard
                        setTimeout(() => {
                            window.location.href = result.redirect || './dashboard';
                        }, 800);
                    } else {
                        // Failed
                        setButtonLoading(btnSubmit, false);
                        hideLoading();
                        showAlert('error', result.message || 'Login gagal. Silakan coba lagi.');
                        
                        // Shake animation for error feedback
                        loginForm.style.animation = 'shake 0.5s';
                        setTimeout(() => {
                            loginForm.style.animation = '';
                        }, 500);
                    }
                } catch (error) {
                    console.error('Login error:', error);
                    setButtonLoading(btnSubmit, false);
                    hideLoading();
                    showAlert('error', 'Terjadi kesalahan. Silakan coba lagi.');
                }
            });
            
            // ==================== LOAD REMEMBERED EMAIL ====================
            const rememberedEmail = localStorage.getItem('rememberedEmail');
            if (rememberedEmail) {
                emailInput.value = rememberedEmail;
                rememberCheckbox.checked = true;
            }
            
            // ==================== FORGOT PASSWORD LINK ====================
            forgotPasswordLink.addEventListener('click', function(e) {
                e.preventDefault();
                showAlert('warning', 'Fitur lupa password belum tersedia. Hubungi administrator.', 5000);
            });
            
            // ==================== REGISTER LINK ====================
            registerLink.addEventListener('click', function(e) {
                e.preventDefault();
                showAlert('info', 'Pendaftaran akun dilakukan oleh administrator. Silakan hubungi admin instansi Anda.', 5000);
            });
            
            // ==================== KEYBOARD SHORTCUTS ====================
            document.addEventListener('keydown', function(e) {
                // Ctrl+Enter or Cmd+Enter to submit
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    loginForm.dispatchEvent(new Event('submit', { cancelable: true }));
                }
            });
            
            // ==================== INITIALIZATION ====================
            async function initialize() {
                // Check connection
                const connectionResult = await checkConnection();
                
                // Check existing session
                const hasSession = checkExistingSession();
                
                if (!hasSession) {
                    // Ready for login
                    console.log('Login page ready');
                    console.log('Connection status:', connectionResult);
                    console.log('Demo accounts available:');
                    console.log('  admin@arsipsurat.id / password123');
                    console.log('  operator@arsipsurat.id / operator123');
                }
                
                // Focus email input
                if (!emailInput.value) {
                    setTimeout(() => emailInput.focus(), 500);
                }
            }
            
            // Start application
            initialize();
        });
        
        // ==================== SERVICE WORKER REGISTRATION ====================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(registration => {
                        console.log('Service Worker registered:', registration.scope);
                    })
                    .catch(error => {
                        console.log('Service Worker registration failed:', error);
                    });
            });
        }
        
        // ==================== EXPORT FOR TESTING ====================
        if (typeof module !== 'undefined' && module.exports) {
            module.exports = { GAS_CONFIG, AuthService };
        }
    </script>
</body>
</html>
