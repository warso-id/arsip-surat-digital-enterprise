<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login - Arsip Surat Digital Enterprise v30.1.0">
    <meta name="theme-color" content="#1976D2">
    <title>Login - Arsip Surat Digital Enterprise v30.1.0</title>
    
    <style>
        /* ========== CSS VARIABLES ========== */
        :root {
            --primary: #1976D2;
            --primary-dark: #1565C0;
            --primary-light: #42A5F5;
            --bg: #F0F4F8;
            --surface: #FFFFFF;
            --text: #212121;
            --text-secondary: #757575;
            --border: #E0E0E0;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
            --radius: 16px;
            --radius-sm: 10px;
            --font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --error: #F44336;
            --success: #4CAF50;
            --warning: #FF9800;
            --info: #2196F3;
        }

        [data-theme="dark"] {
            --bg: #0F172A;
            --surface: #1E293B;
            --text: #F1F5F9;
            --text-secondary: #94A3B8;
            --border: #334155;
            --shadow: 0 4px 20px rgba(0,0,0,0.3);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
        }

        /* ========== RESET ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-family);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s ease;
            padding: 20px;
        }

        /* ========== BACKGROUND PATTERN ========== */
        .bg-pattern {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(25,118,210,0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(38,166,154,0.05) 0%, transparent 50%),
                radial-gradient(circle at 50% 20%, rgba(255,112,67,0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* ========== LOGIN CONTAINER ========== */
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========== LOGO SECTION ========== */
        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 8px 24px rgba(25,118,210,0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 8px 24px rgba(25,118,210,0.3); }
            50% { box-shadow: 0 12px 32px rgba(25,118,210,0.5); }
        }

        .app-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
        }

        .app-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* ========== LOGIN CARD ========== */
        .login-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 32px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
        }

        .login-card h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }

        .welcome-text {
            text-align: center;
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 24px;
        }

        /* ========== FORM ========== */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: var(--text-secondary);
            pointer-events: none;
            z-index: 1;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 14px 12px 44px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: var(--font-family);
            background: var(--bg);
            color: var(--text);
            transition: all 0.3s ease;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(25,118,210,0.1);
            background: var(--surface);
        }

        .input-wrapper input::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: var(--text-secondary);
            padding: 4px;
            z-index: 1;
        }

        .password-toggle:hover {
            color: var(--primary);
        }

        /* ========== FORM OPTIONS ========== */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .forgot-password {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        /* ========== BUTTON ========== */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: var(--font-family);
            position: relative;
            overflow: hidden;
            min-height: 48px;
        }

        .btn-login:hover {
            box-shadow: 0 6px 20px rgba(25,118,210,0.4);
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-login .btn-text { display: inline; }
        .btn-login .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }

        .btn-login.loading .btn-text { display: none; }
        .btn-login.loading .spinner { display: block; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== ERROR MESSAGE ========== */
        .error-message {
            background: rgba(244,67,54,0.08);
            color: var(--error);
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            border: 1px solid rgba(244,67,54,0.2);
            text-align: center;
        }

        .error-message.show {
            display: block;
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        /* ========== BIOMETRIC ========== */
        .biometric-section {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .btn-biometric {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 25px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            transition: all 0.3s ease;
            font-family: var(--font-family);
        }

        .btn-biometric:hover {
            border-color: var(--primary);
            background: rgba(25,118,210,0.05);
        }

        /* ========== FEATURES ========== */
        .features {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .feature-item {
            text-align: center;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .feature-icon {
            font-size: 20px;
            display: block;
            margin-bottom: 4px;
        }

        /* ========== VERSION ========== */
        .version {
            text-align: center;
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 20px;
            opacity: 0.7;
        }

        .quick-info {
            background: rgba(25,118,210,0.05);
            border: 1px dashed rgba(25,118,210,0.3);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            margin-top: 16px;
            font-size: 11px;
            color: var(--text-secondary);
            text-align: center;
        }

        /* ========== TOAST ========== */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            animation: slideIn 0.3s ease;
            min-width: 280px;
        }

        .toast.success { background: var(--success); }
        .toast.error { background: var(--error); }
        .toast.warning { background: var(--warning); }
        .toast.info { background: var(--info); }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 480px) {
            .login-card { padding: 24px 20px; }
            .logo { width: 64px; height: 64px; font-size: 32px; }
            .app-title { font-size: 18px; }
            .features { gap: 16px; }
            .feature-item { font-size: 10px; }
            .feature-icon { font-size: 16px; }
        }
    </style>
</head>
<body>
    <!-- Background Pattern -->
    <div class="bg-pattern"></div>
    
    <!-- Login Container -->
    <div class="login-container">
        
        <!-- Logo Section -->
        <div class="logo-section">
            <div class="logo">📄</div>
            <h1 class="app-title">Arsip Surat Digital</h1>
            <p class="app-subtitle">Enterprise v30.1.0 • AI Powered</p>
        </div>
        
        <!-- Login Card -->
        <div class="login-card">
            <h2>👋 Selamat Datang</h2>
            <p class="welcome-text">Silakan login untuk mengakses sistem</p>
            
            <!-- Error Message -->
            <div class="error-message" id="errorMessage"></div>
            
            <!-- Login Form -->
            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input 
                            type="text" 
                            id="username" 
                            name="username" 
                            placeholder="Masukkan username" 
                            required 
                            autocomplete="username"
                            autofocus
                        >
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Masukkan password" 
                            required 
                            autocomplete="current-password"
                        >
                        <button type="button" class="password-toggle" id="togglePassword" title="Tampilkan password">
                            👁️
                        </button>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>Ingat saya</span>
                    </label>
                    <a class="forgot-password" id="forgotPassword">Lupa password?</a>
                </div>
                
                <button type="submit" class="btn-login" id="btnLogin">
                    <span class="btn-text">🔐 Masuk</span>
                    <span class="spinner"></span>
                </button>
            </form>
            
            <!-- Biometric Login -->
            <div class="biometric-section" id="biometricSection" style="display:none;">
                <button type="button" class="btn-biometric" id="btnBiometric">
                    <span>🖐️</span>
                    <span>Login dengan Fingerprint / Face ID</span>
                </button>
            </div>
            
            <!-- Quick Info -->
            <div class="quick-info">
                ℹ️ Hubungi <strong>Administrator</strong> jika belum memiliki akun.
            </div>
        </div>
        
        <!-- Features -->
        <div class="features">
            <div class="feature-item">
                <span class="feature-icon">🤖</span>
                AI Smart
            </div>
            <div class="feature-item">
                <span class="feature-icon">🔗</span>
                Blockchain
            </div>
            <div class="feature-item">
                <span class="feature-icon">🔐</span>
                Biometric
            </div>
            <div class="feature-item">
                <span class="feature-icon">🎤</span>
                Voice
            </div>
            <div class="feature-item">
                <span class="feature-icon">🌙</span>
                Dark Mode
            </div>
        </div>
        
        <!-- Version -->
        <div class="version">
            Arsip Surat Digital Enterprise v30.1.0 &copy; 2026
        </div>
    </div>
    
    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ========== JAVASCRIPT - ALL INLINE, NO EXTERNAL FILES ========== -->
    <script>
        // ========================================
        // KONFIGURASI
        // ========================================
        var API_URL = 'https://script.google.com/macros/s/AKfycbxhx4JXI_yX9MIEhYmSVAjxy-_9McM0-2WKzA2OvW4h8T9QT2nh5bJcio0KiWEyL4VRsQ/exec';
        var APP_VERSION = '30.1.0';
        
        // ========================================
        // DOM ELEMENTS
        // ========================================
        var usernameInput = document.getElementById('username');
        var passwordInput = document.getElementById('password');
        var btnLogin = document.getElementById('btnLogin');
        var errorMessage = document.getElementById('errorMessage');
        var togglePasswordBtn = document.getElementById('togglePassword');
        var rememberMeCheckbox = document.getElementById('rememberMe');
        var forgotPasswordLink = document.getElementById('forgotPassword');
        var biometricSection = document.getElementById('biometricSection');
        var btnBiometric = document.getElementById('btnBiometric');
        var toastContainer = document.getElementById('toastContainer');
        var loginForm = document.getElementById('loginForm');
        
        // ========================================
        // INITIALIZATION
        // ========================================
        (function init() {
            console.log('========================================');
            console.log('🚀 Arsip Surat Digital Enterprise');
            console.log('📦 Version: v' + APP_VERSION);
            console.log('🔗 API URL: ' + API_URL);
            console.log('========================================');
            
            // Cek apakah sudah login
            checkExistingSession();
            
            // Load saved username
            loadSavedUsername();
            
            // Cek biometric availability
            checkBiometric();
            
            // Apply saved theme
            applyTheme();
            
            // Event listeners
            setupEventListeners();
            
            console.log('✅ Login page initialized successfully');
        })();
        
        // ========================================
        // CHECK EXISTING SESSION
        // ========================================
        function checkExistingSession() {
            var token = localStorage.getItem('token');
            var user = localStorage.getItem('user');
            
            if (token && user) {
                console.log('🔍 Token ditemukan, melakukan verifikasi...');
                verifyToken(token);
            } else {
                console.log('ℹ️ Tidak ada sesi aktif');
            }
        }
        
        async function verifyToken(token) {
            try {
                var url = API_URL + '?action=me&token=' + encodeURIComponent(token);
                console.log('📡 Verifikasi ke: ' + url);
                
                var response = await fetch(url);
                var data = await response.json();
                console.log('📥 Response:', data);
                
                if (data.status === 'success' && data.data) {
                    console.log('✅ Token valid! Redirect ke dashboard...');
                    // Update user data
                    localStorage.setItem('user', JSON.stringify(data.data));
                    // Redirect
                    redirectToDashboard();
                } else {
                    console.log('❌ Token tidak valid');
                    clearSession();
                    showToast('Sesi telah berakhir, silakan login kembali', 'warning');
                }
            } catch (error) {
                console.error('❌ Verifikasi gagal:', error.message);
                // Jika offline, tetap izinkan akses
                if (!navigator.onLine) {
                    console.log('⚠️ Mode offline - gunakan sesi tersimpan');
                    redirectToDashboard();
                } else {
                    clearSession();
                }
            }
        }
        
        // ========================================
        // HANDLE LOGIN
        // ========================================
        async function doLogin() {
            var username = usernameInput.value.trim();
            var password = passwordInput.value;
            var rememberMe = rememberMeCheckbox.checked;
            
            // Validasi
            if (!username) {
                showError('⚠️ Username harus diisi');
                usernameInput.focus();
                return;
            }
            if (!password) {
                showError('⚠️ Password harus diisi');
                passwordInput.focus();
                return;
            }
            
            // Tampilkan loading
            setLoading(true);
            hideError();
            
            console.log('🔐 Mencoba login...');
            console.log('👤 Username: ' + username);
            
            try {
                var url = API_URL + '?action=login';
                
                var response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });
                
                var data = await response.json();
                console.log('📥 Response login:', data);
                
                if (data.status === 'success' && data.data && data.data.token) {
                    console.log('✅ LOGIN BERHASIL!');
                    
                    // SIMPAN TOKEN DAN USER
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('user', JSON.stringify(data.data.user));
                    
                    // Simpan username jika remember me
                    if (rememberMe) {
                        localStorage.setItem('savedUsername', username);
                    } else {
                        localStorage.removeItem('savedUsername');
                    }
                    
                    // Simpan flag biometric
                    localStorage.setItem('hasBiometric', 'true');
                    
                    // Blockchain log
                    addBlockchainLog(data.data.user);
                    
                    // Tampilkan pesan sukses
                    showToast('✅ Login berhasil! Mengalihkan...', 'success');
                    
                    // Redirect setelah delay singkat
                    setTimeout(function() {
                        redirectToDashboard();
                    }, 600);
                    
                } else if (data.code === 401) {
                    showError('❌ Username atau password salah');
                } else {
                    showError('❌ ' + (data.message || 'Login gagal, silakan coba lagi'));
                }
                
            } catch (error) {
                console.error('❌ Login error:', error.message);
                
                if (!navigator.onLine) {
                    showError('📡 Tidak ada koneksi internet');
                    // Coba offline login
                    attemptOfflineLogin(username);
                } else {
                    showError('❌ Gagal terhubung ke server. Silakan coba lagi.');
                }
            } finally {
                setLoading(false);
            }
        }
        
        // ========================================
        // OFFLINE LOGIN
        // ========================================
        function attemptOfflineLogin(username) {
            var cachedUser = localStorage.getItem('user');
            var cachedToken = localStorage.getItem('token');
            
            if (cachedUser && cachedToken) {
                try {
                    var user = JSON.parse(cachedUser);
                    if (user.username === username) {
                        showToast('⚠️ Mode offline - menggunakan data tersimpan', 'warning');
                        setTimeout(function() {
                            redirectToDashboard();
                        }, 1000);
                        return;
                    }
                } catch (e) {}
            }
            
            showError('📡 Tidak dapat login offline. Diperlukan koneksi internet untuk login pertama kali.');
        }
        
        // ========================================
        // BLOCKCHAIN LOG
        // ========================================
        function addBlockchainLog(user) {
            try {
                var chain = JSON.parse(localStorage.getItem('bc_chain') || '[]');
                
                if (chain.length === 0) {
                    chain = [{
                        index: 0,
                        hash: '0',
                        prevHash: '0',
                        data: 'Genesis Block v' + APP_VERSION,
                        timestamp: new Date().toISOString()
                    }];
                }
                
                var prev = chain[chain.length - 1];
                var blockData = JSON.stringify({
                    action: 'LOGIN',
                    user: user.username,
                    role: user.role || 'staff',
                    timestamp: new Date().toISOString()
                });
                
                // Simple hash
                var hashInput = (prev.index + 1) + blockData + prev.hash;
                var hash = simpleHash(hashInput);
                
                var block = {
                    index: prev.index + 1,
                    timestamp: new Date().toISOString(),
                    data: blockData,
                    prevHash: prev.hash,
                    hash: hash
                };
                
                chain.push(block);
                localStorage.setItem('bc_chain', JSON.stringify(chain));
                console.log('🔗 Blockchain: Block #' + block.index + ' ditambahkan');
            } catch (e) {
                console.log('Blockchain error:', e.message);
            }
        }
        
        function simpleHash(str) {
            var hash = 0;
            for (var i = 0; i < str.length; i++) {
                var char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(16);
        }
        
        // ========================================
        // BIOMETRIC
        // ========================================
        function checkBiometric() {
            if (window.PublicKeyCredential) {
                biometricSection.style.display = 'block';
                console.log('✅ Biometric WebAuthn tersedia');
            } else {
                console.log('ℹ️ Biometric tidak tersedia di browser ini');
            }
        }
        
        async function doBiometricLogin() {
            var credentialId = localStorage.getItem('biometricCredentialId');
            
            if (!credentialId) {
                showToast('⚠️ Belum ada biometric terdaftar. Login dengan username/password terlebih dahulu.', 'info');
                return;
            }
            
            showToast('🔐 Memindai biometric...', 'info');
            
            try {
                var publicKey = {
                    challenge: new Uint8Array(32),
                    rpId: window.location.hostname,
                    allowCredentials: [{
                        id: base64ToUint8Array(credentialId),
                        type: 'public-key'
                    }],
                    userVerification: 'required',
                    timeout: 30000
                };
                
                var assertion = await navigator.credentials.get({ publicKey: publicKey });
                
                if (assertion) {
                    var token = localStorage.getItem('token');
                    if (token) {
                        var url = API_URL + '?action=biometric.verify&token=' + encodeURIComponent(token) + '&credentialId=' + encodeURIComponent(credentialId);
                        var response = await fetch(url);
                        var data = await response.json();
                        
                        if (data.status === 'success') {
                            showToast('✅ Biometric verified! Mengalihkan...', 'success');
                            setTimeout(function() {
                                redirectToDashboard();
                            }, 500);
                        } else {
                            showToast('❌ Biometric gagal, silakan gunakan password', 'error');
                        }
                    } else {
                        showToast('⚠️ Silakan login dengan password terlebih dahulu', 'warning');
                    }
                }
            } catch (error) {
                console.error('Biometric error:', error.message);
                showToast('❌ Biometric error: ' + error.message, 'error');
            }
        }
        
        function base64ToUint8Array(base64) {
            var binary = atob(base64);
            var bytes = new Uint8Array(binary.length);
            for (var i = 0; i < binary.length; i++) {
                bytes[i] = binary.charCodeAt(i);
            }
            return bytes;
        }
        
        // ========================================
        // UI HELPERS
        // ========================================
        function setLoading(isLoading) {
            if (isLoading) {
                btnLogin.classList.add('loading');
                btnLogin.disabled = true;
            } else {
                btnLogin.classList.remove('loading');
                btnLogin.disabled = false;
            }
        }
        
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            // Trigger reflow untuk restart animasi
            errorMessage.style.animation = 'none';
            errorMessage.offsetHeight;
            errorMessage.style.animation = 'shake 0.4s';
        }
        
        function hideError() {
            errorMessage.classList.remove('show');
            errorMessage.textContent = '';
        }
        
        function showToast(message, type) {
            type = type || 'info';
            
            // Hapus toast lama
            var oldToasts = document.querySelectorAll('.toast');
            oldToasts.forEach(function(t) {
                t.style.opacity = '0';
                t.style.transition = 'opacity 0.3s';
                setTimeout(function() { t.remove(); }, 300);
            });
            
            var icons = {
                success: '✅ ',
                error: '❌ ',
                warning: '⚠️ ',
                info: 'ℹ️ '
            };
            
            var toast = document.createElement('div');
            toast.className = 'toast ' + type;
            toast.textContent = (icons[type] || '') + message;
            toastContainer.appendChild(toast);
            
            // Auto remove
            setTimeout(function() {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(function() { toast.remove(); }, 300);
            }, 3500);
        }
        
        function togglePasswordVisibility() {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                togglePasswordBtn.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                togglePasswordBtn.textContent = '👁️';
            }
        }
        
        function redirectToDashboard() {
            window.location.replace('/index.html');
        }
        
        function clearSession() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
        }
        
        function loadSavedUsername() {
            var savedUsername = localStorage.getItem('savedUsername');
            if (savedUsername) {
                usernameInput.value = savedUsername;
                rememberMeCheckbox.checked = true;
            }
        }
        
        function applyTheme() {
            var savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        }
        
        // ========================================
        // EVENT LISTENERS
        // ========================================
        function setupEventListeners() {
            // Form submit
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                doLogin();
            });
            
            // Toggle password
            togglePasswordBtn.addEventListener('click', togglePasswordVisibility);
            
            // Forgot password
            forgotPasswordLink.addEventListener('click', function(e) {
                e.preventDefault();
                showToast('ℹ️ Hubungi Administrator untuk reset password', 'info');
            });
            
            // Biometric button
            btnBiometric.addEventListener('click', doBiometricLogin);
            
            // Enter key pada username -> pindah ke password
            usernameInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    passwordInput.focus();
                }
            });
            
            // Enter key pada password -> submit
            passwordInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    doLogin();
                }
            });
        }
        
        // ========================================
        // LOG
        // ========================================
        console.log('========================================');
        console.log('✅ Login.html v' + APP_VERSION + ' LOADED');
        console.log('📋 Token storage key: token');
        console.log('📋 User storage key: user');
        console.log('🔗 Dashboard URL: /index.html');
        console.log('========================================');
    </script>
</body>
</html>
