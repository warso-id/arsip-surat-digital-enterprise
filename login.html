<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login - Arsip Surat Digital Enterprise v30.1.0">
    <meta name="theme-color" content="#1976D2">
    <title>Login - Arsip Surat Digital Enterprise v30.1.0</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📄</text></svg>">
    
    <style>
        :root {
            --primary: #1976D2;
            --primary-dark: #1565C0;
            --bg: #F0F4F8;
            --surface: #FFFFFF;
            --text: #212121;
            --text-secondary: #757575;
            --border: #E0E0E0;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
            --radius: 16px;
            --radius-sm: 10px;
            --error: #F44336;
            --success: #4CAF50;
            --warning: #FF9800;
            --info: #2196F3;
            --font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        [data-theme="dark"] {
            --bg: #0F172A;
            --surface: #1E293B;
            --text: #F1F5F9;
            --text-secondary: #94A3B8;
            --border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-family);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 14px;
            background: linear-gradient(135deg, #1976D2, #42A5F5);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 8px 24px rgba(25,118,210,0.3);
        }

        .app-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
        }

        .app-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .login-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 30px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
        }

        .login-card h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 6px;
            text-align: center;
        }

        .login-card .welcome-text {
            text-align: center;
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 22px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            pointer-events: none;
        }

        .input-wrapper input {
            width: 100%;
            padding: 11px 14px 11px 40px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: var(--font-family);
            background: var(--bg);
            color: var(--text);
            transition: all 0.3s;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(25,118,210,0.1);
            background: var(--surface);
        }

        .password-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 4px 8px;
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #1976D2, #1565C0);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: var(--font-family);
            position: relative;
        }

        .btn-login:hover:not(:disabled) {
            box-shadow: 0 6px 20px rgba(25,118,210,0.4);
            transform: translateY(-1px);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-login .btn-text { display: inline; }
        .btn-login .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }

        .btn-login.loading .btn-text { display: none; }
        .btn-login.loading .spinner { display: block; }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-message {
            background: rgba(244,67,54,0.08);
            color: var(--error);
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            margin-bottom: 14px;
            display: none;
            border: 1px solid rgba(244,67,54,0.2);
            text-align: center;
        }

        .error-message.show {
            display: block;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            font-size: 12px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .remember-me input[type="checkbox"] {
            width: 15px;
            height: 15px;
            accent-color: var(--primary);
        }

        .forgot-password {
            color: var(--primary);
            cursor: pointer;
            font-weight: 500;
        }

        .forgot-password:hover { text-decoration: underline; }

        .info-text {
            text-align: center;
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 14px;
            opacity: 0.7;
        }

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            animation: slideIn 0.3s ease;
        }

        .toast.success { background: var(--success); }
        .toast.error { background: var(--error); }
        .toast.info { background: var(--info); }
        .toast.warning { background: var(--warning); }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @media (max-width: 480px) {
            .login-card { padding: 24px 20px; }
            .logo-icon { width: 56px; height: 56px; font-size: 28px; }
            .app-title { font-size: 17px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        
        <div class="logo-section">
            <div class="logo-icon">📄</div>
            <h1 class="app-title">Arsip Surat Digital</h1>
            <p class="app-subtitle">Enterprise v30.1.0</p>
        </div>
        
        <div class="login-card">
            <h2>👋 Selamat Datang</h2>
            <p class="welcome-text">Silakan login untuk mengakses sistem</p>
            
            <div class="error-message" id="errorMessage"></div>
            
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" id="username" placeholder="Masukkan username" autocomplete="username" autofocus>
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="password" placeholder="Masukkan password" autocomplete="current-password">
                    <button type="button" class="password-toggle" onclick="togglePassword()">👁️</button>
                </div>
            </div>
            
            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    Ingat saya
                </label>
                <span class="forgot-password" onclick="showToast('Hubungi Administrator untuk reset password', 'info')">Lupa password?</span>
            </div>
            
            <button class="btn-login" id="btnLogin" onclick="handleLogin()">
                <span class="btn-text">🔐 Masuk</span>
                <span class="spinner"></span>
            </button>
            
            <p class="info-text">Arsip Surat Digital Enterprise v30.1.0 &copy; 2026</p>
        </div>
    </div>
    
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ========== CONFIGURATION (SINKRON DENGAN INDEX.HTML) ==========
        const API_URL = 'https://script.google.com/macros/s/AKfycbxhx4JXI_yX9MIEhYmSVAjxy-_9McM0-2WKzA2OvW4h8T9QT2nh5bJcio0KiWEyL4VRsQ/exec';
        const DASHBOARD_URL = '/index.html';
        
        // ========== INITIALIZATION ==========
        (function init() {
            console.log('🔐 Login v30.1.0 initialized');
            
            // Cek existing session
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            
            if (token && user) {
                console.log('🔍 Token found, verifying...');
                verifyTokenAndRedirect(token);
            }
            
            // Load saved username
            const savedUsername = localStorage.getItem('savedUsername');
            if (savedUsername) {
                document.getElementById('username').value = savedUsername;
                document.getElementById('rememberMe').checked = true;
            }
            
            // Apply theme
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            
            // Enter key handlers
            document.getElementById('username').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') { e.preventDefault(); document.getElementById('password').focus(); }
            });
            
            document.getElementById('password').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') { e.preventDefault(); handleLogin(); }
            });
            
        })();
        
        // ========== VERIFY EXISTING TOKEN ==========
        async function verifyTokenAndRedirect(token) {
            try {
                const url = API_URL + '?action=me&token=' + encodeURIComponent(token);
                console.log('📡 Verifying token...');
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.status === 'success' && data.data) {
                    console.log('✅ Token valid, redirecting...');
                    localStorage.setItem('user', JSON.stringify(data.data));
                    window.location.replace(DASHBOARD_URL);
                } else {
                    console.log('❌ Token invalid, clearing...');
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                }
            } catch (error) {
                console.error('Verification error:', error.message);
                // If offline but have token, redirect anyway
                if (!navigator.onLine && localStorage.getItem('token')) {
                    console.log('⚠️ Offline mode, redirecting with cached data...');
                    window.location.replace(DASHBOARD_URL);
                }
            }
        }
        
        // ========== HANDLE LOGIN ==========
        async function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const btnLogin = document.getElementById('btnLogin');
            
            // Validasi
            if (!username) {
                showError('Username harus diisi');
                document.getElementById('username').focus();
                return;
            }
            if (!password) {
                showError('Password harus diisi');
                document.getElementById('password').focus();
                return;
            }
            
            // Loading state
            btnLogin.classList.add('loading');
            btnLogin.disabled = true;
            hideError();
            
            console.log('🔐 Logging in as:', username);
            
            try {
                const url = API_URL + '?action=login';
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                console.log('📥 Response:', data);
                
                if (data.status === 'success' && data.data && data.data.token) {
                    console.log('✅ Login BERHASIL');
                    
                    // SIMPAN TOKEN & USER (sama seperti di index.html)
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('user', JSON.stringify(data.data.user));
                    
                    // Simpan username jika "Ingat saya"
                    if (rememberMe) {
                        localStorage.setItem('savedUsername', username);
                    } else {
                        localStorage.removeItem('savedUsername');
                    }
                    
                    showToast('✅ Login berhasil!', 'success');
                    
                    // Redirect
                    setTimeout(() => {
                        window.location.replace(DASHBOARD_URL);
                    }, 500);
                    
                } else if (data.code === 401) {
                    showError('Username atau password salah');
                } else {
                    showError(data.message || 'Login gagal');
                }
                
            } catch (error) {
                console.error('❌ Login error:', error);
                
                if (!navigator.onLine) {
                    showError('Tidak ada koneksi internet');
                } else {
                    showError('Gagal terhubung ke server');
                }
            } finally {
                btnLogin.classList.remove('loading');
                btnLogin.disabled = false;
            }
        }
        
        // ========== TOGGLE PASSWORD ==========
        function togglePassword() {
            const input = document.getElementById('password');
            const btn = document.querySelector('.password-toggle');
            
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🙈';
            } else {
                input.type = 'password';
                btn.textContent = '👁️';
            }
        }
        
        // ========== UI HELPERS ==========
        function showError(message) {
            const el = document.getElementById('errorMessage');
            el.textContent = '❌ ' + message;
            el.classList.add('show');
            
            // Auto hide after 5 seconds
            clearTimeout(window._errorTimeout);
            window._errorTimeout = setTimeout(hideError, 5000);
        }
        
        function hideError() {
            const el = document.getElementById('errorMessage');
            el.classList.remove('show');
            clearTimeout(window._errorTimeout);
        }
        
        function showToast(message, type = 'info') {
            // Remove existing toasts
            document.querySelectorAll('.toast').forEach(t => {
                t.style.opacity = '0';
                setTimeout(() => t.remove(), 300);
            });
            
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;
            toast.textContent = message;
            container.appendChild(toast);
            
            setTimeout(() => {
                if (toast.parentNode) {
                    toast.style.opacity = '0';
                    toast.style.transition = 'opacity 0.3s';
                    setTimeout(() => { if (toast.parentNode) toast.remove(); }, 300);
                }
            }, 3500);
        }
        
        console.log('✅ Login.html v30.1.0 - STANDALONE - READY');
        console.log('🔗 API:', API_URL);
        console.log('📋 Redirect:', DASHBOARD_URL);
    </script>
</body>
</html>
