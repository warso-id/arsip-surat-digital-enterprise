    <style>
        /* Fallback & Additional Styles */
        :root {
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .auth-page {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        .auth-page::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255,255,255,0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(255,255,255,0.06) 0%, transparent 50%);
            pointer-events: none;
        }
        
        .auth-container {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
        }
        
        .auth-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .auth-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(26, 86, 219, 0.3);
        }
        
        .auth-header h1 {
            font-size: 24px;
            color: #1f2937;
            margin-bottom: 6px;
            font-weight: 800;
        }
        
        .auth-header p {
            color: #6b7280;
            font-size: 14px;
        }
        
        .auth-form .form-group {
            margin-bottom: 20px;
        }
        
        .auth-form label {
            display: block;
            margin-bottom: 6px;
            color: #374151;
            font-weight: 600;
            font-size: 14px;
        }
        
        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .input-icon {
            position: absolute;
            left: 14px;
            font-size: 18px;
            z-index: 1;
            pointer-events: none;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px 14px 14px 44px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 15px;
            font-family: var(--font-sans);
            transition: all 0.3s;
            background: #f9fafb;
            color: #1f2937;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        .input-group input::placeholder {
            color: #9ca3af;
        }
        
        .toggle-password {
            position: absolute;
            right: 14px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: #6b7280;
            padding: 4px;
        }
        
        .toggle-password:hover {
            color: #374151;
        }
        
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 13px;
        }
        
        .remember-me {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #6b7280;
            cursor: pointer;
        }
        
        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #667eea;
            cursor: pointer;
        }
        
        .forgot-password {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        
        .forgot-password:hover {
            text-decoration: underline;
        }
        
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: var(--font-sans);
            position: relative;
            overflow: hidden;
        }
        
        .btn-submit:hover {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
        }
        
        .btn-submit:active {
            transform: translateY(0);
        }
        
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .btn-loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .alert {
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .alert.show {
            display: block;
        }
        
        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
        
        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #6b7280;
        }
        
        .auth-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .auth-footer a:hover {
            text-decoration: underline;
        }
        
        .back-home {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        
        .back-home:hover {
            color: white;
        }
        
        @media (max-width: 480px) {
            .auth-card {
                padding: 24px;
                border-radius: 16px;
            }
            
            .auth-logo {
                width: 60px;
                height: 60px;
            }
            
            .auth-header h1 {
                font-size: 20px;
            }
            
            .form-options {
                flex-direction: column;
                gap: 8px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <!-- Auth Header -->
                <div class="auth-header">
                    <!-- Logo Base64 SVG -->
                    <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyMDAgMjAwIiB3aWR0aD0iODAiIGhlaWdodD0iODAiPjxkZWZzPjxsaW5lYXJHcmFkaWVudCBpZD0ibG9nby1ncmFkIiB4MT0iMCUiIHkxPSIwJSIgeDI9IjEwMCUiIHkyPSIxMDAlIj48c3RvcCBvZmZzZXQ9IjAlIiBzdHlsZT0ic3RvcC1jb2xvcjojMWE1NmRiIi8+PHN0b3Agb2Zmc2V0PSIxMDAlIiBzdHlsZT0ic3RvcC1jb2xvcjojN2MzYWVkIi8+PC9saW5lYXJHcmFkaWVudD48L2RlZnM+PHJlY3Qgd2lkdGg9IjIwMCIgaGVpZ2h0PSIyMDAiIHJ4PSI0MCIgZmlsbD0idXJsKCNsb2dvLWdyYWQpIi8+PHRleHQgeD0iMTAwIiB5PSIxMjAiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSI4MCIgZm9udC13ZWlnaHQ9ImJvbGQiIGZpbGw9IndoaXRlIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIj5BRDwvdGV4dD48L3N2Zz4=" 
                         alt="Logo" class="auth-logo" width="80" height="80">
                    <h1>Selamat Datang</h1>
                    <p>Silakan masuk ke akun Anda</p>
                </div>

                <!-- Alert Messages -->
                <div id="alertError" class="alert alert-error"></div>
                <div id="alertSuccess" class="alert alert-success"></div>

                <!-- Login Form -->
                <form id="loginForm" class="auth-form" autocomplete="off">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <div class="input-group">
                            <span class="input-icon">📧</span>
                            <input type="email" id="email" name="email" 
                                   placeholder="Masukkan email Anda" 
                                   required autocomplete="email"
                                   value="admin@arsipsurat.id">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-group">
                            <span class="input-icon">🔒</span>
                            <input type="password" id="password" name="password" 
                                   placeholder="Masukkan password" 
                                   required autocomplete="current-password"
                                   value="password123">
                            <button type="button" class="toggle-password" id="togglePassword" tabindex="-1">👁️</button>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="remember" name="remember">
                            Ingat saya
                        </label>
                        <a href="#forgot-password" class="forgot-password">Lupa password?</a>
                    </div>

                    <button type="submit" class="btn-submit" id="btnSubmit">
                        <span id="btnText">Masuk</span>
                    </button>
                </form>

                <!-- Auth Footer -->
                <div class="auth-footer">
                    <p>Belum punya akun? <a href="#register">Daftar sekarang</a></p>
                </div>
            </div>
            
            <!-- Back to Home -->
            <a href="./index.html" class="back-home">← Kembali ke Beranda</a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="./src/public/js/app.js"></script>
    
    <script>
        // ==================== TOGGLE PASSWORD ====================
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.textContent = type === 'password' ? '👁️' : '🙈';
        });

        // ==================== LOGIN FORM ====================
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btnSubmit = document.getElementById('btnSubmit');
            const btnText = document.getElementById('btnText');
            const alertError = document.getElementById('alertError');
            const alertSuccess = document.getElementById('alertSuccess');
            
            // Get form values
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const remember = document.getElementById('remember').checked;
            
            // Reset alerts
            alertError.classList.remove('show');
            alertSuccess.classList.remove('show');
            
            // Validation
            if (!email) {
                showAlert(alertError, 'Email harus diisi');
                return;
            }
            
            if (!password) {
                showAlert(alertError, 'Password harus diisi');
                return;
            }
            
            if (password.length < 6) {
                showAlert(alertError, 'Password minimal 6 karakter');
                return;
            }
            
            // Show loading
            btnSubmit.disabled = true;
            btnText.innerHTML = '<span class="btn-loader"></span> Memproses...';
            
            try {
                // Simulate API call
                await new Promise(resolve => setTimeout(resolve, 1500));
                
                // Demo credentials check
                if (email === 'admin@arsipsurat.id' && password === 'password123') {
                    // Success
                    const userData = {
                        id: 1,
                        nama_lengkap: 'Administrator',
                        email: 'admin@arsipsurat.id',
                        role: { id: 1, nama: 'Super Admin', slug: 'super-admin' },
                        instansi: { id: 1, nama: 'Dinas Komunikasi dan Informatika' },
                        jabatan: 'Administrator Sistem'
                    };
                    
                    // Generate mock tokens
                    const accessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.mock_token';
                    const refreshToken = 'mock_refresh_token_' + Date.now();
                    
                    // Save to localStorage
                    localStorage.setItem('accessToken', accessToken);
                    localStorage.setItem('refreshToken', refreshToken);
                    localStorage.setItem('user', JSON.stringify(userData));
                    
                    if (remember) {
                        localStorage.setItem('rememberedEmail', email);
                    }
                    
                    // Update last login time
                    localStorage.setItem('lastLogin', new Date().toISOString());
                    
                    showAlert(alertSuccess, 'Login berhasil! Mengalihkan...');
                    
                    // Redirect to dashboard
                    setTimeout(() => {
                        window.location.href = './dashboard.html';
                    }, 800);
                    
                } else {
                    showAlert(alertError, 'Email atau password salah. Gunakan: admin@arsipsurat.id / password123');
                    btnSubmit.disabled = false;
                    btnText.textContent = 'Masuk';
                }
                
            } catch (error) {
                console.error('Login error:', error);
                showAlert(alertError, 'Gagal terhubung ke server. Silakan coba lagi.');
                btnSubmit.disabled = false;
                btnText.textContent = 'Masuk';
            }
        });
        
        // ==================== HELPER FUNCTIONS ====================
        function showAlert(element, message) {
            element.textContent = message;
            element.classList.add('show');
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                element.classList.remove('show');
            }, 5000);
        }
        
        // ==================== LOAD REMEMBERED EMAIL ====================
        const rememberedEmail = localStorage.getItem('rememberedEmail');
        if (rememberedEmail) {
            document.getElementById('email').value = rememberedEmail;
            document.getElementById('remember').checked = true;
        }
        
        // ==================== CHECK IF ALREADY LOGGED IN ====================
        const token = localStorage.getItem('accessToken');
        const user = localStorage.getItem('user');
        
        if (token && user) {
            // Already logged in, redirect to dashboard
            const lastLogin = localStorage.getItem('lastLogin');
            if (lastLogin) {
                const hoursSinceLogin = (Date.now() - new Date(lastLogin).getTime()) / (1000 * 60 * 60);
                if (hoursSinceLogin < 24) {
                    window.location.href = './dashboard.html';
                }
            }
        }
        
        // ==================== KEYBOARD SHORTCUTS ====================
        document.addEventListener('keydown', function(e) {
            // Ctrl+Enter to submit
            if (e.ctrlKey && e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
