<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Troubleshooting - Arsip Surat Digital</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #e94560; text-align: center; }
        .card { background: #16213e; border-radius: 10px; padding: 20px; margin: 15px 0; }
        .card h3 { color: #0f3460; background: #e94560; padding: 8px 15px; border-radius: 5px; display: inline-block; margin-top: 0; }
        .log { background: #0f3460; border-radius: 8px; padding: 15px; max-height: 300px; overflow-y: auto; font-family: monospace; font-size: 13px; }
        .success { color: #4ecca3; }
        .error { color: #e94560; }
        .warning { color: #f0a500; }
        .info { color: #00b4d8; }
        .btn { background: #e94560; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 5px; font-weight: bold; }
        .btn:hover { background: #c23152; }
        .btn-green { background: #4ecca3; color: #1a1a2e; }
        .btn-green:hover { background: #3db88d; }
        .progress { width: 100%; height: 20px; background: #0f3460; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: #4ecca3; border-radius: 10px; width: 0%; transition: width 0.5s; }
        .flex { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Troubleshooting Arsip Surat Digital</h1>
        <p style="text-align:center;color:#888;">Diagnostic Tool v2026.1</p>
        
        <div class="flex">
            <button class="btn" onclick="runAll()">▶ Run All Checks</button>
            <button class="btn" onclick="checkAPI()">🔌 Check API</button>
            <button class="btn" onclick="checkFiles()">📁 Check Files</button>
            <button class="btn btn-green" onclick="generateMissing()">🔨 Generate Files</button>
        </div>
        
        <div class="progress">
            <div class="progress-fill" id="progressBar"></div>
        </div>
        <p id="statusText" style="text-align:center;">Ready...</p>
        
        <div class="card">
            <h3>🔌 API Connection</h3>
            <div class="log" id="apiLog">Waiting for check...</div>
        </div>
        
        <div class="card">
            <h3>📁 File Check Results</h3>
            <div class="log" id="fileLog">Waiting for check...</div>
        </div>
        
        <div class="card">
            <h3>🔨 Generated Files</h3>
            <div id="genResult" style="padding:10px;">Run "Generate Files" to see missing files...</div>
        </div>
    </div>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycbwblauw29Cv8rmrjQHhfXgdl0csBHlxO3xvZJimyBsSyA4F5f9qH25Ej5QYIu--OGy6Bw/exec';
        const BASE = '/arsip-surat-digital-enterprise';
        
        const REQUIRED = [
            'index.html','manifest.json','service-worker.js','offline.html','404.html','troubleshooting.html',
            'assets/css/app.css','assets/css/dashboard.css','assets/css/surat.css','assets/css/print.css',
            'assets/js/config.js','assets/js/api.js','assets/js/auth.js','assets/js/database.js',
            'assets/js/router.js','assets/js/app.js','assets/js/dashboard.js','assets/js/surat.js',
            'assets/js/disposisi.js','assets/js/laporan.js','assets/js/components/spinner.js',
            'assets/images/icon-192x192.svg','assets/images/icon-512x512.svg','assets/images/favicon.svg',
            'assets/images/logo.svg','assets/images/default-avatar.svg',
            'README.md','LICENSE','.gitignore','.github/workflows/ci.yml'
        ];
        
        let missingFiles = [];
        let apiConnected = false;
        
        function log(id, msg, cls) {
            const el = document.getElementById(id);
            if (el.textContent.includes('Waiting')) el.innerHTML = '';
            el.innerHTML += '<div class="' + cls + '">[' + new Date().toLocaleTimeString() + '] ' + msg + '</div>';
            el.scrollTop = el.scrollHeight;
        }
        
        function updateProgress(pct, txt) {
            document.getElementById('progressBar').style.width = pct + '%';
            document.getElementById('statusText').textContent = txt;
        }
        
        async function checkAPI() {
            log('apiLog', '=== Checking API Connection ===', 'info');
            log('apiLog', 'URL: ' + API, 'info');
            
            try {
                const fd = new URLSearchParams(); fd.append('action', 'ping');
                const res = await fetch(API, { method: 'POST', body: fd });
                const data = await res.json();
                
                if (data.success) {
                    apiConnected = true;
                    log('apiLog', '✅ API CONNECTED! Version: ' + (data.version || 'N/A'), 'success');
                    
                    const lfd = new URLSearchParams();
                    lfd.append('action', 'login');
                    lfd.append('data', btoa(JSON.stringify({username:'admin',password:'Admin123!'})));
                    const lr = await fetch(API, { method: 'POST', body: lfd });
                    const ld = await lr.json();
                    
                    log('apiLog', ld.success ? '✅ Login OK' : '⚠ Login: ' + ld.message + ' (may need setup)', 
                        ld.success ? 'success' : 'warning');
                } else {
                    log('apiLog', '❌ API Error: ' + JSON.stringify(data), 'error');
                }
            } catch(e) {
                apiConnected = false;
                log('apiLog', '❌ FAILED: ' + e.message, 'error');
            }
            updateProgress(33, 'API Check done');
        }
        
        async function checkFiles() {
            log('fileLog', '=== Checking ' + REQUIRED.length + ' Files ===', 'info');
            missingFiles = [];
            
            for (const f of REQUIRED) {
                try {
                    const res = await fetch(BASE + '/' + f, { method: 'HEAD', cache: 'no-cache' });
                    if (res.ok) {
                        log('fileLog', '✅ ' + f, 'success');
                    } else {
                        missingFiles.push(f);
                        log('fileLog', '❌ ' + f + ' (HTTP ' + res.status + ')', 'error');
                    }
                } catch(e) {
                    missingFiles.push(f);
                    log('fileLog', '❌ ' + f + ' - Error', 'error');
                }
            }
            
            log('fileLog', '=== ' + (REQUIRED.length - missingFiles.length) + '/' + REQUIRED.length + 
                ' OK, ' + missingFiles.length + ' MISSING ===', missingFiles.length ? 'warning' : 'success');
            updateProgress(66, 'File check done');
        }
        
        function generateMissing() {
            const div = document.getElementById('genResult');
            
            if (missingFiles.length === 0 && apiConnected) {
                div.innerHTML = '<p style="color:#4ecca3;font-size:18px;">✅ All files present!</p>';
                return;
            }
            
            let html = '<h4 style="color:#e94560;">Missing Files (' + missingFiles.length + '):</h4>';
            
            if (!apiConnected) {
                html += '<p style="color:#f0a500;">⚠ API not connected. Generate code.gs:</p>';
                html += '<button class="btn btn-green" onclick="downloadCodeGS()">📥 Download code.gs</button><br><br>';
            }
            
            for (const f of missingFiles) {
                html += '<p style="margin:3px 0;">❌ <span style="color:#e94560;">' + f + '</span></p>';
            }
            
            if (missingFiles.length > 0) {
                html += '<br><h4>Terminal Commands to Create Files:</h4>';
                html += '<pre style="background:#0f3460;padding:10px;border-radius:5px;overflow-x:auto;">';
                html += 'cd arsip-surat-digital-enterprise<br><br>';
                for (const f of missingFiles) {
                    const dir = f.includes('/') ? f.substring(0, f.lastIndexOf('/')) : '';
                    if (dir) html += 'mkdir -p ' + dir + '<br>';
                    html += 'touch ' + f + '<br>';
                }
                html += '</pre>';
                
                html += '<h4>Or create files on GitHub:</h4>';
                html += '<ol style="color:#888;">';
                for (const f of missingFiles) {
                    html += '<li>Go to: <a href="https://github.com/warso-id/arsip-surat-digital-enterprise/new/main/' + 
                        f + '" target="_blank" style="color:#00b4d8;">Create ' + f + '</a></li>';
                }
                html += '</ol>';
            }
            
            div.innerHTML = html;
            updateProgress(100, 'Done!');
        }
        
        function downloadCodeGS() {
            const code = '// code.gs - Google Apps Script Backend\n// Deploy as Web App: Execute as Me, Access: Anyone\n\nfunction doPost(e) {\n  return ContentService.createTextOutput(JSON.stringify({\n    success: true,\n    message: "API is running",\n    version: "2026.1.0"\n  })).setMimeType(ContentService.MimeType.JSON);\n}\n\nfunction doGet(e) { return doPost(e); }';
            const blob = new Blob([code], {type:'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'code.gs';
            a.click();
            alert('code.gs downloaded! Upload to Google Apps Script.');
        }
        
        async function runAll() {
            updateProgress(0, 'Starting...');
            await checkAPI();
            await checkFiles();
            generateMissing();
        }
        
        setTimeout(runAll, 1000);
    </script>
</body>
</html>
