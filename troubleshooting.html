<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a73e8">
    <title>Troubleshooting - Arsip Surat Digital Enterprise 2026</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            padding: 20px;
            margin: 0;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { text-align: center; color: #58a6ff; font-size: 24px; }
        .subtitle { text-align: center; color: #8b949e; margin-bottom: 20px; font-size: 14px; }
        
        .controls {
            display: flex; gap: 10px; justify-content: center;
            flex-wrap: wrap; margin-bottom: 20px;
        }
        .btn {
            padding: 10px 20px; border: 1px solid #30363d;
            border-radius: 8px; background: #21262d; color: #c9d1d9;
            cursor: pointer; font-size: 13px; font-weight: 600;
        }
        .btn:hover { background: #30363d; }
        .btn-primary { background: #238636; border-color: #238636; color: white; }
        .btn-primary:hover { background: #2ea043; }
        .btn-danger { background: #da3633; border-color: #da3633; color: white; }
        .btn-warning { background: #9e6a03; border-color: #9e6a03; color: white; }
        
        .card {
            background: #161b22; border: 1px solid #30363d;
            border-radius: 12px; padding: 20px; margin-bottom: 20px;
        }
        .card h3 { color: #58a6ff; margin-top: 0; font-size: 16px; }
        
        .log-box {
            background: #0d1117; border: 1px solid #30363d;
            border-radius: 8px; padding: 15px; max-height: 350px;
            overflow-y: auto; font-family: monospace; font-size: 12px;
            line-height: 1.6;
        }
        .log-ok { color: #3fb950; }
        .log-err { color: #f85149; }
        .log-warn { color: #d29922; }
        .log-info { color: #58a6ff; }
        .log-head { color: #bc8cff; font-weight: bold; }
        
        .file-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 6px 10px; border-bottom: 1px solid #21262d;
            font-size: 13px;
        }
        .file-row .ok { color: #3fb950; }
        .file-row .err { color: #f85149; }
        .tag {
            padding: 2px 10px; border-radius: 10px; font-size: 11px; font-weight: 600;
        }
        .tag-ok { background: #1b3a1b; color: #3fb950; }
        .tag-err { background: #3a1b1b; color: #f85149; }
        
        .progress-bar {
            width: 100%; height: 8px; background: #21262d;
            border-radius: 4px; margin: 10px 0; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: #238636;
            border-radius: 4px; width: 0%; transition: width 0.5s;
        }
        
        pre {
            background: #0d1117; border: 1px solid #30363d;
            border-radius: 8px; padding: 12px; overflow-x: auto;
            font-size: 12px; margin: 10px 0; white-space: pre-wrap;
        }
        
        @media (max-width: 768px) {
            .controls { flex-direction: column; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Troubleshooting System</h1>
        <p class="subtitle">Arsip Surat Digital Enterprise 2026 - Diagnostic Tool</p>
        
        <div class="controls">
            <button class="btn btn-primary" id="btnAll">Run All Checks</button>
            <button class="btn" id="btnAPI">Cek API</button>
            <button class="btn" id="btnFiles">Cek Files</button>
            <button class="btn btn-warning" id="btnErrors">Deteksi Error</button>
            <button class="btn btn-danger" id="btnGenerate">Generate Files</button>
        </div>
        
        <div class="card">
            <h3>Progress</h3>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <p id="progressText" style="color:#8b949e;">Ready...</p>
        </div>
        
        <div class="card">
            <h3>API Connection</h3>
            <div class="log-box" id="apiLog"></div>
        </div>
        
        <div class="card">
            <h3>File Check</h3>
            <div id="fileList" style="max-height:350px;overflow-y:auto;"></div>
        </div>
        
        <div class="card">
            <h3>Error Detection</h3>
            <div class="log-box" id="errorLog"></div>
        </div>
        
        <div class="card">
            <h3>Generate Files</h3>
            <div id="generateSection"></div>
        </div>
    </div>

    <script>
    var API_URL = 'https://script.google.com/macros/s/AKfycbwblauw29Cv8rmrjQHhfXgdl0csBHlxO3xvZJimyBsSyA4F5f9qH25Ej5QYIu--OGy6Bw/exec';
    var BASE_PATH = '/arsip-surat-digital-enterprise';
    var APP_VERSION = '2026.1.0';
    
    var REQUIRED_FILES = [
        { path: 'index.html', critical: true, desc: 'Main PWA Entry' },
        { path: 'manifest.json', critical: true, desc: 'PWA Manifest' },
        { path: 'service-worker.js', critical: true, desc: 'Service Worker' },
        { path: 'offline.html', critical: true, desc: 'Offline Page' },
        { path: '404.html', critical: true, desc: '404 Handler' },
        { path: 'troubleshooting.html', critical: false, desc: 'Troubleshooting' },
        { path: 'assets/css/app.css', critical: true, desc: 'Main CSS' },
        { path: 'assets/css/dashboard.css', critical: false, desc: 'Dashboard CSS' },
        { path: 'assets/css/surat.css', critical: false, desc: 'Surat CSS' },
        { path: 'assets/css/print.css', critical: false, desc: 'Print CSS' },
        { path: 'assets/js/config.js', critical: true, desc: 'Config' },
        { path: 'assets/js/api.js', critical: true, desc: 'API Service' },
        { path: 'assets/js/auth.js', critical: true, desc: 'Auth Service' },
        { path: 'assets/js/database.js', critical: true, desc: 'Database' },
        { path: 'assets/js/router.js', critical: true, desc: 'Router' },
        { path: 'assets/js/app.js', critical: true, desc: 'Main App' },
        { path: 'assets/js/dashboard.js', critical: true, desc: 'Dashboard' },
        { path: 'assets/js/surat.js', critical: true, desc: 'Surat Module' },
        { path: 'assets/js/disposisi.js', critical: true, desc: 'Disposisi' },
        { path: 'assets/js/laporan.js', critical: true, desc: 'Laporan' },
        { path: 'assets/js/components/spinner.js', critical: false, desc: 'Spinner' },
        { path: 'assets/images/icon-192x192.svg', critical: true, desc: 'Icon 192' },
        { path: 'assets/images/icon-512x512.svg', critical: true, desc: 'Icon 512' },
        { path: 'assets/images/favicon.svg', critical: true, desc: 'Favicon' },
        { path: 'assets/images/logo.svg', critical: false, desc: 'Logo' },
        { path: 'assets/images/default-avatar.svg', critical: false, desc: 'Avatar' },
        { path: 'README.md', critical: false, desc: 'Readme' },
        { path: 'LICENSE', critical: false, desc: 'License' },
        { path: '.gitignore', critical: true, desc: 'Git Ignore' }
    ];
    
    var state = {
        apiOk: false,
        filesOk: [],
        filesMissing: [],
        errorsFound: [],
        generatedFiles: []
    };
    
    function addLog(id, msg, cls) {
        var el = document.getElementById(id);
        if (!el) return;
        var div = document.createElement('div');
        div.className = 'log-' + (cls || 'info');
        div.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
        el.appendChild(div);
        el.scrollTop = el.scrollHeight;
    }
    
    function updateProgress(pct, txt) {
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('progressText').textContent = txt;
    }
    
    function escapeHTML(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    
    function downloadBlob(filename, content) {
        var blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }
    
    async function checkAPIConnection() {
        var logEl = document.getElementById('apiLog');
        logEl.innerHTML = '';
        
        addLog('apiLog', '=== CHECKING API ===', 'head');
        addLog('apiLog', 'URL: ' + API_URL, 'info');
        
        try {
            var fd = new URLSearchParams();
            fd.append('action', 'ping');
            
            var res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: fd.toString()
            });
            
            var data = await res.json();
            
            if (data.success) {
                state.apiOk = true;
                addLog('apiLog', 'API CONNECTED! Version: ' + (data.version || 'N/A'), 'ok');
                
                var lfd = new URLSearchParams();
                lfd.append('action', 'login');
                lfd.append('data', btoa(JSON.stringify({ username: 'admin', password: 'Admin123!' })));
                
                var lres = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: lfd.toString()
                });
                
                var ldata = await lres.json();
                
                if (ldata.success) {
                    addLog('apiLog', 'Login test OK', 'ok');
                } else {
                    addLog('apiLog', 'Login: ' + (ldata.message || 'Unknown') + ' (may need setup)', 'warn');
                }
            } else {
                addLog('apiLog', 'API Error: ' + JSON.stringify(data), 'err');
            }
        } catch (e) {
            state.apiOk = false;
            addLog('apiLog', 'FAILED: ' + e.message, 'err');
        }
        
        updateProgress(25, 'API Check done');
    }
    
    async function checkAllFiles() {
        var fileList = document.getElementById('fileList');
        fileList.innerHTML = '';
        state.filesOk = [];
        state.filesMissing = [];
        
        addLog('apiLog', '=== CHECKING ' + REQUIRED_FILES.length + ' FILES ===', 'head');
        
        for (var i = 0; i < REQUIRED_FILES.length; i++) {
            var file = REQUIRED_FILES[i];
            
            try {
                var res = await fetch(BASE_PATH + '/' + file.path, {
                    method: 'HEAD',
                    cache: 'no-cache'
                });
                
                var ok = res.ok;
                
                if (ok) {
                    state.filesOk.push(file.path);
                } else {
                    state.filesMissing.push(file.path);
                }
                
                var row = document.createElement('div');
                row.className = 'file-row';
                
                var icon = ok ? 'OK' : 'MISS';
                var cls = ok ? 'ok' : 'err';
                var tagCls = ok ? 'tag-ok' : 'tag-err';
                var crit = file.critical ? ' [CRITICAL]' : '';
                
                row.innerHTML = '<span class="' + cls + '">' + icon + ' ' + file.path + crit + '</span>' +
                    '<span class="tag ' + tagCls + '">' + (ok ? 'OK' : 'MISS') + '</span>';
                
                fileList.appendChild(row);
                
                addLog('apiLog', (ok ? 'OK' : 'MISS') + ' ' + file.path, ok ? 'ok' : 'err');
                
            } catch (e) {
                state.filesMissing.push(file.path);
                addLog('apiLog', 'ERR ' + file.path + ' - ' + e.message, 'err');
            }
        }
        
        addLog('apiLog', '=== ' + state.filesOk.length + '/' + REQUIRED_FILES.length + ' OK | ' + state.filesMissing.length + ' MISSING ===', 'head');
        
        updateProgress(50, 'File Check done');
    }
    
    async function detectErrors() {
        var logEl = document.getElementById('errorLog');
        logEl.innerHTML = '';
        state.errorsFound = [];
        
        addLog('errorLog', '=== DETECTING ERRORS ===', 'head');
        
        var jsFiles = [];
        for (var i = 0; i < REQUIRED_FILES.length; i++) {
            var f = REQUIRED_FILES[i];
            if (f.path.indexOf('.js') > -1 && state.filesOk.indexOf(f.path) > -1) {
                jsFiles.push(f);
            }
        }
        
        if (jsFiles.length === 0) {
            addLog('errorLog', 'No JS files available to check', 'warn');
            updateProgress(75, 'Error Detection done');
            return;
        }
        
        for (var j = 0; j < jsFiles.length; j++) {
            var file = jsFiles[j];
            
            try {
                var res = await fetch(BASE_PATH + '/' + file.path, { cache: 'no-cache' });
                var code = await res.text();
                
                try {
                    new Function(code);
                    addLog('errorLog', 'OK ' + file.path + ' - Syntax valid', 'ok');
                } catch (syntaxErr) {
                    state.errorsFound.push({ file: file.path, error: syntaxErr.message });
                    addLog('errorLog', 'SYNTAX ERROR ' + file.path + ': ' + syntaxErr.message, 'err');
                }
                
            } catch (e) {
                state.errorsFound.push({ file: file.path, error: e.message });
                addLog('errorLog', 'ERR ' + file.path + ': ' + e.message, 'err');
            }
        }
        
        addLog('errorLog', '=== ' + state.errorsFound.length + ' errors found ===', 'head');
        
        updateProgress(75, 'Error Detection done');
    }
    
    function generateCodeGS() {
        var lines = [];
        lines.push('// code.gs - Google Apps Script Backend');
        lines.push('// Deploy as Web App: Execute as Me, Access: Anyone');
        lines.push('');
        lines.push('function doPost(e) {');
        lines.push('  return ContentService.createTextOutput(JSON.stringify({');
        lines.push('    success: true,');
        lines.push('    message: "API is running",');
        lines.push('    version: "' + APP_VERSION + '"');
        lines.push('  })).setMimeType(ContentService.MimeType.JSON);');
        lines.push('}');
        lines.push('');
        lines.push('function doGet(e) { return doPost(e); }');
        return lines.join('\n');
    }
    
    function generateManifestJSON() {
        var obj = {
            name: "Arsip Surat Digital Enterprise",
            short_name: "Arsip Surat",
            start_url: BASE_PATH + "/index.html",
            display: "standalone",
            background_color: "#ffffff",
            theme_color: "#1a73e8",
            icons: [
                { src: "assets/images/icon-192x192.svg", sizes: "192x192", type: "image/svg+xml" },
                { src: "assets/images/icon-512x512.svg", sizes: "512x512", type: "image/svg+xml" }
            ]
        };
        return JSON.stringify(obj, null, 2);
    }
    
    function generateServiceWorkerJS() {
        return 'var CACHE_NAME = "asde-v1";\n' +
            'self.addEventListener("install", function(e) {\n' +
            '  e.waitUntil(caches.open(CACHE_NAME).then(function(c) {\n' +
            '    return c.addAll(["/", "/index.html", "/offline.html"]);\n' +
            '  }));\n' +
            '});\n' +
            'self.addEventListener("fetch", function(e) {\n' +
            '  e.respondWith(fetch(e.request).catch(function() {\n' +
            '    return caches.match(e.request);\n' +
            '  }));\n' +
            '});\n';
    }
    
    function generateOfflineHTML() {
        return '<!DOCTYPE html>\n<html lang="id">\n<head>\n' +
            '<meta charset="UTF-8">\n' +
            '<meta name="viewport" content="width=device-width,initial-scale=1.0">\n' +
            '<title>Offline</title>\n' +
            '<style>body{font-family:Arial;display:flex;justify-content:center;align-items:center;' +
            'height:100vh;margin:0;background:#f5f5f5;text-align:center}h1{color:#333}</style>\n' +
            '</head>\n<body>\n<div><h1>Offline</h1><p>Check connection.</p>\n' +
            '<button onclick="location.reload()">Retry</button></div>\n</body>\n</html>';
    }
    
    function generate404HTML() {
        return '<!DOCTYPE html>\n<html>\n<head>\n<meta charset="UTF-8">\n' +
            '<script>window.location.href="' + BASE_PATH + '/"+window.location.hash;</' + 'script>\n' +
            '</head>\n<body><p>Redirecting...</p></body>\n</html>';
    }
    
    function generateConfigJS() {
        return 'var CONFIG = {\n' +
            '  APP_NAME: "Arsip Surat Digital Enterprise",\n' +
            '  APP_VERSION: "' + APP_VERSION + '",\n' +
            '  API: {\n' +
            '    BASE_URL: "' + API_URL + '",\n' +
            '    TIMEOUT: 30000\n' +
            '  },\n' +
            '  AUTH: {\n' +
            '    TOKEN_KEY: "asde_auth_token",\n' +
            '    USER_KEY: "asde_user_data"\n' +
            '  },\n' +
            '  PAGINATION: { PER_PAGE: 10 }\n' +
            '};\n' +
            'Object.freeze(CONFIG);\n' +
            'console.log("Config loaded");\n';
    }
    
    function generateApiJS() {
        return 'var api = {\n' +
            '  baseUrl: CONFIG.API.BASE_URL,\n' +
            '  token: localStorage.getItem(CONFIG.AUTH.TOKEN_KEY),\n' +
            '  request: async function(action, data) {\n' +
            '    var fd = new URLSearchParams();\n' +
            '    fd.append("action", action);\n' +
            '    fd.append("data", btoa(JSON.stringify(data || {})));\n' +
            '    if (this.token) fd.append("token", this.token);\n' +
            '    var res = await fetch(this.baseUrl, { method: "POST", body: fd });\n' +
            '    return await res.json();\n' +
            '  },\n' +
            '  login: async function(u, p) {\n' +
            '    var r = await this.request("login", { username: u, password: p });\n' +
            '    if (r.success && r.token) {\n' +
            '      this.token = r.token;\n' +
            '      localStorage.setItem(CONFIG.AUTH.TOKEN_KEY, r.token);\n' +
            '    }\n' +
            '    return r;\n' +
            '  },\n' +
            '  getDashboardStats: async function() {\n' +
            '    return await this.request("getDashboardStats");\n' +
            '  }\n' +
            '};\n' +
            'console.log("API Service ready");\n';
    }
    
    function generateAuthJS() {
        return 'var auth = {\n' +
            '  token: localStorage.getItem(CONFIG.AUTH.TOKEN_KEY),\n' +
            '  user: JSON.parse(localStorage.getItem(CONFIG.AUTH.USER_KEY) || "null"),\n' +
            '  isAuthenticated: !!localStorage.getItem(CONFIG.AUTH.TOKEN_KEY),\n' +
            '  login: async function(u, p) {\n' +
            '    var r = await api.login(u, p);\n' +
            '    if (r.success) { this.user = r.user; this.isAuthenticated = true; }\n' +
            '    return r;\n' +
            '  },\n' +
            '  logout: function() {\n' +
            '    this.token = null; this.user = null; this.isAuthenticated = false;\n' +
            '    localStorage.removeItem(CONFIG.AUTH.TOKEN_KEY);\n' +
            '    localStorage.removeItem(CONFIG.AUTH.USER_KEY);\n' +
            '  },\n' +
            '  getUser: function() { return this.user; }\n' +
            '};\n' +
            'console.log("Auth Service ready");\n';
    }
    
    function generateDatabaseJS() {
        return 'var dbService = {\n' +
            '  db: null,\n' +
            '  init: function() {\n' +
            '    var self = this;\n' +
            '    var r = indexedDB.open("ArsipSuratDB", 1);\n' +
            '    r.onsuccess = function(e) { self.db = e.target.result; };\n' +
            '    r.onupgradeneeded = function(e) {\n' +
            '      ["suratMasuk","suratKeluar","disposisi"].forEach(function(n) {\n' +
            '        if (!e.target.result.objectStoreNames.contains(n))\n' +
            '          e.target.result.createObjectStore(n, { keyPath: "id" });\n' +
            '      });\n' +
            '    };\n' +
            '  }\n' +
            '};\n' +
            'dbService.init();\n' +
            'console.log("Database ready");\n';
    }
    
    function generateRouterJS() {
        return 'var router = {\n' +
            '  routes: { "/": "dashboard", "/dashboard": "dashboard" },\n' +
            '  init: function() {\n' +
            '    var self = this;\n' +
            '    window.addEventListener("popstate", function() { self.handle(); });\n' +
            '    this.handle();\n' +
            '  },\n' +
            '  handle: function() {\n' +
            '    var p = window.location.pathname.replace("' + BASE_PATH + '", "") || "/";\n' +
            '    var route = this.routes[p] || "dashboard";\n' +
            '    window.dispatchEvent(new CustomEvent("route-change", { detail: { route: route } }));\n' +
            '  }\n' +
            '};\n' +
            'console.log("Router ready");\n';
    }
    
    function generateAppJS() {
        return 'var app = {\n' +
            '  version: "' + APP_VERSION + '",\n' +
            '  init: function() {\n' +
            '    console.log("App v" + this.version + " ready");\n' +
            '    var s = document.getElementById("app-spinner");\n' +
            '    if (s) s.classList.add("hidden");\n' +
            '  },\n' +
            '  showLogin: function() {\n' +

            '  },\n' +
            '  showDashboard: function() {\n' +
            '    document.getElementById("app-container").innerHTML = "<h1>Dashboard</h1>";\n' +
            '  }\n' +
            '};\n' +
            'document.addEventListener("DOMContentLoaded", function() { app.init(); });\n';
    }
    
    function generateModuleJS() {
        return '// Module loaded\nconsole.log("Module ready");\n';
    }
    
    function generateSpinnerJS() {
        return 'var Spinner = {\n' +
            '  show: function(id) {\n' +
            '    var el = document.getElementById(id);\n' +
            '    if (el) el.innerHTML = "<p>Loading...</p>";\n' +
            '  }\n' +
            '};\n';
    }
    
    function generateAppCSS() {
        return '/* Main Styles */\n' +
            ':root { --primary: #1a73e8; }\n' +
            'body { font-family: sans-serif; margin: 0; padding: 0; }\n';
    }
    
    function generatePrintCSS() {
        return '@media print {\n  body { background: white; }\n  .no-print { display: none; }\n}\n';
    }
    
    function generateGitignore() {
        return 'node_modules/\n.DS_Store\n*.log\n.env\nuploads/*\n!uploads/.gitkeep\n';
    }
    
    function generateReadmeMD() {
        return '# Arsip Surat Digital Enterprise\n\n' +
            'Version: ' + APP_VERSION + '\n\n' +
            '## Links\n' +
            '- Repository: https://github.com/warso-id/arsip-surat-digital-enterprise\n' +
            '- Live: https://warso-id.github.io/arsip-surat-digital-enterprise\n';
    }
    
    function generateLicense() {
        return 'MIT License\n\nCopyright (c) 2026\n\nPermission is hereby granted, free of charge...\n';
    }
    
    function generateFileContent(path) {
        if (path === 'code.gs') return generateCodeGS();
        
        var gen = {
            'manifest.json': generateManifestJSON,
            'service-worker.js': generateServiceWorkerJS,
            'offline.html': generateOfflineHTML,
            '404.html': generate404HTML,
            'assets/js/config.js': generateConfigJS,
            'assets/js/api.js': generateApiJS,
            'assets/js/auth.js': generateAuthJS,
            'assets/js/database.js': generateDatabaseJS,
            'assets/js/router.js': generateRouterJS,
            'assets/js/app.js': generateAppJS,
            'assets/js/dashboard.js': generateModuleJS,
            'assets/js/surat.js': generateModuleJS,
            'assets/js/disposisi.js': generateModuleJS,
            'assets/js/laporan.js': generateModuleJS,
            'assets/js/components/spinner.js': generateSpinnerJS,
            'assets/css/app.css': generateAppCSS,
            'assets/css/dashboard.css': generateAppCSS,
            'assets/css/surat.css': generateAppCSS,
            'assets/css/print.css': generatePrintCSS,
            '.gitignore': generateGitignore,
            'README.md': generateReadmeMD,
            'LICENSE': generateLicense
        };
        
        if (gen[path]) {
            return gen[path]();
        }
        
        return '/* ' + path + ' - Auto-generated */\n';
    }
    
    function generateMissingFiles() {
        var section = document.getElementById('generateSection');
        state.generatedFiles = [];
        
        var html = '';
        
        if (!state.apiOk) {
            var codeGS = generateCodeGS();
            state.generatedFiles.push({ path: 'code.gs', content: codeGS });
            
            html += '<h4 style="color:#f85149;">Generate code.gs (API not connected):</h4>';
            html += '<pre>' + escapeHTML(codeGS) + '</pre>';
            html += '<button class="btn btn-primary" id="dl-codegs" style="margin:5px;">Download code.gs</button>';
        }
        
        if (state.filesMissing.length > 0) {
            html += '<h4 style="color:#f85149;">Missing Files (' + state.filesMissing.length + '):</h4>';
            
            for (var i = 0; i < state.filesMissing.length; i++) {
                var path = state.filesMissing[i];
                var content = generateFileContent(path);
                
                if (content) {
                    state.generatedFiles.push({ path: path, content: content });
                    
                    html += '<div style="margin:10px 0;padding:10px;background:#0d1117;border-radius:8px;">';
                    html += '<p><strong>' + path + '</strong></p>';
                    html += '<pre>' + escapeHTML(content.substring(0, 300)) + (content.length > 300 ? '...' : '') + '</pre>';
                    html += '<button class="btn dl-btn" data-path="' + path + '" style="margin:5px;">Download</button>';
                    html += '</div>';
                }
            }
        }
        
        if (state.filesMissing.length === 0 && state.apiOk) {
            html = '<p style="color:#3fb950;font-size:18px;">All files present! No files need to be generated.</p>';
        }
        
        section.innerHTML = html;
        
        // Add click handlers for download buttons
        setTimeout(function() {
            var dlBtn = document.getElementById('dl-codegs');
            if (dlBtn) {
                dlBtn.addEventListener('click', function() {
                    var f = state.generatedFiles.find(function(x) { return x.path === 'code.gs'; });
                    if (f) {
                        downloadBlob('code.gs', f.content);
                        alert('Downloaded: code.gs');
                    }
                });
            }
            
            var dlBtns = document.querySelectorAll('.dl-btn');
            for (var i = 0; i < dlBtns.length; i++) {
                dlBtns[i].addEventListener('click', function() {
                    var p = this.getAttribute('data-path');
                    var f = state.generatedFiles.find(function(x) { return x.path === p; });
                    if (f) {
                        downloadBlob(p.split('/').pop(), f.content);
                        alert('Downloaded: ' + p.split('/').pop());
                    }
                });
            }
        }, 100);
        
        updateProgress(100, 'Done!');
    }
    
    async function runAllChecks() {
        updateProgress(0, 'Starting...');
        
        var btns = document.querySelectorAll('.btn');
        for (var i = 0; i < btns.length; i++) {
            btns[i].disabled = true;
        }
        
        try {
            await checkAPIConnection();
            await checkAllFiles();
            await detectErrors();
            generateMissingFiles();
            updateProgress(100, 'All checks complete!');
        } catch (e) {
            console.error('Error:', e);
            updateProgress(100, 'Error: ' + e.message);
        } finally {
            for (var j = 0; j < btns.length; j++) {
                btns[j].disabled = false;
            }
        }
    }
    
    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
        console.log('Troubleshooting tool ready');
        
        document.getElementById('btnAll').addEventListener('click', runAllChecks);
        document.getElementById('btnAPI').addEventListener('click', checkAPIConnection);
        document.getElementById('btnFiles').addEventListener('click', checkAllFiles);
        document.getElementById('btnErrors').addEventListener('click', detectErrors);
        document.getElementById('btnGenerate').addEventListener('click', generateMissingFiles);
        
        setTimeout(runAllChecks, 1000);
    });
    </script>
</body>
</html>
