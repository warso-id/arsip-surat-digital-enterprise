<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Generate PWA Icons</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        canvas { border: 1px solid #ccc; margin: 5px; }
        .download-btn { display: block; margin: 5px 0; }
    </style>
</head>
<body>
    <h2>PWA Icon Generator</h2>
    <p>Klik tombol download untuk menyimpan icon</p>
    <div id="icons"></div>

    <script>
        const SIZES = [72, 96, 128, 144, 152, 192, 384, 512];
        const colors = {
            primary: '#007bff',
            dark: '#0056b3',
            success: '#28a745',
            white: '#ffffff'
        };

        function drawIcon(size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            // Background rounded rect
            const radius = size * 0.2;
            ctx.beginPath();
            ctx.moveTo(radius, 0);
            ctx.lineTo(size - radius, 0);
            ctx.quadraticCurveTo(size, 0, size, radius);
            ctx.lineTo(size, size - radius);
            ctx.quadraticCurveTo(size, size, size - radius, size);
            ctx.lineTo(radius, size);
            ctx.quadraticCurveTo(0, size, 0, size - radius);
            ctx.lineTo(0, radius);
            ctx.quadraticCurveTo(0, 0, radius, 0);
            ctx.closePath();

            // Gradient
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, colors.primary);
            gradient.addColorStop(1, colors.dark);
            ctx.fillStyle = gradient;
            ctx.fill();

            // White document
            const docW = size * 0.6;
            const docH = size * 0.5;
            const docX = (size - docW) / 2;
            const docY = (size - docH) / 2;
            
            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.beginPath();
            ctx.roundRect(docX, docY, docW, docH, size * 0.05);
            ctx.fill();

            // Lines
            const lineY1 = docY + docH * 0.3;
            const lineY2 = docY + docH * 0.5;
            const lineY3 = docY + docH * 0.7;
            const lineX1 = docX + docW * 0.15;
            const lineX2 = docX + docW * 0.85;

            ctx.strokeStyle = colors.primary;
            ctx.lineWidth = size * 0.03;
            ctx.lineCap = 'round';

            ctx.beginPath();
            ctx.moveTo(lineX1, lineY1);
            ctx.lineTo(lineX2, lineY1);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(lineX1, lineY2);
            ctx.lineTo(lineX2, lineY2);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(lineX1, lineY3);
            ctx.lineTo(lineX1 + docW * 0.5, lineY3);
            ctx.stroke();

            // Checkmark
            const checkX = docX + docW + size * 0.05;
            const checkY = docY - size * 0.02;
            const checkR = size * 0.08;

            ctx.fillStyle = colors.success;
            ctx.beginPath();
            ctx.arc(checkX, checkY, checkR, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = colors.white;
            ctx.font = `bold ${checkR * 1.5}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('✓', checkX, checkY);

            return canvas;
        }

        function createDownloadLink(canvas, filename) {
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL('image/png');
            link.textContent = `Download ${filename}`;
            link.className = 'download-btn';
            return link;
        }

        const container = document.getElementById('icons');
        SIZES.forEach(size => {
            const canvas = drawIcon(size);
            const wrapper = document.createElement('div');
            wrapper.style.display = 'inline-block';
            wrapper.style.margin = '10px';
            
            wrapper.appendChild(canvas);
            wrapper.appendChild(createDownloadLink(canvas, `icon-${size}x${size}.png`));
            wrapper.appendChild(document.createElement('br'));
            
            container.appendChild(wrapper);
        });
    </script>
</body>
</html>
