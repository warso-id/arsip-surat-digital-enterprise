version: '3.8'

services:
  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: arsip-surat-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    networks:
      - arsip-network
    environment:
      - NGINX_HOST=arsip-surat.example.com
      - NGINX_PORT=80
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  # Application (for SSR if needed)
  app:
    image: node:18-alpine
    container_name: arsip-surat-app-prod
    restart: always
    working_dir: /app
    volumes:
      - ./:/app:ro
      - app-node-modules:/app/node_modules
    environment:
      - NODE_ENV=production
      - APP_ENV=production
    command: sh -c "npm ci --production && npm start"
    networks:
      - arsip-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: arsip-surat-redis-prod
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - arsip-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # MySQL Database (Optional - for local caching/analytics)
  mysql:
    image: mysql:8.0
    container_name: arsip-surat-mysql-prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: arsip_surat_enterprise
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - arsip-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # Backup Service
  backup:
    image: alpine:latest
    container_name: arsip-surat-backup
    restart: "no"
    volumes:
      - ./src/storage/backup:/backup
      - mysql-data:/mysql-data:ro
    environment:
      - BACKUP_RETENTION_DAYS=30
    entrypoint: |
      sh -c '
        apk add --no-cache mysql-client
        while true; do
          TIMESTAMP=$$(date +%Y%m%d_%H%M%S)
          echo "Creating backup $$TIMESTAMP..."
          mysqldump -h mysql -u root -p$$MYSQL_ROOT_PASSWORD arsip_surat_enterprise > /backup/backup_$$TIMESTAMP.sql
          gzip /backup/backup_$$TIMESTAMP.sql
          find /backup -name "backup_*.sql.gz" -mtime +$$BACKUP_RETENTION_DAYS -delete
          echo "Backup complete. Sleeping for 24 hours..."
          sleep 86400
        done
      '
    networks:
      - arsip-network
    depends_on:
      - mysql

networks:
  arsip-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  nginx-logs:
  app-node-modules:
  redis-data:
  mysql-data:
