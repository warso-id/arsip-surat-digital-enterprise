# ==================== DOCKER COMPOSE PRODUCTION ====================
# Arsip Surat Digital Enterprise - Production Configuration
# Usage: docker-compose -f docker-compose.yml -f docker-compose.production.yml up -d

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    container_name: arsip-surat-app-prod
    restart: always
    environment:
      - NODE_ENV=production
      - APP_DEBUG=false
      - APP_URL=${APP_URL:-https://arsipsurat.id}
      
      # Use stronger secrets in production
      - JWT_SECRET=${JWT_SECRET}
      - APP_KEY=${APP_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      
      # Production database
      - DB_CONNECTION=${DB_CONNECTION:-sqlite}
      
      # Production mail
      - MAIL_DRIVER=${MAIL_DRIVER:-smtp}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_ENCRYPTION=${MAIL_ENCRYPTION:-tls}
      
      # Security
      - CORS_ORIGINS=${CORS_ORIGINS}
      - RATE_LIMIT_WINDOW=900000
      - RATE_LIMIT_MAX=100
      
      # Logging
      - LOG_LEVEL=error
    volumes:
      - app_data_prod:/app/data
      - app_storage_prod:/app/src/storage
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ==================== NGINX REVERSE PROXY ====================
  nginx:
    image: nginx:alpine
    container_name: arsip-surat-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - app_storage_prod:/usr/share/nginx/html/storage:ro
    networks:
      - arsip-surat-network
    depends_on:
      - app
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  arsip-surat-network:
    driver: bridge

volumes:
  app_data_prod:
    name: arsip-surat-data-prod
  app_storage_prod:
    name: arsip-surat-storage-prod
