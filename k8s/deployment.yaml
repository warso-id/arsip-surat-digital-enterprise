apiVersion: apps/v1
kind: Deployment
metadata:
  name: arsip-surat
  namespace: default
  labels:
    app: arsip-surat
spec:
  replicas: 3
  selector:
    matchLabels:
      app: arsip-surat
  template:
    metadata:
      labels:
        app: arsip-surat
    spec:
      containers:
      - name: app
        image: arsip-surat:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: host
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: password
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: arsip-surat-service
spec:
  selector:
    app: arsip-surat
  ports:
  - port: 80
    targetPort: 3000
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  APP_NAME: "Arsip Surat Digital"
  APP_ENV: "production"
  APP_URL: "https://warso-id.github.io/arsip-surat-digital-enterprise/"
---
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
type: Opaque
data:
  host: bXlzcWw=  # mysql (base64 encoded)
  username: YXJzaXBfdXNlcg==  # arsip_user
  password: c2VjdXJlX3Bhc3N3b3Jk  # secure_password
