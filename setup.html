<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup - Arsip Surat Digital Enterprise v3.1.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .setup-container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 8px;
            font-size: 24px;
        }
        h2 {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
            font-weight: normal;
        }
        .section {
            margin-bottom: 24px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            border: 1px solid #e9ecef;
        }
        .section h3 {
            color: #1976D2;
            margin-bottom: 16px;
            font-size: 16px;
        }
        .form-group {
            margin-bottom: 14px;
        }
        label {
            display: block;
            margin-bottom: 4px;
            font-size: 13px;
            font-weight: 600;
            color: #555;
        }
        input, textarea {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #1976D2;
        }
        textarea {
            resize: vertical;
            min-height: 60px;
        }
        .btn-setup {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #1976D2, #1565C0);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-setup:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(25,118,210,0.4);
        }
        .btn-setup:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-check {
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            margin-bottom: 16px;
        }
        .log-container {
            margin-top: 20px;
            padding: 16px;
            background: #1e1e1e;
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #00ff00;
            display: none;
        }
        .log-entry {
            margin-bottom: 4px;
            line-height: 1.5;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .status-ready { background: #e8f5e9; color: #2e7d32; }
        .status-not-ready { background: #fff3e0; color: #e65100; }
    </style>
</head>
<body>
    <div class="setup-container">
        <h1>🚀 Setup Arsip Surat Digital</h1>
        <h2>Enterprise v3.1.0 | One-Click Installation</h2>
        
        <div id="statusSection">
            <button class="btn-check" onclick="checkSetup()">🔍 Cek Status Setup</button>
            <div id="statusResult"></div>
        </div>
        
        <form id="setupForm" onsubmit="runSetup(event)" style="display:none;">
            <div class="section">
                <h3>👤 Data Administrator</h3>
                <div class="form-group">
                    <label>Username *</label>
                    <input type="text" id="adminUsername" value="admin" required>
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="adminEmail" value="admin@instansi.go.id" required>
                </div>
                <div class="form-group">
                    <label>Password *</label>
                    <input type="text" id="adminPassword" value="admin123" required>
                </div>
                <div class="form-group">
                    <label>Nama Lengkap *</label>
                    <input type="text" id="adminNama" value="Administrator Sistem" required>
                </div>
                <div class="form-group">
                    <label>NIP</label>
                    <input type="text" id="adminNip" value="198001012010011001">
                </div>
                <div class="form-group">
                    <label>Jabatan</label>
                    <input type="text" id="adminJabatan" value="Kepala Bagian TI">
                </div>
                <div class="form-group">
                    <label>Unit Kerja</label>
                    <input type="text" id="adminUnitKerja" value="Bagian Teknologi Informasi">
                </div>
            </div>
            
            <div class="section">
                <h3>🏢 Data Instansi</h3>
                <div class="form-group">
                    <label>Nama Instansi</label>
                    <input type="text" id="instansiNama" value="Dinas Komunikasi dan Informatika">
                </div>
                <div class="form-group">
                    <label>Alamat</label>
                    <textarea id="instansiAlamat">Jl. Merdeka No. 1, Jakarta Pusat</textarea>
                </div>
                <div class="form-group">
                    <label>Telepon</label>
                    <input type="text" id="instansiTelepon" value="021-1234567">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="instansiEmail" value="info@diskominfo.go.id">
                </div>
            </div>
            
            <button type="submit" class="btn-setup" id="btnSetup">
                🚀 Jalankan Setup
            </button>
        </form>
        
        <div class="log-container" id="logContainer"></div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxhx4JXI_yX9MIEhYmSVAjxy-_9McM0-2WKzA2OvW4h8T9QT2nh5bJcio0KiWEyL4VRsQ/exec';
        
        // Cek status setup
        async function checkSetup() {
            const statusResult = document.getElementById('statusResult');
            statusResult.innerHTML = '<p style="color:#666;">⏳ Mengecek status...</p>';
            
            try {
                const response = await fetch(API_URL + '?action=checkSetup');
                const data = await response.json();
                
                if (data.data && data.data.isSetup) {
                    statusResult.innerHTML = `
                        <span class="status-badge status-ready">✅ SUDAH DI-SETUP</span>
                        <p style="color:#666;font-size:13px;">Setup at: ${data.data.setupAt || 'Unknown'}</p>
                        <p style="color:#666;font-size:13px;">Folders Ready: ${data.data.foldersReady ? '✅ Yes' : '⚠️ No'}</p>
                        <p style="color:#2e7d32;font-size:13px;margin-top:8px;">Sistem sudah siap digunakan. <a href="/login.html" style="color:#1976D2;">Login di sini</a></p>
                    `;
                } else {
                    statusResult.innerHTML = `
                        <span class="status-badge status-not-ready">⚠️ BELUM DI-SETUP</span>
                        <p style="color:#666;font-size:13px;">${data.data?.message || 'Sistem perlu diinisialisasi'}</p>
                    `;
                    document.getElementById('setupForm').style.display = 'block';
                }
            } catch (error) {
                statusResult.innerHTML = `
                    <span class="status-badge status-not-ready">❌ GAGAL MENGECEK</span>
                    <p style="color:#e65100;font-size:13px;">Error: ${error.message}</p>
                    <p style="color:#666;font-size:12px;margin-top:4px;">Pastikan URL API benar dan ada koneksi internet.</p>
                `;
            }
        }
        
        // Jalankan setup
        async function runSetup(event) {
            event.preventDefault();
            
            const btnSetup = document.getElementById('btnSetup');
            const logContainer = document.getElementById('logContainer');
            
            btnSetup.disabled = true;
            btnSetup.textContent = '⏳ Menjalankan Setup...';
            logContainer.style.display = 'block';
            logContainer.innerHTML = '<div class="log-entry">🚀 Memulai setup...</div>';
            
            const setupData = {
                admin: {
                    username: document.getElementById('adminUsername').value,
                    email: document.getElementById('adminEmail').value,
                    password: document.getElementById('adminPassword').value,
                    namaLengkap: document.getElementById('adminNama').value,
                    nip: document.getElementById('adminNip').value,
                    jabatan: document.getElementById('adminJabatan').value,
                    unitKerja: document.getElementById('adminUnitKerja').value,
                },
                instansi: {
                    nama: document.getElementById('instansiNama').value,
                    alamat: document.getElementById('instansiAlamat').value,
                    telepon: document.getElementById('instansiTelepon').value,
                    email: document.getElementById('instansiEmail').value,
                }
            };
            
            addLog('📤 Mengirim data setup...');
            addLog('📋 Admin: ' + setupData.admin.username);
            addLog('🏢 Instansi: ' + setupData.instansi.nama);
            
            try {
                const response = await fetch(API_URL + '?action=setup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(setupData)
                });
                
                addLog('📥 Menerima response...');
                
                const data = await response.json();
                
                addLog('✅ Status: ' + data.status);
                addLog('📝 Message: ' + (data.message || 'No message'));
                
                if (data.logs && data.logs.length > 0) {
                    addLog('--- Log Detail ---');
                    data.logs.forEach(log => {
                        addLog(log);
                    });
                }
                
                if (data.status === 'success') {
                    addLog('🎉 SETUP BERHASIL!');
                    addLog('👤 Admin Username: ' + (data.data?.adminUsername || 'admin'));
                    addLog('📊 Total Sheets: ' + (data.data?.totalSheets || '?'));
                    addLog('⏱️ Duration: ' + (data.data?.setupDuration || '?'));
                    addLog('');
                    addLog('🔗 Silakan login di: /login.html');
                    addLog('🔑 Username: ' + setupData.admin.username);
                    addLog('🔑 Password: ' + setupData.admin.password);
                    
                    btnSetup.textContent = '✅ Setup Berhasil!';
                    
                    // Tampilkan link login
                    setTimeout(() => {
                        if (confirm('Setup berhasil! Ingin langsung ke halaman login?')) {
                            window.location.href = '/login.html';
                        }
                    }, 1000);
                    
                } else {
                    addLog('❌ Setup GAGAL: ' + (data.message || 'Unknown error'));
                    btnSetup.textContent = '🔄 Coba Lagi';
                    btnSetup.disabled = false;
                }
                
            } catch (error) {
                addLog('❌ ERROR: ' + error.message);
                addLog('⚠️ Pastikan:');
                addLog('   1. Koneksi internet aktif');
                addLog('   2. URL API benar');
                addLog('   3. Google Apps Script sudah di-deploy');
                addLog('   4. SPREADSHEET_ID valid');
                
                btnSetup.textContent = '🔄 Coba Lagi';
                btnSetup.disabled = false;
            }
        }
        
        function addLog(message) {
            const logContainer = document.getElementById('logContainer');
            logContainer.innerHTML += '<div class="log-entry">' + message + '</div>';
            logContainer.scrollTop = logContainer.scrollHeight;
        }
        
        // Auto-check saat halaman dibuka
        window.addEventListener('DOMContentLoaded', () => {
            checkSetup();
        });
    </script>
</body>
</html>
