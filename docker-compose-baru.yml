version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: arsip_mysql
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-arsip_surat}
      MYSQL_USER: ${DB_USERNAME:-arsip_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-arsip_password}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - arsip_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: arsip_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispassword}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - arsip_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 5s
      retries: 5

  # Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arsip_app
    restart: unless-stopped
    environment:
      - NODE_ENV=${APP_ENV:-development}
      - APP_PORT=3000
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-arsip_surat}
      - DB_USERNAME=${DB_USERNAME:-arsip_user}
      - DB_PASSWORD=${DB_PASSWORD:-arsip_password}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redispassword}
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./views:/app/views
      - uploads_data:/app/uploads
      - backups_data:/app/backups
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - arsip_network
    command: >
      sh -c "npm run migrate && npm start"

  # Nginx Reverse Proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: arsip_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./public:/var/www/html/public
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - app
    networks:
      - arsip_network

  # Backup Service
  backup:
    image: alpine:latest
    container_name: arsip_backup
    volumes:
      - mysql_data:/var/lib/mysql:ro
      - uploads_data:/uploads:ro
      - backups_data:/backups
      - ./tools/backup.sh:/backup.sh:ro
    environment:
      - DB_HOST=mysql
      - DB_USER=${DB_USERNAME:-arsip_user}
      - DB_PASSWORD=${DB_PASSWORD:-arsip_password}
      - DB_NAME=${DB_DATABASE:-arsip_surat}
      - RETENTION_DAYS=30
    entrypoint: ["/bin/sh"]
    command: >
      -c "
      apk add --no-cache mysql-client &&
      echo '0 2 * * * /backup.sh' > /etc/crontabs/root &&
      crond -f
      "
    depends_on:
      - mysql
    networks:
      - arsip_network

networks:
  arsip_network:
    driver: bridge

volumes:
  mysql_data:
    name: arsip_mysql_data
  redis_data:
    name: arsip_redis_data
  uploads_data:
    name: arsip_uploads_data
  backups_data:
    name: arsip_backups_data
