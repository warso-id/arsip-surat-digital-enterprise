# ==================== DOCKER COMPOSE ====================
# Arsip Surat Digital Enterprise
# Version: 2.1.0

version: '3.8'

services:
  # ==================== APPLICATION ====================
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
    container_name: arsip-surat-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=development
      - APP_NAME=${APP_NAME:-Arsip Surat Digital Enterprise}
      - APP_URL=${APP_URL:-http://localhost:3000}
      - APP_PORT=3000
      - APP_DEBUG=${APP_DEBUG:-true}
      - APP_TIMEZONE=${APP_TIMEZONE:-Asia/Jakarta}
      
      # Database
      - DB_CONNECTION=${DB_CONNECTION:-sqlite}
      - DB_SQLITE_PATH=/app/data/database.sqlite
      
      # JWT
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-24h}
      
      # Session
      - SESSION_DRIVER=${SESSION_DRIVER:-jwt}
      
      # Storage
      - STORAGE_DISK=${STORAGE_DISK:-local}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-10485760}
      
      # Mail
      - MAIL_DRIVER=${MAIL_DRIVER:-smtp}
      - MAIL_HOST=${MAIL_HOST:-mailhog}
      - MAIL_PORT=${MAIL_PORT:-1025}
      
      # Security
      - CORS_ENABLED=true
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - RATE_LIMIT_ENABLED=true
      
      # PWA
      - PWA_ENABLED=true
      
      # Logging
      - LOG_CHANNEL=daily
      - LOG_LEVEL=${LOG_LEVEL:-debug}
    volumes:
      - .:/app
      - /app/node_modules
      - app_data:/app/data
      - app_storage:/app/src/storage
      - app_logs:/app/src/storage/logs
    networks:
      - arsip-surat-network
    depends_on:
      - mailhog
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: >
      sh -c "npm run migrate && npm run seed && npm run dev"

  # ==================== MAILHOG (Email Testing) ====================
  mailhog:
    image: mailhog/mailhog:latest
    container_name: arsip-surat-mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_PORT:-8025}:8025"
      - "1025:1025"
    networks:
      - arsip-surat-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== OPTIONAL: MYSQL DATABASE ====================
  # Uncomment if using MySQL instead of SQLite
  # mysql:
  #   image: mysql:8.0
