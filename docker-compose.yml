  #     MYSQL_DATABASE: ${DB_DATABASE:-arsip_surat}
  #     MYSQL_USER: ${DB_USERNAME:-arsip_user}
  #     MYSQL_PASSWORD: ${DB_PASSWORD:-arsip_password}
  #   ports:
  #     - "${MYSQL_PORT:-3306}:3306"
  #   volumes:
  #     - mysql_data:/var/lib/mysql
  #     - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
  #   networks:
  #     - arsip-surat-network
  #   healthcheck:
  #     test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # ==================== OPTIONAL: REDIS ====================
  # Uncomment if using Redis for cache/queue
  # redis:
  #   image: redis:7-alpine
  #   container_name: arsip-surat-redis
  #   restart: unless-stopped
  #   ports:
  #     - "${REDIS_PORT:-6379}:6379"
  #   volumes:
  #     - redis_data:/data
  #   networks:
