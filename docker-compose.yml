version: '3.8'

services:
  # Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arsip-surat-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - APP_PORT=3000
      - DB_HOST=database
      - DB_PORT=5432
      - DB_DATABASE=arsip_surat
      - DB_USERNAME=postgres
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
    volumes:
      - app_storage:/app/storage/app
      - app_logs:/app/storage/logs
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - arsip-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Database
  database:
    image: postgres:15-alpine
    container_name: arsip-surat-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: arsip_surat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - arsip-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching & sessions
  redis:
    image: redis:7-alpine
    container_name: arsip-surat-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - arsip-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: arsip-surat-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
      - app_storage:/app/storage:ro
    depends_on:
      - app
    networks:
      - arsip-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_storage:
    driver: local
  app_logs:
    driver: local

networks:
  arsip-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
