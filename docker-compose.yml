version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: arsip-surat-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=${APP_ENV:-production}
      - DB_HOST=database
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-arsip_surat}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
    volumes:
      - ./storage/app:/app/storage/app
      - ./storage/logs:/app/storage/logs
    depends_on:
      database:
        condition: service_healthy
    networks:
      - arsip-network

  database:
    image: postgres:15-alpine
    container_name: arsip-surat-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-arsip_surat}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arsip-network

  nginx:
    image: nginx:alpine
    container_name: arsip-surat-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./src/public:/app/public
    depends_on:
      - app
    networks:
      - arsip-network

  redis:
    image: redis:alpine
    container_name: arsip-surat-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - arsip-network

volumes:
  postgres_data:

networks:
  arsip-network:
    driver: bridge
