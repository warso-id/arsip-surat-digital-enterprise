# ============================================================
# ARSIP SURAT DIGITAL ENTERPRISE v3.0.0
# Docker Compose Configuration
# ============================================================

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arsip-surat-enterprise
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - GAS_API_URL=https://script.google.com/macros/s/AKfycbwblauw29Cv8rmrjQHhfXgdl0csBHlxO3xvZJimyBsSyA4F5f9qH25Ej5QYIu--OGy6Bw/exec
    volumes:
      - ./data:/usr/share/nginx/html/data
      - ./logs:/var/log/nginx
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  # Optional: Reverse Proxy with SSL
  nginx-proxy:
    image: nginx:alpine
    container_name: arsip-surat-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl
      - ./certbot/www:/var/www/certbot
    depends_on:
      - app
    networks:
      - app-network

  # Optional: SSL Certificate with Certbot
  certbot:
    image: certbot/certbot
    container_name: arsip-surat-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  app-network:
    driver: bridge

volumes:
  data:
    driver: local
  logs:
    driver: local
