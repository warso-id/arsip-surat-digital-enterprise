version: '3.8'

services:
  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: arsip-surat-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./src/storage/logs/nginx:/var/log/nginx
    networks:
      - arsip-network
    depends_on:
      - app

  # Application Service
  app:
    image: node:18-alpine
    container_name: arsip-surat-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - /var/www/html/node_modules
    environment:
      - NODE_ENV=production
      - APP_ENV=production
    command: sh -c "npm install && npm start"
    networks:
      - arsip-network
    depends_on:
      - redis

  # Redis for caching
  redis:
    image: redis:alpine
    container_name: arsip-surat-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - arsip-network

  # MySQL Database (optional, for local development)
  mysql:
    image: mysql:8.0
    container_name: arsip-surat-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: enterprise2026
      MYSQL_DATABASE: arsip_surat_enterprise
      MYSQL_USER: arsip_user
      MYSQL_PASSWORD: arsip_pass_2026
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - arsip-network

  # phpMyAdmin (for database management)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: arsip-surat-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 100M
    ports:
      - "8080:80"
    networks:
      - arsip-network
    depends_on:
      - mysql

networks:
  arsip-network:
    driver: bridge

volumes:
  redis-data:
  mysql-data:
