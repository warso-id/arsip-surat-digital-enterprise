<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
    <rect width="800" height="500" rx="15" fill="#f8f9fa"/>
    
    <!-- Header -->
    <rect x="0" y="0" width="800" height="50" fill="#007bff"/>
    <circle cx="30" cy="25" r="15" fill="white" opacity="0.3"/>
    <rect x="55" y="18" width="100" height="14" rx="7" fill="white" opacity="0.8"/>
    
    <!-- Sidebar -->
    <rect x="0" y="50" width="60" height="450" fill="#1a1a2e"/>
    <rect x="10" y="70" width="40" height="8" rx="4" fill="white" opacity="0.3"/>
    <rect x="10" y="90" width="40" height="8" rx="4" fill="white" opacity="0.3"/>
    <rect x="10" y="110" width="30" height="8" rx="4" fill="white" opacity="0.3"/>
    
    <!-- Stats Cards -->
    <rect x="80" y="70" width="220" height="80" rx="10" fill="white" stroke="#e0e0e0"/>
    <rect x="90" y="85" width="40" height="20" rx="5" fill="#007bff" opacity="0.2"/>
    <rect x="140" y="85" width="80" height="8" rx="4" fill="#666"/>
    <rect x="140" y="100" width="120" height="20" rx="4" fill="#007bff"/>
    <text x="150" y="115" font-size="14" fill="white" font-weight="bold">1,234</text>
    
    <rect x="310" y="70" width="220" height="80" rx="10" fill="white" stroke="#e0e0e0"/>
    <rect x="320" y="85" width="40" height="20" rx="5" fill="#28a745" opacity="0.2"/>
    <rect x="370" y="85" width="80" height="8" rx="4" fill="#666"/>
    <rect x="370" y="100" width="120" height="20" rx="4" fill="#28a745"/>
    <text x="380" y="115" font-size="14" fill="white" font-weight="bold">567</text>
    
    <rect x="540" y="70" width="220" height="80" rx="10" fill="white" stroke="#e0e0e0"/>
    <rect x="550" y="85" width="40" height="20" rx="5" fill="#ffc107" opacity="0.2"/>
    <rect x="600" y="85" width="80" height="8" rx="4" fill="#666"/>
    <rect x="600" y="100" width="120" height="20" rx="4" fill="#ffc107"/>
    <text x="610" y="115" font-size="14" fill="white" font-weight="bold">89</text>
    
    <!-- Chart Area -->
    <rect x="80" y="170" width="680" height="200" rx="10" fill="white" stroke="#e0e0e0"/>
    <text x="100" y="195" font-size="12" fill="#666">Statistik Surat</text>
    
    <!-- Chart Bars -->
    <rect x="120" y="220" width="40" height="130" rx="5" fill="#007bff" opacity="0.7"/>
    <rect x="180" y="240" width="40" height="110" rx="5" fill="#007bff" opacity="0.7"/>
    <rect x="240" y="200" width="40" height="150" rx="5" fill="#28a745" opacity="0.7"/>
    <rect x="300" y="260" width="40" height="90" rx="5" fill="#28a745" opacity="0.7"/>
    <rect x="360" y="230" width="40" height="120" rx="5" fill="#ffc107" opacity="0.7"/>
    <rect x="420" y="250" width="40" height="100" rx="5" fill="#ffc107" opacity="0.7"/>
    <rect x="480" y="210" width="40" height="140" rx="5" fill="#17a2b8" opacity="0.7"/>
    <rect x="540" y="270" width="40" height="80" rx="5" fill="#17a2b8" opacity="0.7"/>
    <rect x="600" y="235" width="40" height="115" rx="5" fill="#6f42c1" opacity="0.7"/>
    
    <!-- Table -->
    <rect x="80" y="390" width="680" height="90" rx="10" fill="white" stroke="#e0e0e0"/>
    <rect x="90" y="400" width="660" height="1" fill="#e0e0e0"/>
    <rect x="90" y="420" width="660" height="1" fill="#e0e0e0"/>
    <rect x="90" y="440" width="660" height="1" fill="#e0e0e0"/>
    
    <rect x="100" y="405" width="50" height="8" rx="4" fill="#666"/>
    <rect x="200" y="405" width="80" height="8" rx="4" fill="#007bff"/>
    <rect x="350" y="405" width="100" height="8" rx="4" fill="#666"/>
    <rect x="500" y="405" width="60" height="8" rx="4" fill="#28a745"/>
    
    <rect x="100" y="425" width="50" height="8" rx="4" fill="#666"/>
    <rect x="200" y="425" width="80" height="8" rx="4" fill="#007bff"/>
    <rect x="350" y="425" width="100" height="8" rx="4" fill="#666"/>
    <rect x="500" y="425" width="60" height="8" rx="4" fill="#ffc107"/>
    
    <rect x="100" y="445" width="50" height="8" rx="4" fill="#666"/>
    <rect x="200" y="445" width="80" height="8" rx="4" fill="#007bff"/>
    <rect x="350" y="445" width="100" height="8" rx="4" fill="#666"/>
    <rect x="500" y="445" width="60" height="8" rx="4" fill="#28a745"/>
</svg>
