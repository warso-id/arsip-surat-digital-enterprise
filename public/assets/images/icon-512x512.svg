<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#007bff;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0056b3;stop-opacity:1" />
        </linearGradient>
    </defs>
    <!-- Background -->
    <rect width="512" height="512" rx="102" fill="url(#grad)"/>
    
    <!-- Document Icon -->
    <g transform="translate(256,256) scale(5.12)">
        <rect x="-30" y="-25" width="60" height="50" rx="5" fill="white" opacity="0.9"/>
        <line x1="-20" y1="-15" x2="20" y2="-15" stroke="#007bff" stroke-width="3" stroke-linecap="round"/>
        <line x1="-20" y1="-5" x2="20" y2="-5" stroke="#007bff" stroke-width="3" stroke-linecap="round"/>
        <line x1="-20" y1="5" x2="10" y2="5" stroke="#007bff" stroke-width="3" stroke-linecap="round"/>
        
        <!-- Checkmark circle -->
        <circle cx="25" cy="-20" r="8" fill="#28a745"/>
        <text x="25" y="-17" text-anchor="middle" fill="white" font-size="10" font-weight="bold">✓</text>
    </g>
</svg>
