name: CD - Deploy to Staging

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

env:
  APP_ENV: staging
  APP_NAME: arsip-surat-digital-staging

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Create .env file
      run: |
        cat > .env << EOF
        APP_ENV=staging
        APP_NAME=Arsip Surat Digital Staging
        APP_DEBUG=true
        APP_URL=https://staging.arsip-surat.example.com
        GAS_SCRIPT_URL=${{ secrets.GAS_SCRIPT_URL }}
        GAS_API_KEY=${{ secrets.STAGING_GAS_API_KEY }}
        JWT_SECRET=${{ secrets.STAGING_JWT_SECRET }}
        ENCRYPTION_KEY=${{ secrets.STAGING_ENCRYPTION_KEY }}
        EOF
    
    - name: Run tests
      run: npm test
    
    - name: Build application
      run: npm run build
    
    - name: Deploy to Netlify (Staging)
      uses: nwtgck/actions-netlify@v2
      with:
        publish-dir: './dist'
        production-branch: develop
        github-token: ${{ secrets.GITHUB_TOKEN }}
        deploy-message: "Deploy from GitHub Actions - Staging"
        enable-pull-request-comment: true
        enable-commit-comment: true
        overwrites-pull-request-comment: true
        alias: staging
      env:
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_STAGING_SITE_ID }}
    
    - name: Run database migrations
      run: |
        curl -X POST ${{ secrets.GAS_SCRIPT_URL }} \
          -H "Content-Type: application/json" \
          -d '{"action":"migration_run_all","token":"${{ secrets.DEPLOY_TOKEN }}"}'
    
    - name: Seed demo data
      run: bash tools/seed-demo-data.sh
      env:
        API_URL: ${{ secrets.GAS_SCRIPT_URL }}
    
    - name: Notify deployment success
      uses: 8398a7/action-slack@v3
      with:
        status: success
        text: '✅ Staging deployment successful!'
        fields: repo,commit,message,author,workflow
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
