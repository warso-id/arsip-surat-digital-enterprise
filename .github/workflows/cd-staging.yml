name: Deploy to Staging

on:
  push:
    branches: [ develop ]
  workflow_dispatch:
    inputs:
      deploy_confirm:
        description: 'Confirm deployment to staging?'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'

env:
  NODE_VERSION: '18'
  APP_ENV: staging
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==================== CHECK PREREQUISITES ====================
  check:
    name: Pre-deployment Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Verify branch
        run: |
          if [ "${{ github.ref }}" != "refs/heads/develop" ]; then
            echo "⚠️ Deployment hanya diizinkan dari branch develop"
            exit 1
          fi
      
      - name: Check for CHANGELOG update
        run: |
          if ! git diff --name-only HEAD~1 | grep -q "CHANGELOG.md"; then
            echo "⚠️ CHANGELOG.md belum diupdate"
            echo "Silakan update CHANGELOG.md sebelum deploy"
            # exit 1  # Uncomment to enforce
          fi
      
      - name: Check test status
        run: echo "✅ Pre-deployment checks passed"

  # ==================== BUILD & TEST ====================
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: check
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm test
      
      - name: Build application
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: staging-build
          path: dist/
          retention-days: 1

  # ==================== DOCKER BUILD & PUSH ====================
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=staging-
            type=raw,value=staging-latest
      
      - name: Build and push Docker image
        uses: docker/buildx-action@v3
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=staging

  # ==================== DEPLOY TO STAGING SERVER ====================
  deploy:
    name: Deploy to Staging Server
    runs-on: ubuntu-latest
    needs: docker
    environment:
      name: staging
      url: https://staging.arsipsurat.id
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      
      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts
      
      - name: Copy docker-compose to server
        run: |
          scp docker-compose.yml ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/opt/arsip-surat/
          scp docker-compose.override.staging.yml ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/opt/arsip-surat/docker-compose.override.yml
      
      - name: Deploy to staging
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/arsip-surat
            
            # Pull latest images
            docker compose pull
            
            # Run database migrations
            docker compose run --rm app npm run db:migrate
            
            # Deploy new version
            docker compose up -d --remove-orphans
            
            # Clean up old images
            docker image prune -f
            
            # Health check
            sleep 10
            curl -f http://localhost:3000/api/health || exit 1
            
            echo "✅ Deploy to staging successful!"

  # ==================== POST-DEPLOYMENT TESTS ====================
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    
    steps:
      - name: Check health endpoint
        run: |
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://staging.arsipsurat.id/api/health)
            if [ $STATUS -eq 200 ]; then
              echo "✅ Application is healthy"
              exit 0
            fi
            echo "Waiting for application... (attempt $i/30)"
            sleep 10
          done
          echo "❌ Application failed to start"
          exit 1
      
      - name: Test API endpoints
        run: |
          # Test public endpoint
          curl -f https://staging.arsipsurat.id/api/health
          
          # Test auth endpoint
          curl -f -X POST https://staging.arsipsurat.id/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"test@test.com","password":"test"}'
          
          echo "✅ Smoke tests passed"

  # ==================== NOTIFICATION ====================
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [deploy, smoke-test]
    if: always()
    
    steps:
      - name: Notify on Success
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ Deploy to *STAGING* successful!\n• Branch: ${{ github.ref_name }}\n• Commit: ${{ github.sha }}\n• URL: https://staging.arsipsurat.id\n• By: ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      
      - name: Notify on Failure
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "❌ Deploy to *STAGING* FAILED!\n• Branch: ${{ github.ref_name }}\n• Commit: ${{ github.sha }}\n• By: ${{ github.actor }}\n• See: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
