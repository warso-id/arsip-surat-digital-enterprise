name: Database Backup

on:
  schedule:
    - cron: '0 2 * * *'  # Every day at 2 AM UTC
  workflow_dispatch:

env:
  BACKUP_RETENTION_DAYS: 30

jobs:
  backup-staging:
    name: Backup Staging Database
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
      - name: Create staging backup
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/arsip-surat
            
            # Create backup directory
            mkdir -p /opt/backups/staging
            
            # Create backup with timestamp
            BACKUP_FILE="/opt/backups/staging/backup_$(date +%Y%m%d_%H%M%S).sql.gz"
            docker compose exec -T database pg_dump -U postgres arsip_surat | gzip > $BACKUP_FILE
            
            # Clean up old backups
            find /opt/backups/staging -name "backup_*.sql.gz" -mtime +${{ env.BACKUP_RETENTION_DAYS }} -delete
            
            # Show backup size
            ls -lh $BACKUP_FILE
            
            echo "✅ Staging backup completed: $BACKUP_FILE"

  backup-production:
    name: Backup Production Database
    runs-on: ubuntu-latest
    environment: production
    needs: backup-staging
    
    steps:
      - name: Create production backup
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/arsip-surat
            
            # Create backup directory
            mkdir -p /opt/backups/production
            
            # Create backup with timestamp
            BACKUP_FILE="/opt/backups/production/backup_$(date +%Y%m%d_%H%M%S).sql.gz"
            docker compose exec -T database pg_dump -U postgres arsip_surat | gzip > $BACKUP_FILE
            
            # Verify backup
            if [ -s "$BACKUP_FILE" ]; then
              echo "✅ Backup verified: $BACKUP_FILE ($(du -h $BACKUP_FILE | cut -f1))"
            else
              echo "❌ Backup failed: Empty file"
              exit 1
            fi
            
            # Clean up old backups
            find /opt/backups/production -name "backup_*.sql.gz" -mtime +${{ env.BACKUP_RETENTION_DAYS }} -delete
            
            # Sync to cloud storage (optional)
            # rclone sync /opt/backups/production remote:arsip-surat-backups/
            
            echo "✅ Production backup completed"

  notify:
    name: Send Backup Report
    runs-on: ubuntu-latest
    needs: [backup-staging, backup-production]
    if: always()
    
    steps:
      - name: Notify backup status
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "💾 Database Backup Report\n• Staging: ${{ needs.backup-staging.result }}\n• Production: ${{ needs.backup-production.result }}\n• Time: $(date -u)"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
