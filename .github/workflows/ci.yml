# ============================================
# ENTERPRISE CI/CD PIPELINE
# ============================================

name: Enterprise CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  APP_NAME: arsip-surat-digital-enterprise
  DEPLOY_PATH: /var/www/html/arsip-surat

jobs:
  # Code Quality Check
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npx eslint . --ext .js,.html
      
      - name: Run HTML Validator
        run: npx html-validate index.html offline.html 404.html
      
      - name: Check File Structure
        run: |
          test -f index.html
          test -f manifest.json
          test -f service-worker.js
          test -f assets/js/app.js
          test -d assets/css
          test -d assets/images
          echo "✅ File structure valid"

  # Testing
  test:
    name: Testing
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Run Tests
        run: |
          echo "Running unit tests..."
          # Add your test commands here
          echo "✅ Tests passed"

  # Build & Deploy
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Create Build Directory
        run: |
          mkdir -p dist
          cp -r index.html manifest.json service-worker.js offline.html 404.html troubleshooting.html dist/
          cp -r assets dist/
          cp README.md LICENSE dist/
      
      - name: Minify CSS
        run: |
          npx cleancss -o dist/assets/css/app.min.css dist/assets/css/app.css
          npx cleancss -o dist/assets/css/dashboard.min.css dist/assets/css/dashboard.css
          npx cleancss -o dist/assets/css/surat.min.css dist/assets/css/surat.css
          npx cleancss -o dist/assets/css/print.min.css dist/assets/css/print.css
      
      - name: Minify JS
        run: |
          npx terser dist/assets/js/config.js -o dist/assets/js/config.min.js
          npx terser dist/assets/js/database.js -o dist/assets/js/database.min.js
          npx terser dist/assets/js/api.js -o dist/assets/js/api.min.js
          npx terser dist/assets/js/auth.js -o dist/assets/js/auth.min.js
          npx terser dist/assets/js/router.js -o dist/assets/js/router.min.js
          npx terser dist/assets/js/app.js -o dist/assets/js/app.min.js
      
      - name: Generate Version File
        run: |
          echo "{\"version\":\"$(date +%Y.%m.%d)\",\"build\":\"${{ github.run_number }}\",\"commit\":\"${{ github.sha }}\"}" > dist/version.json
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          cname: arsip-surat.example.com
      
      - name: Deploy to FTP Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ env.DEPLOY_PATH }}/

  # Release
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'release'
    
    steps:
      - name: Download Build
        uses: actions/download-artifact@v4
        with:
          name: build
          path: dist
      
      - name: Create ZIP Archive
        run: |
          cd dist
          zip -r ../${{ env.APP_NAME }}-${{ github.ref_name }}.zip .
      
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.APP_NAME }}-${{ github.ref_name }}.zip
          body: |
            ## 🚀 Arsip Surat Digital Enterprise v${{ github.ref_name }}
            
            ### Fitur Baru:
            - Base64 encoding untuk keamanan data
            - Google Spreadsheet integration
            - Full PWA support
            - Offline-first architecture
            - Background sync
            
            ### Instalasi:
            1. Download file ZIP
            2. Extract ke web server
            3. Konfigurasi API URL di `assets/js/config.js`
            4. Buka di browser
            
            ### System Requirements:
            - Web Server (Apache/Nginx)
            - HTTPS (required for PWA)
            - Google Apps Script (untuk backend)
          draft: false
          prerelease: false
