name: CD - Deploy to Production

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy'
        required: true
        default: '2026.1.0'

env:
  APP_ENV: production
  APP_NAME: arsip-surat-digital

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci --production
    
    - name: Create .env file
      run: |
        cat > .env << EOF
        APP_ENV=production
        APP_NAME=Arsip Surat Digital Enterprise
        APP_DEBUG=false
        APP_URL=https://arsip-surat.example.com
        GAS_SCRIPT_URL=${{ secrets.GAS_SCRIPT_URL }}
        GAS_API_KEY=${{ secrets.PROD_GAS_API_KEY }}
        JWT_SECRET=${{ secrets.PROD_JWT_SECRET }}
        ENCRYPTION_KEY=${{ secrets.PROD_ENCRYPTION_KEY }}
        CORS_ALLOWED_ORIGINS=${{ secrets.PROD_CORS_ORIGINS }}
        EOF
    
    - name: Build application
      run: npm run build
    
    - name: Optimize assets
      run: |
        npx imagemin dist/images/* --out-dir=dist/images/optimized
        npx terser dist/js/*.js -o dist/js/app.min.js -c -m
    
    - name: Deploy to Netlify (Production)
      uses: nwtgck/actions-netlify@v2
      with:
        publish-dir: './dist'
        production-branch: main
        production-deploy: true
        github-token: ${{ secrets.GITHUB_TOKEN }}
        deploy-message: "Production Deploy v${{ github.event.inputs.version || github.ref_name }}"
      env:
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_PROD_SITE_ID }}
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        name: Release ${{ github.event.inputs.version || github.ref_name }}
        body: |
          ## 🚀 Production Release
          
          ### Changes
          - Full enterprise features
          - PWA support
          - CRUD operations
          - Google Apps Script integration
          
          ### Deployment Info
          - Environment: Production
          - Version: ${{ github.event.inputs.version || github.ref_name }}
          - Deployed at: ${{ github.event.workflow }}
        files: |
          dist/**
          CHANGELOG.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Run health check
      run: |
        for i in {1..30}; do
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://arsip-surat.example.com/health)
          if [ "$STATUS" = "200" ]; then
            echo "✅ Health check passed"
            exit 0
          fi
          echo "Waiting for deployment... attempt $i"
          sleep 10
        done
        echo "❌ Health check failed"
        exit 1
    
    - name: Notify deployment success
      uses: 8398a7/action-slack@v3
      with:
        status: success
        text: '🚀 Production deployment successful! v${{ github.event.inputs.version || github.ref_name }}'
        fields: repo,commit,message,author,workflow,ref
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
