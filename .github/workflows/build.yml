# ============================================
# CI/CD BUILD WORKFLOW
# ARSIP SURAT DIGITAL ENTERPRISE v3.2.2
# File: .github/workflows/build.yml
# Support: Google Apps Script + Google Sheets + Frontend
# ============================================

name: Build & Test

# Trigger conditions
on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy after build?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

# Environment variables
env:
  NODE_VERSION: '18'
  APP_NAME: Arsip Surat Digital Enterprise
  APP_VERSION: 3.2.2

# Prevent concurrent runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # VALIDATION JOB
  # ============================================
  validate:
    name: 🔍 Validate Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint src/js/**/*.js --format json > eslint-report.json
        continue-on-error: true

      - name: Upload ESLint report
        uses: actions/upload-artifact@v4
        with:
          name: eslint-report
          path: eslint-report.json

      - name: Run code validation
        run: node tools/validate.js --src ./src --no-fail

      - name: Check file naming conventions
        run: |
          echo "Checking file naming..."
          find src/js -name "*.js" ! -name "*.test.js" ! -name "*.min.js" | while read file; do
            filename=$(basename "$file")
            if ! echo "$filename" | grep -qE '^[a-z][a-z0-9.-]*\.js$'; then
              echo "⚠️  Warning: $file does not follow naming convention"
            fi
          done

  # ============================================
  # TEST JOB
  # ============================================
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    needs: validate
    
    strategy:
      matrix:
        test-type: [unit, integration]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ${{ matrix.test-type }} tests
        run: |
          if [ "${{ matrix.test-type }}" = "unit" ]; then
            npx jest tests/unit --coverage --coverageReporters=json-summary
          else
            npx jest tests/integration --coverage --coverageReporters=json-summary
          fi
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.test-type }}
          path: |
            coverage/
            test-results.json

      - name: Check coverage threshold
        run: |
          COVERAGE=$(node -e "const c = require('./coverage/coverage-summary.json'); console.log(c.total.lines.pct)")
          echo "Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "⚠️  Coverage below 70% threshold"
          fi

  # ============================================
  # BUILD JOB
  # ============================================
  build:
    name: 📦 Build Application
    runs-on: ubuntu-latest
    needs: [validate, test]
    if: github.event_name == 'push' || github.event.inputs.deploy == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: node tools/generate-icons.js

      - name: Build application
        run: node tools/build.js

      - name: Minify assets
        run: node tools/minify.js

      - name: Generate build report
        run: |
          echo "Build completed at $(date)" > build/build-info.txt
          echo "Version: ${{ env.APP_VERSION }}" >> build/build-info.txt
          echo "Commit: ${{ github.sha }}" >> build/build-info.txt

      - name: Check build size
        run: |
          BUILD_SIZE=$(du -sh build | cut -f1)
          echo "Build size: $BUILD_SIZE"
          if [ "$(du -s build | cut -f1)" -gt 50000 ]; then
            echo "⚠️  Build size exceeds 50MB"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build/
          retention-days: 7

      - name: Upload build report
        uses: actions/upload-artifact@v4
        with:
          name: build-report
          path: |
            build/build-report.json
            build/build-info.txt

  # ============================================
  # DEPLOY JOB (GitHub Pages)
  # ============================================
  deploy-github:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.ref == 'refs/heads/main' && 
      (github.event_name == 'push' || github.event.inputs.deploy == 'true')
    
    permissions:
      contents: write
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Create deployment tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "v${{ env.APP_VERSION }}-$(date +%Y%m%d%H%M%S)" -m "Deploy ${{ github.sha }}"
          git push --tags

  # ============================================
  # NOTIFICATION JOB
  # ============================================
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: [validate, test, build, deploy-github]
    if: always()
    
    steps:
      - name: Generate status badge
        run: |
          STATUS="${{ needs.build.result }}"
          if [ "$STATUS" = "success" ]; then
            echo "BUILD_STATUS=✅ Success" >> $GITHUB_ENV
          elif [ "$STATUS" = "failure" ]; then
            echo "BUILD_STATUS=❌ Failed" >> $GITHUB_ENV
          else
            echo "BUILD_STATUS=⏭️ Skipped" >> $GITHUB_ENV
          fi

      - name: Print summary
        run: |
          echo "============================================"
          echo "  BUILD SUMMARY"
          echo "============================================"
          echo "  App: ${{ env.APP_NAME }} v${{ env.APP_VERSION }}"
          echo "  Status: ${{ env.BUILD_STATUS }}"
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Commit: ${{ github.sha }}"
          echo "  Trigger: ${{ github.event_name }}"
          echo "============================================"
          echo "  Validate: ${{ needs.validate.result }}"
          echo "  Test: ${{ needs.test.result }}"
          echo "  Build: ${{ needs.build.result }}"
          echo "  Deploy: ${{ needs.deploy-github.result }}"
          echo "============================================"
