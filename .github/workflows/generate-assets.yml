name: Generate Assets

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  generate-icons:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install canvas dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libcairo2-dev libjpeg-dev libpango1.0-dev libgif-dev build-essential g++
    
    - name: Install node-canvas
      run: npm install canvas
    
    - name: Generate placeholder images
      run: node assets/images/generate-placeholder.js
      working-directory: assets/images
    
    - name: Commit and push if changed
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
        git add assets/images/*.png
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-generate placeholder images" && git push)
