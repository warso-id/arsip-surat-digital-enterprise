version: 2
updates:
  # ==================== NPM DEPENDENCIES ====================
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Jakarta"
    
    # Target branch
    target-branch: "develop"
    
    # Version strategy
    versioning-strategy: "auto"
    
    # Labels
    labels:
      - "dependencies"
      - "npm"
      - "automerge"
    
    # Reviewers
    reviewers:
      - "warso-id"
    
    # Assignees
    assignees:
      - "warso-id"
    
    # Commit message
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    
    # Open pull requests limit
    open-pull-requests-limit: 10
    
    # Allow updates
    allow:
      - dependency-type: "direct"
    
    # Ignore certain dependencies
    ignore:
      - dependency-name: "express"
        update-types: ["version-update:semver-major"]
      - dependency-name: "node"
        versions: [">=19"]

  # ==================== GITHUB ACTIONS ====================
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Jakarta"
    
    target-branch: "develop"
    
    labels:
      - "dependencies"
      - "github-actions"
      - "automerge"
    
    reviewers:
      - "warso-id"
    
    commit-message:
      prefix: "ci"
      include: "scope"

  # ==================== DOCKER ====================
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Jakarta"
    
    target-branch: "develop"
    
    labels:
      - "dependencies"
      - "docker"
    
    reviewers:
      - "warso-id"
    
    commit-message:
      prefix: "docker"
      include: "scope"
    
    ignore:
      - dependency-name: "node"
        versions: [">=19"]
