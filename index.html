    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Arsip Surat Digital Enterprise - Sistem Manajemen Persuratan Terintegrasi Google Spreadsheet">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <meta name="apple-mobile-web-app-title" content="Arsip Surat">

<body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
        <div class="spinner-enterprise">
            <div class="spinner-ring"></div>
            <div class="spinner-text">Memuat Sistem Enterprise...</div>
        </div>
    </div>

    <!-- Header -->
    <header id="main-header" class="enterprise-header">
        <div class="header-left">
            <button id="menu-toggle" class="btn-icon" aria-label="Toggle Menu">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path d="M3 6h18v2H3V6zm0 5h18v2H3v-2zm0 5h18v2H3v-2z" fill="currentColor"/>
                </svg>
            </button>
            <div class="logo-container">
                <img src="assets/images/logo.svg" alt="Logo" class="logo-img" width="40" height="40">
                <h1 class="app-title">Arsip Surat Digital</h1>
                <span class="version-badge">Enterprise v2026.1.0</span>
            </div>
        </div>
        <div class="header-right">
            <div class="connection-status" id="connection-status">
                <span class="status-dot offline"></span>
                <span class="status-text">Offline</span>
            </div>
            <div class="user-info" id="user-info">
                <img src="assets/images/default-avatar.svg" alt="User" class="user-avatar" width="32" height="32">
                <span class="user-name" id="user-name">Administrator</span>
                <div class="user-dropdown">
                    <button class="btn-icon" id="user-menu-btn" aria-label="User Menu">
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <path d="M7 10l5 5 5-5z" fill="currentColor"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </header>

                <span>Dashboard</span>

            <a href="#/surat-keluar" class="nav-item" data-route="/surat-keluar">

                <svg viewBox="0 0 24 24" width="20" height="20"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z" fill="currentColor"/></svg>

    <!-- Main Content -->
    <main id="main-content" class="enterprise-content">
        <!-- Dynamic content loaded here -->
    </main>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Modal Container -->
    <div id="modal-container" class="modal-container"></div>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/arsip-surat-digital-enterprise/service-worker.js')
                    .then(registration => {
                        console.log('ServiceWorker registered: ', registration.scope);
                    })
                    .catch(error => {
                        console.log('ServiceWorker registration failed: ', error);
                    });
            });
        }
    </script>

    <!-- Core Scripts -->
    <script src="assets/js/config.js"></script>

    <script src="assets/js/dashboard.js"></script>
    <script src="assets/js/surat.js"></script>

    <script src="assets/js/laporan.js"></script>
