<!DOCTYPE html>
<html lang="id" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  
  <title>Arsip Surat Digital Enterprise v3.1.0</title>
  <meta name="description" content="Sistem Manajemen Arsip Surat Digital Enterprise">
  
  <meta name="theme-color" content="#1976D2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <!-- 🔥 PENTING: Base URL untuk GitHub Pages -->
  <base href="/arsip-surat-digital-enterprise/">
  
  <link rel="manifest" href="/arsip-surat-digital-enterprise/manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="/arsip-surat-digital-enterprise/favicon.svg">
  <link rel="apple-touch-icon" href="/arsip-surat-digital-enterprise/apple-touch-icon.png">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #F5F5F5;
      color: #212121;
      min-height: 100vh;
    }
    
    /* Splash Screen */
    .splash-screen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #1976D2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    
    .splash-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    
    .splash-content {
      text-align: center;
      color: white;
    }
    
    .splash-logo {
      font-size: 80px;
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite;
    }
    
    .splash-title {
      font-size: 1.75rem;
      font-weight: 800;
      margin-bottom: 8px;
    }
    
    .splash-subtitle {
      font-size: 1rem;
      opacity: 0.9;
      margin-bottom: 24px;
    }
    
    .splash-loader {
      width: 200px;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
      margin: 0 auto;
      overflow: hidden;
    }
    
    .splash-loader-bar {
      height: 100%;
      background: white;
      border-radius: 4px;
      animation: loading 2s ease-in-out infinite;
      width: 30%;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    @keyframes loading {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }
    
    /* Loading Fallback */
    .loading-fallback {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    
    .loading-card {
      text-align: center;
      padding: 40px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
    }
    
    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #E0E0E0;
      border-top-color: #1976D2;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Splash Screen -->
  <div id="splash-screen" class="splash-screen">
    <div class="splash-content">
      <div class="splash-logo">📁</div>
      <h1 class="splash-title">Arsip Surat Digital</h1>
      <p class="splash-subtitle">Enterprise v3.1.0</p>
      <div class="splash-loader">
        <div class="splash-loader-bar"></div>
      </div>
    </div>
  </div>
  
  <!-- App Root -->
  <div id="app">
    <div class="loading-fallback">
      <div class="loading-card">
        <div class="loading-spinner"></div>
        <p style="color: #757575;">Memuat aplikasi...</p>
        <p style="font-size: 0.75rem; color: #9E9E9E; margin-top: 8px;">
          Jika halaman tidak muncul, <a href="/arsip-surat-digital-enterprise/" style="color: #1976D2;">klik di sini</a>
        </p>
      </div>
    </div>
  </div>
  
  <!-- Script -->
  <script type="module" src="/arsip-surat-digital-enterprise/src/main.js"></script>
  
  <script>
    // Hide splash after app loads
    window.addEventListener('load', function() {
      setTimeout(function() {
        var splash = document.getElementById('splash-screen');
        if (splash) {
          splash.classList.add('hidden');
          setTimeout(function() {
            if (splash.parentNode) splash.parentNode.removeChild(splash);
          }, 500);
        }
      }, 1500);
    });
    
    console.log('📁 Arsip Surat Digital Enterprise v3.1.0');
    console.log('🌐 GitHub Pages Ready');
  </script>
</body>
</html>
