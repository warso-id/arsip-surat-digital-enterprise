<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Arsip Surat Digital Enterprise v30.1.0 - AI Powered Document Management System">
    <meta name="theme-color" content="#1976D2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Arsip Surat">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📄</text></svg>">
    
    <title>Dashboard - Arsip Surat Digital Enterprise v30.1.0</title>
    
    <style>
        /* ========== CSS VARIABLES ========== */
        :root {
            --primary: #1976D2;
            --primary-dark: #1565C0;
            --primary-light: #42A5F5;
            --secondary: #26A69A;
            --accent: #FF7043;
            --success: #4CAF50;
            --warning: #FF9800;
            --error: #F44336;
            --info: #2196F3;
            --bg: #F5F5F5;
            --surface: #FFFFFF;
            --text: #212121;
            --text-secondary: #757575;
            --border: #E0E0E0;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
            --shadow-lg: 0 4px 16px rgba(0,0,0,0.15);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --sidebar-width: 280px;
            --header-height: 64px;
            --font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        [data-theme="dark"] {
            --bg: #121212;
            --surface: #1E1E1E;
            --text: #FFFFFF;
            --text-secondary: #B0B0B0;
            --border: #333333;
            --shadow: 0 2px 8px rgba(0,0,0,0.4);
            --shadow-lg: 0 4px 16px rgba(0,0,0,0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-family);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            transition: var(--transition);
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

        /* ========== LAYOUT ========== */
        .app-container { display: flex; min-height: 100vh; }

        /* ========== SIDEBAR ========== */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--surface);
            border-right: 1px solid var(--border);
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
            box-shadow: var(--shadow);
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .sidebar-logo {
            font-size: 48px;
            display: block;
            margin-bottom: 8px;
        }

        .sidebar-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--primary);
            line-height: 1.3;
        }

        .sidebar-subtitle {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .nav-section { margin-bottom: 16px; }

        .nav-section-title {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
            padding: 8px 12px;
            letter-spacing: 1px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            color: var(--text);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            position: relative;
        }

        .nav-item:hover { background: rgba(25, 118, 210, 0.08); color: var(--primary); }

        .nav-item.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 8px rgba(25, 118, 210, 0.3);
        }

        .nav-item .icon { font-size: 20px; width: 24px; text-align: center; }

        .nav-item .badge {
            position: absolute;
            right: 12px;
            background: var(--error);
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 600;
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
        }

        .user-info:hover { background: rgba(0,0,0,0.05); }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
        }

        .user-details { flex: 1; min-width: 0; }

        .user-name {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-role { font-size: 11px; color: var(--text-secondary); }

        /* ========== MAIN CONTENT ========== */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            transition: var(--transition);
        }

        /* ========== HEADER ========== */
        .header {
            background: var(--surface);
            height: var(--header-height);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 16px;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: var(--shadow);
        }

        .header-left { display: flex; align-items: center; gap: 16px; }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text);
            padding: 4px;
        }

        .breadcrumb { font-size: 14px; font-weight: 600; color: var(--text); }

        .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-btn {
            background: none;
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 18px;
            color: var(--text);
            transition: var(--transition);
            position: relative;
        }

        .header-btn:hover { background: rgba(0,0,0,0.05); }

        .header-btn .count {
            position: absolute;
            top: -6px;
            right: -6px;
            background: var(--error);
            color: white;
            font-size: 10px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .online-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            display: inline-block;
        }

        .online-indicator.offline { background: var(--error); }

        /* ========== PAGE CONTENT ========== */
        .page-content { padding: 24px; min-height: calc(100vh - var(--header-height)); }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .page-title { font-size: 24px; font-weight: 700; }

        .page-subtitle { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }

        /* ========== CARDS ========== */
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: var(--transition);
            margin-bottom: 20px;
        }

        .card:hover { box-shadow: var(--shadow-lg); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .card-title { font-size: 18px; font-weight: 600; }

        /* ========== STATS GRID ========== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 16px;
            transition: var(--transition);
            cursor: pointer;
        }

        .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }

        .stat-icon {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .stat-icon.blue { background: rgba(25,118,210,0.1); color: var(--primary); }
        .stat-icon.green { background: rgba(76,175,80,0.1); color: var(--success); }
        .stat-icon.orange { background: rgba(255,152,0,0.1); color: var(--warning); }
        .stat-icon.red { background: rgba(244,67,54,0.1); color: var(--error); }

        .stat-info h3 { font-size: 28px; font-weight: 700; }
        .stat-info p { font-size: 13px; color: var(--text-secondary); }

        /* ========== TABLES ========== */
        .table-container {
            overflow-x: auto;
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        table { width: 100%; border-collapse: collapse; }

        th {
            background: var(--bg);
            padding: 14px 16px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
        }

        td {
            padding: 12px 16px;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
        }

        tr:hover td { background: rgba(25,118,210,0.02); }

        /* ========== BUTTONS ========== */
        .btn {
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-family: var(--font-family);
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-success { background: var(--success); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-error { background: var(--error); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { background: rgba(0,0,0,0.05); }
        .btn-sm { padding: 6px 12px; font-size: 12px; }

        /* ========== BADGES ========== */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-success { background: rgba(76,175,80,0.1); color: var(--success); }
        .badge-warning { background: rgba(255,152,0,0.1); color: var(--warning); }
        .badge-error { background: rgba(244,67,54,0.1); color: var(--error); }
        .badge-info { background: rgba(33,150,243,0.1); color: var(--info); }
        .badge-primary { background: rgba(25,118,210,0.1); color: var(--primary); }

        /* ========== MODAL ========== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s;
        }

        .modal {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        /* ========== TOAST ========== */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 300;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            color: white;
            font-size: 14px;
            font-weight: 500;
            box-shadow: var(--shadow-lg);
            animation: slideInRight 0.3s;
        }

        /* ========== SEARCH ========== */
        .search-box {
            position: relative;
            flex: 1;
            max-width: 300px;
        }

        .search-box input {
            width: 100%;
            padding: 8px 14px 8px 36px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: var(--font-family);
            background: var(--bg);
            color: var(--text);
        }

        .search-box .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        /* ========== PAGINATION ========== */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
        }

        .pagination button {
            padding: 8px 14px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition);
        }

        .pagination button:hover:not(:disabled) { background: var(--primary); color: white; border-color: var(--primary); }
        .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
        .pagination button.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* ========== EMPTY STATE ========== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state .icon { font-size: 64px; margin-bottom: 16px; opacity: 0.5; }
        .empty-state h3 { font-size: 18px; margin-bottom: 8px; }
        .empty-state p { color: var(--text-secondary); font-size: 14px; }

        /* ========== ANIMATIONS ========== */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        /* ========== LOADING ========== */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: 250;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .loading-overlay.show { display: flex; }

        .loading-box {
            background: var(--surface);
            padding: 32px;
            border-radius: var(--radius);
            text-align: center;
            box-shadow: var(--shadow-lg);
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .menu-toggle { display: block; }
            .stats-grid { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
        }

        @media (max-width: 768px) {
            .page-content { padding: 16px; }
            .page-title { font-size: 20px; }
            .stats-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
            .stat-card { padding: 14px; }
            .stat-icon { width: 44px; height: 44px; font-size: 22px; }
            .stat-info h3 { font-size: 22px; }
            .header { padding: 0 16px; }
            .search-box { max-width: 180px; }
        }

        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .page-header { flex-direction: column; align-items: flex-start; }
        }

        @media print {
            .sidebar, .header, .btn, .no-print { display: none !important; }
            .main-content { margin-left: 0; }
            .card { box-shadow: none; border: 1px solid #ddd; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        
        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-logo">📄</span>
                <div class="sidebar-title">Arsip Surat Digital</div>
                <div class="sidebar-subtitle">Enterprise v30.1.0</div>
            </div>
            
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Menu Utama</div>
                    <a class="nav-item active" data-page="dashboard" onclick="navigateTo('dashboard')">
                        <span class="icon">📊</span> Dashboard
                    </a>
                    <a class="nav-item" data-page="surat-masuk" onclick="navigateTo('surat-masuk')">
                        <span class="icon">📨</span> Surat Masuk
                        <span class="badge" id="sm-count">0</span>
                    </a>
                    <a class="nav-item" data-page="surat-keluar" onclick="navigateTo('surat-keluar')">
                        <span class="icon">📤</span> Surat Keluar
                        <span class="badge" id="sk-count">0</span>
                    </a>
                </div>
                
                <div class="nav-section">
                    <div class="nav-section-title">Proses</div>
                    <a class="nav-item" data-page="disposisi" onclick="navigateTo('disposisi')">
                        <span class="icon">📋</span> Disposisi
                    </a>
                    <a class="nav-item" data-page="approval" onclick="navigateTo('approval')">
                        <span class="icon">✅</span> Approval
                    </a>
                </div>
                
                <div class="nav-section">
                    <div class="nav-section-title">Lainnya</div>
                    <a class="nav-item" data-page="notifikasi" onclick="navigateTo('notifikasi')">
                        <span class="icon">🔔</span> Notifikasi
                    </a>
                    <a class="nav-item" data-page="pengaturan" onclick="navigateTo('pengaturan')">
                        <span class="icon">⚙️</span> Pengaturan
                    </a>
                </div>
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">A</div>
                    <div class="user-details">
                        <div class="user-name" id="userName">Loading...</div>
                        <div class="user-role" id="userRole">-</div>
                    </div>
                    <button class="header-btn" onclick="handleLogout()" title="Logout" style="margin-left:auto;">🚪</button>
                </div>
            </div>
        </aside>
        
        <!-- MAIN CONTENT -->
        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
                    <div class="breadcrumb" id="breadcrumb">Dashboard</div>
                </div>
                
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="globalSearch" placeholder="Cari surat..." onkeyup="if(event.key==='Enter')handleGlobalSearch()">
                </div>
                
                <div class="header-right">
                    <span class="online-indicator" id="onlineIndicator" title="Online"></span>
                    <button class="header-btn" onclick="toggleTheme()" title="Toggle Theme">🌙</button>
                    <button class="header-btn" onclick="navigateTo('notifikasi')" title="Notifikasi">
                        🔔
                        <span class="count" id="notifCount">0</span>
                    </button>
                </div>
            </header>
            
            <div class="page-content" id="pageContent">
                <!-- Dynamic content -->
            </div>
        </main>
    </div>
    
    <div class="toast-container" id="toastContainer"></div>
    
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-box">
            <div class="spinner"></div>
            <p>Memuat...</p>
        </div>
    </div>

    <!-- ========== JAVASCRIPT - STANDALONE ========== -->
    <script>
        // ========== CONFIGURATION ==========
        const API_URL = 'https://script.google.com/macros/s/AKfycbxhx4JXI_yX9MIEhYmSVAjxy-_9McM0-2WKzA2OvW4h8T9QT2nh5bJcio0KiWEyL4VRsQ/exec';
        let currentPage = 'dashboard';
        
        // ========== INITIALIZATION ==========
        (async function init() {
            console.log('🚀 Dashboard v30.1.0 initializing...');
            
            // Check auth
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            
            if (!token || !user) {
                console.log('❌ No session, redirect to login');
                window.location.replace('/login.html');
                return;
            }
            
            // Verify token
            try {
                const res = await apiCall('me');
                if (res.status === 'success' && res.data) {
                    updateUserInfo(res.data);
                } else {
                    throw new Error('Token invalid');
                }
            } catch (error) {
                console.error('Auth failed:', error);
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.replace('/login.html');
                return;
            }
            
            // Setup UI
            updateOnlineStatus();
            applyTheme();
            updateSidebarCounts();
            
            // Load page
            const hash = window.location.hash.replace('#', '') || 'dashboard';
            navigateTo(hash);
            
            // Event listeners
            window.addEventListener('online', updateOnlineStatus);
            window.addEventListener('offline', updateOnlineStatus);
            window.addEventListener('hashchange', () => {
                const h = window.location.hash.replace('#', '');
                if (h && h !== currentPage) navigateTo(h);
            });
            
            console.log('✅ Dashboard initialized');
        })();
        
        // ========== API HELPER ==========
        async function apiCall(action, params = {}, method = 'GET') {
            const url = new URL(API_URL);
            url.searchParams.set('action', action);
            
            const token = localStorage.getItem('token');
            if (token) url.searchParams.set('token', token);
            
            if (method === 'GET') {
                Object.entries(params).forEach(([k, v]) => {
                    if (v !== undefined && v !== null && v !== '') url.searchParams.set(k, v);
                });
            }
            
            try {
                const options = { method };
                if (method === 'POST') {
                    options.headers = { 'Content-Type': 'application/json' };
                    options.body = JSON.stringify(params);
                }
                
                const response = await fetch(url.toString(), options);
                const data = await response.json();
                
                if (data.code === 401) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.replace('/login.html');
                    throw new Error('Session expired');
                }
                
                return data;
            } catch (error) {
                console.error('API Error:', error);
                throw error;
            }
        }

            } catch (error) { showToast('❌ Error: ' + error.message, 'error'); }
            showLoading(false);
        }
        
        // ========== DISPOSISI ==========
        function renderDisposisi() {
            return `<div class="page-header"><h1 class="page-title">📋 Disposisi</h1></div>
                <div class="table-container"><table><thead><tr><th>Dari</th><th>Kepada</th><th>Instruksi</th><th>Status</th><th>Tanggal</th></tr></thead>
                <tbody id="dispTableBody"><tr><td colspan="5" style="text-align:center;">Memuat...</td></tr></tbody></table></div>`;
        }
        
        async function loadDisposisiData() {
            try {
                const res = await apiCall('disposisi.list', { limit: 20 });
                if (res.status === 'success') {
                    const items = res.data.items;
                    const tbody = document.getElementById('dispTableBody');
                    if (!items || items.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><div class="icon">📋</div><h3>Tidak ada disposisi</h3></div></td></tr>';
                    } else {
                        tbody.innerHTML = items.map(item => `
                            <tr><td>${item.dariNama||'-'}</td><td>${item.kepadaNama||'-'}</td><td>${item.instruksi||'-'}</td>
                            <td><span class="badge badge-${item.status==='selesai'?'success':'warning'}">${item.status}</span></td>
                            <td>${item.createdAt?new Date(item.createdAt).toLocaleDateString('id-ID'):'-'}</td></tr>
                        `).join('');
                    }
                }
            } catch (error) { console.error('Error:', error); }
        }
        
        // ========== APPROVAL ==========
        function renderApproval() {
            return `<div class="page-header"><h1 class="page-title">✅ Approval</h1></div>
                <div class="table-container"><table><thead><tr><th>Surat Keluar ID</th><th>Approver</th><th>Status</th><th>Aksi</th></tr></thead>
                <tbody id="apprTableBody"><tr><td colspan="4" style="text-align:center;">Memuat...</td></tr></tbody></table></div>`;
        }
        
        async function loadApprovalData() {
            try {
                const res = await apiCall('approval.list', { limit: 20 });
                if (res.status === 'success') {
                    const items = res.data.items;
                    const tbody = document.getElementById('apprTableBody');
                    if (!items || items.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="4"><div class="empty-state"><div class="icon">✅</div><h3>Tidak ada approval</h3></div></td></tr>';
                    } else {
                        tbody.innerHTML = items.map(item => `
                            <tr><td>${item.suratKeluarId}</td><td>${item.approverNama||'-'}</td>
                            <td><span class="badge badge-${item.status==='approved'?'success':item.status==='rejected'?'error':'warning'}">${item.status}</span></td>
                            <td>${item.status==='pending'?`<button class="btn btn-sm btn-success" onclick="processApproval('${item.id}','approved')">✅ Setujui</button> <button class="btn btn-sm btn-error" onclick="processApproval('${item.id}','rejected')">❌ Tolak</button>`:'-'}</td></tr>
                        `).join('');
                    }
                }
            } catch (error) { console.error('Error:', error); }
        }
        
        async function processApproval(id, status) {
            const komentar = prompt('Komentar (opsional):');
            showLoading(true);
            try {
                const res = await apiCall('approval.process', { id, status, komentar }, 'POST');
                if (res.status === 'success') {
                    showToast('✅ Approval ' + (status==='approved'?'disetujui':'ditolak'), 'success');
                    loadApprovalData();
                } else { showToast('❌ ' + res.message, 'error'); }
            } catch (error) { showToast('❌ Error: ' + error.message, 'error'); }
            showLoading(false);
        }
        
        // ========== NOTIFIKASI ==========
        function renderNotifikasi() {
            return `<div class="page-header"><h1 class="page-title">🔔 Notifikasi</h1><button class="btn btn-outline btn-sm" onclick="readAllNotifikasi()">✓ Tandai Semua Dibaca</button></div>
                <div id="notifList">Memuat...</div>`;
        }
        
        async function loadNotifikasiData() {
            try {
                const res = await apiCall('notifikasi.list', { limit: 50 });
                if (res.status === 'success') {
                    const items = res.data.items;
                    const container = document.getElementById('notifList');
                    if (!items || items.length === 0) {
                        container.innerHTML = '<div class="empty-state"><div class="icon">🔔</div><h3>Tidak ada notifikasi</h3></div>';
                    } else {
                        container.innerHTML = items.map(item => `
                            <div class="card" style="margin-bottom:8px;opacity:${item.isRead?'0.6':'1'};">
                                <div style="display:flex;justify-content:space-between;">
                                    <div><strong>${item.judul}</strong><p style="color:var(--text-secondary);">${item.pesan}</p><small>${new Date(item.createdAt).toLocaleString('id-ID')}</small></div>
                                    ${!item.isRead?`<button class="btn btn-sm btn-outline" onclick="readNotifikasi('${item.id}')">✓</button>`:''}
                                </div>
                            </div>
                        `).join('');
                    }
                }
            } catch (error) { console.error('Error:', error); }
        }
        
        async function readNotifikasi(id) {
            await apiCall('notifikasi.read', { id });
            loadNotifikasiData();
            updateSidebarCounts();
        }
        
        async function readAllNotifikasi() {
            await apiCall('notifikasi.readAll');
            loadNotifikasiData();
            updateSidebarCounts();
            showToast('✅ Semua notifikasi ditandai dibaca', 'success');
        }
        
        // ========== PENGATURAN ==========
        function renderPengaturan() {
            return `<div class="page-header"><h1 class="page-title">⚙️ Pengaturan</h1></div>
                <div class="card"><h3>Informasi Sistem</h3><div id="systemInfo">Memuat...</div></div>
                <div class="card"><h3>Fitur</h3><p>🤖 AI Auto-Tagging: <span class="badge badge-success">Aktif</span></p>
                <p>🔗 Blockchain: <span class="badge badge-success">Aktif</span></p>
                <p>🔐 Biometric: <span class="badge badge-success">Aktif</span></p></div>
                <div class="card"><button class="btn btn-error" onclick="handleLogout()">🚪 Logout</button></div>`;
        }
        
        async function loadPengaturanData() {
            try {
                const res = await apiCall('system.status');
                if (res.status === 'success') {
                    document.getElementById('systemInfo').innerHTML = `
                        <p><strong>Version:</strong> ${res.data.version}</p>
                        <p><strong>API Version:</strong> ${res.data.apiVersion}</p>
                        <p><strong>Timezone:</strong> ${res.data.timezone}</p>
                        <p><strong>Total Sheets:</strong> ${res.data.totalSheets}</p>
                    `;
                }
            } catch (error) { console.error('Error:', error); }
        }
        
        // ========== HELPERS ==========
        function showLoading(show) {
            document.getElementById('loadingOverlay').classList.toggle('show', show);
        }
        
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = type === 'success' ? '#4CAF50' : type === 'error' ? '#F44336' : type === 'warning' ? '#FF9800' : '#2196F3';
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }
        
        function renderPagination(containerId, pagination, callback) {
            const container = document.getElementById(containerId);
            if (!container || !pagination || pagination.totalPages <= 1) { if (container) container.innerHTML = ''; return; }
            
            let html = `<button ${pagination.hasPrev?'':'disabled'} data-page="${pagination.page-1}">«</button>`;
            for (let i = 1; i <= pagination.totalPages; i++) {
                if (i===1 || i===pagination.totalPages || (i>=pagination.page-2 && i<=pagination.page+2)) {
                    html += `<button class="${i===pagination.page?'active':''}" data-page="${i}">${i}</button>`;
                } else if (i===pagination.page-3 || i===pagination.page+3) {
                    html += '<button disabled>...</button>';
                }
            }
            html += `<button ${pagination.hasNext?'':'disabled'} data-page="${pagination.page+1}">»</button>`;
            container.innerHTML = html;
            container.querySelectorAll('button:not([disabled])').forEach(btn => {
                btn.addEventListener('click', () => callback(parseInt(btn.dataset.page)));
            });
        }
        
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }
        
        async function updateSidebarCounts() {
            try {
                const [smRes, skRes, notifRes] = await Promise.all([
                    apiCall('suratMasuk.list', { limit: 1 }),
                    apiCall('suratKeluar.list', { limit: 1 }),
                    apiCall('notifikasi.unreadCount'),
                ]);
                document.getElementById('sm-count').textContent = smRes.data?.pagination?.total || 0;
                document.getElementById('sk-count').textContent = skRes.data?.pagination?.total || 0;
                const unread = notifRes.data?.count || 0;
                const notifCount = document.getElementById('notifCount');
                if (unread > 0) { notifCount.style.display = 'flex'; notifCount.textContent = unread > 99 ? '99+' : unread; }
                else { notifCount.style.display = 'none'; }
            } catch (error) { console.error('Error updating counts:', error); }
        }
        
        function updateOnlineStatus() {
            const indicator = document.getElementById('onlineIndicator');
            if (navigator.onLine) { indicator.className = 'online-indicator'; indicator.title = 'Online'; }
            else { indicator.className = 'online-indicator offline'; indicator.title = 'Offline'; }
        }
        
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme') || 'light';
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }
        
        function applyTheme() {
            const saved = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);
        }
        
        function updateUserInfo(user) {
            document.getElementById('userName').textContent = user.namaLengkap || user.username || 'User';
            document.getElementById('userRole').textContent = user.role || 'User';
            document.getElementById('userAvatar').textContent = (user.namaLengkap || user.username || 'A').charAt(0).toUpperCase();
        }
        
        function handleGlobalSearch() {
            const query = document.getElementById('globalSearch').value.trim();
            if (query) navigateTo('surat-masuk');
            document.getElementById('smSearch').value = query;
            smPage = 1;
            setTimeout(() => loadSuratMasukData(), 300);
        }
        
        function handleLogout() {
            if (confirm('Yakin ingin logout?')) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.replace('/login.html');
            }
        }
        
        console.log('✅ Index.html v30.1.0 - STANDALONE - NO DEPENDENCIES');
    </script>
</body>
</html>
