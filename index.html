  <!-- Service Worker Registration -->
  <script>
    // Service Worker Registration - Early registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .then(function(registration) {
            console.log('✅ Service Worker terdaftar:', registration.scope);
            
            // Check for updates
            registration.addEventListener('updatefound', function() {
              const newWorker = registration.installing;
              console.log('🔄 Service Worker update ditemukan');
              
              newWorker.addEventListener('statechange', function() {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  console.log('🆕 Update tersedia');
                  showUpdateBanner();
                }
              });
            });
          })
          .catch(function(error) {
            console.error('❌ Service Worker gagal:', error);
          });
        
        // Handle SW updates
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', function() {
          if (!refreshing) {
            refreshing = true;
            window.location.reload();
          }
        });
      });
    }
    
    // Update Banner
    function showUpdateBanner() {
      const banner = document.createElement('div');
      banner.className = 'update-banner';
      banner.innerHTML = `
        <span>🔄 Update tersedia! Versi baru siap diinstal.</span>
        <button onclick="window.location.reload()">Update Sekarang</button>
      `;
      document.body.appendChild(banner);
    }
    
    // Online/Offline Detection
    function updateOnlineStatus() {
      const indicator = document.getElementById('offline-indicator');
      if (!indicator) return;
      
      if (navigator.onLine) {
        indicator.classList.remove('show');
        console.log('🟢 Online');
      } else {
        indicator.classList.add('show');
        console.log('🔴 Offline');
      }
    }
    
    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);
    
    // Global Error Handler
    window.addEventListener('error', function(event) {
      console.error('Global Error:', event.error?.message || event.message);
      
      // Show error fallback for critical errors
      if (event.error && event.error.isCritical) {
        showErrorFallback(event.error.message);
      }
    });
    
    // Unhandled Promise Rejection
    window.addEventListener('unhandledrejection', function(event) {
      console.error('Unhandled Promise:', event.reason);
    });
    
    function showErrorFallback(message) {
      const app = document.getElementById('app');
      if (!app) return;
      
      app.innerHTML = `
        <div class="error-fallback">
          <div class="error-fallback-content">
            <div class="error-fallback-icon">⚠️</div>
            <h1 class="error-fallback-title">Terjadi Kesalahan</h1>
            <p class="error-fallback-message">${message || 'Aplikasi mengalami kesalahan. Silakan coba lagi.'}</p>
            <button class="error-fallback-btn" onclick="window.location.reload()">
              🔄 Muat Ulang
            </button>
            <br><br>
            <button class="error-fallback-btn" onclick="window.location.href='/'" style="background: #757575;">
              🏠 Ke Halaman Utama
            </button>
          </div>
        </div>
      `;
    }
    
    // Performance Monitoring
    if ('performance' in window && 'measure' in performance) {
      window.addEventListener('load', function() {
        setTimeout(function() {
          const perfData = performance.getEntriesByType('navigation')[0];
          if (perfData) {
            console.log('📊 Performance:', {
              'DNS': (perfData.domainLookupEnd - perfData.domainLookupStart).toFixed(2) + 'ms',
              'TCP': (perfData.connectEnd - perfData.connectStart).toFixed(2) + 'ms',
              'Request': (perfData.responseStart - perfData.requestStart).toFixed(2) + 'ms',
              'DOM Ready': (perfData.domContentLoadedEventEnd - perfData.fetchStart).toFixed(2) + 'ms',
              'Page Load': (perfData.loadEventEnd - perfData.fetchStart).toFixed(2) + 'ms'
            });
          }
        }, 0);
      });
    }
    
    // Detect browser
    const browserInfo = {
      isChrome: /Chrome/.test(navigator.userAgent) && /Google Inc/.test(navigator.vendor),
      isSafari: /Safari/.test(navigator.userAgent) && /Apple Computer/.test(navigator.vendor),
      isFirefox: /Firefox/.test(navigator.userAgent),
      isEdge: /Edg/.test(navigator.userAgent),
      isIOS: /iPad|iPhone|iPod/.test(navigator.userAgent),
      isAndroid: /Android/.test(navigator.userAgent),
      isWindows: /Windows/.test(navigator.userAgent),
      isMac: /Macintosh/.test(navigator.userAgent),
      isLinux: /Linux/.test(navigator.userAgent) && !/Android/.test(navigator.userAgent)
    };
    
    console.log('🌐 Browser:', browserInfo);
    console.log('📱 Platform:', navigator.platform);
    console.log('🖥️ Screen:', window.screen.width + 'x' + window.screen.height);
    console.log('📐 Viewport:', window.innerWidth + 'x' + window.innerHeight);
    console.log('🔒 HTTPS:', window.location.protocol === 'https:');
    console.log('📡 Online:', navigator.onLine);
    
    // Check PWA Support
    const pwaSupport = {
      serviceWorker: 'serviceWorker' in navigator,
      manifest: 'manifest' in document.createElement('link'),
      pushNotification: 'PushManager' in window,
      notification: 'Notification' in window,
      webAuthn: 'PublicKeyCredential' in window,
      indexedDB: 'indexedDB' in window,
      cacheAPI: 'caches' in window,
      localStorage: 'localStorage' in window,
      geolocation: 'geolocation' in navigator,
      bluetooth: 'bluetooth' in navigator,
      clipboard: 'clipboard' in navigator
    };
    
    console.log('📦 PWA Support:', pwaSupport);
    
    // Log unsupported features
    const unsupported = Object.entries(pwaSupport)
      .filter(([_, supported]) => !supported)
      .map(([feature]) => feature);
    
    if (unsupported.length > 0) {
      console.warn('⚠️ Unsupported features:', unsupported.join(', '));
    }
  </script>
