<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0, user-scalable=yes" />
  <title>Arsip Surat Digital Enterprise v3.2.2</title>
  <meta name="description" content="Sistem Arsip Surat Digital Enterprise - Kelola surat masuk, surat keluar, disposisi, dan approval secara digital." />
  <meta name="theme-color" content="#6750A4" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Arsip Surat" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📁</text></svg>" />
  
  <!-- Material Symbols / Font Awesome hybrid fallback -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  
  <!-- Chart.js untuk report/dashboard -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  
  <!-- Stylesheet utama (Material Design 3, adaptive layout, device-specific display) -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="md3-body">
  <!-- ============================================ -->
  <!-- SKELETON / LOADING SCREEN DENGAN PROGRESS SYNC -->
  <!-- ============================================ -->
  <div id="loadingScreen" class="loading-overlay" role="alert" aria-live="assertive">
    <div class="loading-container">
      <div class="md3-progress-indicator">
        <svg class="circular-loader" viewBox="25 25 50 50">
          <circle class="loader-path" cx="50" cy="50" r="20" fill="none" stroke="var(--md-sys-color-primary)" stroke-width="4"></circle>
        </svg>
        <span class="loading-percentage" id="loadingPercentage">0%</span>
      </div>
      <h2 class="loading-title">📁 Arsip Surat Digital</h2>
      <p class="loading-version">v3.2.2 · Menyinkronkan data...</p>
      <div class="progress-bar-container">
        <div class="progress-bar-fill" id="progressBarFill" style="width: 0%;"></div>
      </div>
    </div>
  </div>

  <!-- ============================================ -->
  <!-- AUTH PAGE (MD3 ADAPTIVE CARD) -->
  <!-- ============================================ -->
  <div id="authPage" class="auth-page surface-background" style="display: none;">
    <div class="auth-card elevation-3">
      <div class="auth-hero">
        <div class="auth-logo">📁</div>
        <h1 class="headline-medium">Arsip Surat Digital</h1>
        <p class="body-medium on-surface-variant">Enterprise System v3.2.2</p>
      </div>
      
      <!-- Tab selector MD3 -->
      <div class="md3-tabs" role="tablist">
        <button class="md3-tab active" data-tab="login" role="tab" aria-selected="true">Login</button>
        <button class="md3-tab" data-tab="register" role="tab" aria-selected="false">Register</button>
      </div>
      
      <!-- Form Login -->
      <form id="loginForm" class="auth-form active" autocomplete="on" novalidate>
        <div class="input-field">
          <i class="fas fa-user input-icon"></i>
          <input type="text" id="loginUsername" placeholder=" " required autocomplete="username" class="md3-input" />
          <label for="loginUsername">Username</label>
        </div>
        <div class="input-field">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" id="loginPassword" placeholder=" " required autocomplete="current-password" class="md3-input" />
          <label for="loginPassword">Password</label>
        </div>
        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="rememberMe" /> <span>Ingat saya</span>
          </label>
          <a href="#" id="forgotPassword" class="text-button">Lupa password?</a>
        </div>
        <button type="submit" class="md3-button filled-button full-width">
          <i class="fas fa-sign-in-alt"></i> Login
        </button>
        <div id="loginError" class="error-message" style="display: none;"></div>
      </form>
      
      <!-- Form Register -->
      <form id="registerForm" class="auth-form" autocomplete="on" novalidate>
        <div class="input-field">
          <i class="fas fa-user input-icon"></i>
          <input type="text" id="registerUsername" placeholder=" " required autocomplete="username" class="md3-input" />
          <label for="registerUsername">Username</label>
        </div>
        <div class="input-field">
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" id="registerEmail" placeholder=" " required autocomplete="email" class="md3-input" />
          <label for="registerEmail">Email</label>
        </div>
        <div class="input-field">
          <i class="fas fa-user-tag input-icon"></i>
          <input type="text" id="registerNama" placeholder=" " required autocomplete="name" class="md3-input" />
          <label for="registerNama">Nama Lengkap</label>
        </div>
        <div class="input-field">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" id="registerPassword" placeholder=" " required minlength="8" autocomplete="new-password" class="md3-input" />
          <label for="registerPassword">Password</label>
        </div>
        <div class="input-field">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" id="registerConfirm" placeholder=" " required autocomplete="new-password" class="md3-input" />
          <label for="registerConfirm">Konfirmasi Password</label>
        </div>
        <button type="submit" class="md3-button filled-tonal-button full-width">
          <i class="fas fa-user-plus"></i> Daftar
        </button>
        <div id="registerError" class="error-message" style="display: none;"></div>
      </form>
    </div>
  </div>

  <!-- ============================================ -->
  <!-- MAIN APP LAYOUT (RESPONSIVE DRAWER + CONTENT) -->
  <!-- ============================================ -->
  <div id="mainApp" class="app-shell" style="display: none;">
    <!-- Navigation Drawer (Sidebar adaptif) -->
    <aside class="navigation-drawer" id="sidebar" role="navigation">
      <div class="drawer-header">
        <span class="logo">📁</span>
        <h2 class="title-small">Arsip Surat</h2>
        <span class="version-badge">v3.2.2</span>
      </div>
      
      <div class="user-profile-card">
        <div class="avatar" id="userAvatar">U</div>
        <div class="profile-text">
          <span class="user-name" id="userName">User</span>
          <span class="user-role" id="userRole">Staff</span>
        </div>
      </div>
      
      <nav class="drawer-nav" id="sidebarMenu">
        <div class="nav-section-label">Menu Utama</div>
        <button class="nav-item active" data-page="dashboard">
          <i class="fas fa-th-large"></i>
          <span>Dashboard</span>
        </button>
        
        <div class="nav-section-label">Surat</div>
        <button class="nav-item" data-page="surat-masuk">
          <i class="fas fa-inbox"></i>
          <span>Surat Masuk</span>
          <span class="badge" id="smBadge">0</span>
        </button>
        <button class="nav-item" data-page="surat-keluar">
          <i class="fas fa-paper-plane"></i>
          <span>Surat Keluar</span>
          <span class="badge" id="skBadge">0</span>
        </button>
        <button class="nav-item" data-page="disposisi">
          <i class="fas fa-clipboard-list"></i>
          <span>Disposisi</span>
          <span class="badge" id="dispBadge">0</span>
        </button>
        <button class="nav-item" data-page="approval">
          <i class="fas fa-check-double"></i>
          <span>Approval</span>
          <span class="badge" id="apprBadge">0</span>
        </button>
        
        <div class="nav-section-label">Manajemen</div>
        <button class="nav-item" data-page="template">
          <i class="fas fa-file-alt"></i>
          <span>Template Surat</span>
        </button>
        <button class="nav-item" data-page="users" id="menuUsers">
          <i class="fas fa-users"></i>
          <span>Pengguna</span>
        </button>
        <button class="nav-item" data-page="report">
          <i class="fas fa-chart-bar"></i>
          <span>Laporan</span>
        </button>
        <button class="nav-item" data-page="settings">
          <i class="fas fa-cog"></i>
          <span>Pengaturan</span>
        </button>
        
        <div class="nav-section-label">Sistem</div>
        <button class="nav-item" data-page="backup">
          <i class="fas fa-database"></i>
          <span>Backup</span>
        </button>
        <button class="nav-item" data-page="audit">
          <i class="fas fa-history"></i>
          <span>Audit Log</span>
        </button>
      </nav>
      
      <div class="drawer-footer">
        <button class="md3-button outlined-button" id="logoutBtn">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>
      </div>
    </aside>

    <!-- Scrim for mobile -->
    <div class="drawer-scrim" id="drawerScrim"></div>

    <!-- Main Content Area -->
    <main class="main-content" id="mainContent">
      <!-- Top App Bar -->
      <header class="top-app-bar">
        <button class="icon-button" id="sidebarToggle" aria-label="Toggle menu">
          <i class="fas fa-bars"></i>
        </button>
        <h1 class="top-bar-title headline-small" id="pageTitle">Dashboard</h1>
        <div class="top-bar-actions">
          <button class="icon-button" id="notifBtn" aria-label="Notifikasi">
            <i class="fas fa-bell"></i>
            <span class="notification-badge" id="notifBadge">0</span>
          </button>
          <button class="icon-button" id="themeToggle" aria-label="Toggle theme">
            <i class="fas fa-moon"></i>
          </button>
        </div>
      </header>

      <!-- Dynamic Page Container (Content Placeholder ready) -->
      <div class="page-container" id="pageContent">
        <!-- Konten halaman akan dirender di sini secara dinamis -->
      </div>
    </main>
  </div>

  <!-- ============================================ -->
  <!-- NOTIFICATION PANEL (MD3 SIDE SHEET) -->
  <!-- ============================================ -->
  <div class="notification-sheet" id="notifPanel" style="display: none;">
    <div class="sheet-header">
      <h3 class="title-medium">Notifikasi</h3>
      <button class="icon-button" id="notifClose"><i class="fas fa-times"></i></button>
    </div>
    <div class="sheet-body" id="notifBody">
      <div class="empty-state">
        <i class="fas fa-bell-slash empty-icon"></i>
        <p class="body-medium">Tidak ada notifikasi</p>
      </div>
    </div>
    <div class="sheet-footer">
      <button class="text-button" id="notifReadAll">Tandai semua dibaca</button>
    </div>
  </div>

  <!-- ============================================ -->
  <!-- MODAL DIALOG (MD3 STANDARD) -->
  <!-- ============================================ -->
  <dialog class="md3-dialog" id="modalContainer">
    <div class="dialog-header">
      <h3 id="modalTitle">Dialog</h3>
      <button class="icon-button" id="modalClose"><i class="fas fa-times"></i></button>
    </div>
    <div class="dialog-body" id="modalBody"></div>
    <div class="dialog-footer" id="modalFooter"></div>
  </dialog>

  <!-- ============================================ -->
  <!-- SNACKBAR / TOAST CONTAINER -->
  <!-- ============================================ -->
  <div class="snackbar-container" id="toastContainer" aria-live="polite"></div>

  <!-- ============================================ -->
  <!-- SCRIPT DEPENDENCIES (URUTAN PENTING) -->
  <!-- ============================================ -->
  <!-- Utilitas & Konfigurasi -->
  <script src="js/utils.js"></script>
  <!-- Koneksi API (sync dengan code.gs / spreadsheet) -->
  <script src="js/api.js"></script>
  <!-- Autentikasi & Sesi -->
  <script src="js/auth.js"></script>
  
  <!-- Halaman Dinamis -->
  <script src="js/dashboard.js"></script>
  <script src="js/surat-masuk.js"></script>
  <script src="js/surat-keluar.js"></script>
  <script src="js/disposisi.js"></script>
  <script src="js/approval.js"></script>
  <script src="js/users.js"></script>
  <script src="js/template.js"></script>
  <script src="js/report.js"></script>
  <script src="js/settings.js"></script>
  
  <!-- App Shell Controller (routing, lifecycle, event binding) -->
  <script src="js/app.js"></script>
</body>
</html>
