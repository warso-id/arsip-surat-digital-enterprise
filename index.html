    <style>
        /* Enterprise Login Page Styles */
        :root {
            --primary: #1a56db;
            --primary-dark: #1e40af;
            --primary-light: #3b82f6;
            --secondary: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #1f2937;
            --darker: #111827;
            --light: #f9fafb;
            --lighter: #ffffff;
            --border: #e5e7eb;
            --radius: 12px;
            --radius-lg: 20px;
            --shadow: 0 4px 6px rgba(0,0,0,0.07);
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.15);
            --shadow-xl: 0 25px 80px rgba(0,0,0,0.2);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: #0f172a;
            overflow-x: hidden;
        }
        
        .enterprise-login-page {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
        }
        
        /* Animated Background */
        .bg-animation {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden;
            z-index: 0;
        }
        
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(26,86,219,0.15) 0%, transparent 70%);
            animation: float 20s infinite ease-in-out;
        }
        
        .bg-circle:nth-child(1) {
            width: 600px; height: 600px;
            top: -200px; left: -200px;
            animation-delay: 0s;
        }
        
        .bg-circle:nth-child(2) {
            width: 400px; height: 400px;
            bottom: -100px; right: -100px;
            animation-delay: -5s;
            background: radial-gradient(circle, rgba(124,58,237,0.15) 0%, transparent 70%);
        }
        
        .bg-circle:nth-child(3) {
            width: 300px; height: 300px;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
            background: radial-gradient(circle, rgba(16,185,129,0.1) 0%, transparent 70%);
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(50px, -50px) scale(1.1); }
            50% { transform: translate(-30px, -100px) scale(0.9); }
            75% { transform: translate(-80px, -20px) scale(1.05); }
        }
        
        /* Grid Pattern */
        .bg-grid {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
        }
        
        /* Login Container */
        .login-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        
        .login-card {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            padding: 48px 40px;
            box-shadow: var(--shadow-xl);
            border: 1px solid rgba(255,255,255,0.2);
            animation: slideInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }
        
        .login-logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }
        
        .login-logo {
            width: 88px;
            height: 88px;
            border-radius: 22px;
            box-shadow: 0 12px 40px rgba(26,86,219,0.4);
            transition: transform 0.3s;
        }
        
        .login-logo:hover {
            transform: scale(1.05) rotate(-5deg);
        }
        
        .login-logo-glow {
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border-radius: 30px;
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            opacity: 0.2;
            filter: blur(20px);
            z-index: -1;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.4; }
        }
        
        .login-header h1 {
            font-size: 28px;
            font-weight: 800;
            color: var(--darker);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        
        .login-header .version-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-top: 8px;
        }
        
        .login-header p {
            color: var(--secondary);
            font-size: 15px;
            margin-top: 8px;
        }
        
        /* Form Styles */
        .form-group {
            margin-bottom: 22px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 13px;
            color: var(--dark);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .input-icon {
            position: absolute;
            left: 16px;
            font-size: 18px;
            z-index: 1;
            pointer-events: none;
            opacity: 0.6;
        }
        
        .input-wrapper input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            font-size: 15px;
            font-family: var(--font-sans);
            transition: var(--transition);
            background: var(--light);
            color: var(--dark);
        }
        
        .input-wrapper input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(26,86,219,0.1);
        }
        
        .input-wrapper input::placeholder {
            color: #9ca3af;
        }
        
        .toggle-password {
            position: absolute;
            right: 14px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: var(--secondary);
            padding: 4px;
            transition: color 0.2s;
        }
        
        .toggle-password:hover {
            color: var(--dark);
        }
        
        /* Form Options */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            font-size: 13px;
        }
        
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--secondary);
            cursor: pointer;
            user-select: none;
        }
        
        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            cursor: pointer;
        }
        
        .forgot-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        
        .forgot-link:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }
        
        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--font-sans);
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }
        
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(26,86,219,0.5);
        }
        
        .btn-submit:active {
            transform: translateY(-1px);
        }
        
        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .btn-loader {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Alert Messages */
        .alert {
            padding: 14px 18px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            font-size: 13px;
            font-weight: 500;
            display: none;
            animation: fadeIn 0.3s ease;
            border-left: 4px solid;
        }
        
        .alert.show {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .alert-error {
            background: #fef2f2;
            color: #991b1b;
            border-left-color: #ef4444;
        }
        
        .alert-success {
            background: #f0fdf4;
            color: #065f46;
            border-left-color: #10b981;
        }
        
        .alert-warning {
            background: #fffbeb;
            color: #92400e;
            border-left-color: #f59e0b;
        }
        
        .alert-info {
            background: #eff6ff;
            color: #1e40af;
            border-left-color: #3b82f6;
        }
        
        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 28px;
            font-size: 14px;
            color: var(--secondary);
        }
        
        .login-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        
        .login-footer a:hover {
            text-decoration: underline;
        }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s;
        }
        
        .back-link:hover {
            color: white;
        }
        
        /* System Status */
        .system-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }
        
        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
            }
            
            .login-logo {
                width: 68px;
                height: 68px;
            }
            
            .login-header h1 {
                font-size: 22px;
            }
            
            .form-options {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="enterprise-login-page">
        <!-- Animated Background -->
        <div class="bg-animation">
            <div class="bg-circle"></div>
            <div class="bg-circle"></div>
            <div class="bg-circle"></div>
        </div>
        <div class="bg-grid"></div>
        
        <!-- Login Container -->
        <div class="login-container">
            <div class="login-card">
                <!-- Header -->
                <div class="login-header">
                    <div class="login-logo-container">
                        <div class="login-logo-glow"></div>
                        <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyMDAgMjAwIiB3aWR0aD0iODgiIGhlaWdodD0iODgiPjxkZWZzPjxsaW5lYXJHcmFkaWVudCBpZD0ibG9nby1ncmFkIiB4MT0iMCUiIHkxPSIwJSIgeDI9IjEwMCUiIHkyPSIxMDAlIj48c3RvcCBvZmZzZXQ9IjAlIiBzdHlsZT0ic3RvcC1jb2xvcjojMWE1NmRiIi8+PHN0b3Agb2Zmc2V0PSIxMDAlIiBzdHlsZT0ic3RvcC1jb2xvcjojN2MzYWVkIi8+PC9saW5lYXJHcmFkaWVudD48L2RlZnM+PHJlY3Qgd2lkdGg9IjIwMCIgaGVpZ2h0PSIyMDAiIHJ4PSI0MCIgZmlsbD0idXJsKCNsb2dvLWdyYWQpIi8+PHRleHQgeD0iMTAwIiB5PSIxMjAiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSI4MCIgZm9udC13ZWlnaHQ9ImJvbGQiIGZpbGw9IndoaXRlIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIj5BRDwvdGV4dD48L3N2Zz4="

                <!-- Login Form -->
                <form id="loginForm" autocomplete="off">

    <!-- Enterprise Core Script -->
    <script src="./src/public/js/core.js"></script>
    
    <script>
        // ==================== ENTERPRISE LOGIN HANDLER ====================
        document.addEventListener('DOMContentLoaded', async () => {
            // Initialize Enterprise Core
            await EnterpriseCore.init();
            
            // Check if already authenticated
            if (EnterpriseCore.auth.isAuthenticated()) {
                const user = EnterpriseCore.auth.getCurrentUser();
                if (user) {
                    showAlert('success', `Selamat datang kembali, ${user.nama_lengkap}! Mengalihkan...`);
                    setTimeout(() => {
                        window.location.href = './dashboard.html';
                    }, 1000);
                    return;
                }
            }
            
            // Load remembered email
            const rememberedEmail = localStorage.getItem('rememberedEmail');
            if (rememberedEmail) {
                document.getElementById('email').value = rememberedEmail;
                document.getElementById('remember').checked = true;
            }
            
            // Setup event listeners
            setupEventListeners();
            
            // Show demo credentials info
            showAlert('info', 'Demo: admin@arsipsurat.id / password123');
        });
        
        function setupEventListeners() {
            // Toggle password visibility
            document.getElementById('togglePassword').addEventListener('click', function() {
                const passwordInput = document.getElementById('password');
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.textContent = type === 'password' ? '👁️' : '🙈';
            });
            
            // Form submission
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            
            // Keyboard shortcut
            document.addEventListener('keydown', function(e) {
                if (e.ctrlKey && e.key === 'Enter') {
                    document.getElementById('loginForm').dispatchEvent(new Event('submit'));
                }
            });
        }
        
        async function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const remember = document.getElementById('remember').checked;
            
            // Hide all alerts
            hideAllAlerts();
            
            // Validation
            if (!email) {
                showAlert('error', 'Email harus diisi');
                return;
            }
            
            if (!password) {
                showAlert('error', 'Password harus diisi');
                return;
            }
            
            if (password.length < 6) {
                showAlert('error', 'Password minimal 6 karakter');
                return;
            }
            
            // Show loading state
            const btnSubmit = document.getElementById('btnSubmit');
            const btnText = document.getElementById('btnText');
            btnSubmit.disabled = true;
            btnText.innerHTML = '<span class="btn-loader"><span class="spinner"></span> Memproses...</span>';
            
            try {
                // Attempt login via Enterprise Auth
                const result = await EnterpriseCore.auth.login(email, password, remember);
                
                if (result && result.success !== false) {
                    // Save remembered email
                    if (remember) {
                        localStorage.setItem('rememberedEmail', email);
                    } else {
                        localStorage.removeItem('rememberedEmail');
                    }
                    
                    showAlert('success', `✅ Login berhasil! Selamat datang, ${result.user?.nama_lengkap || 'User'}!`);
                    
                    // Redirect to dashboard
                    setTimeout(() => {
                        window.location.href = './dashboard.html';
                    }, 800);
                } else {
                    throw new Error(result?.message || 'Login gagal');
                }
            } catch (error) {
                console.error('Login error:', error);
                
                // Fallback: Demo login
                if (email === 'admin@arsipsurat.id' && password === 'password123') {
                    // Demo success
                    const demoUser = {
                        id: 1,
                        nama_lengkap: 'Administrator',
                        email: 'admin@arsipsurat.id',
                        role: { id: 1, nama: 'Super Admin', slug: 'super-admin' },
                        instansi: { id: 1, nama: 'Dinas Komunikasi dan Informatika' },
                        permissions: ['*']
                    };
                    
                    // Save demo data
                    localStorage.setItem('accessToken', 'demo-token-' + Date.now());
                    localStorage.setItem('refreshToken', 'demo-refresh-' + Date.now());
                    localStorage.setItem('userData', EnterpriseCore.base64.encodeObject(demoUser));
                    
                    if (remember) {
                        localStorage.setItem('rememberedEmail', email);
                    }
                    
                    showAlert('success', '✅ Login berhasil (Mode Demo)! Mengalihkan...');
                    
                    setTimeout(() => {
                        window.location.href = './dashboard.html';
                    }, 800);
                } else {
                    showAlert('error', error.message || 'Email atau password salah. Gunakan akun demo.');
                }
            } finally {
                btnSubmit.disabled = false;
                btnText.textContent = '🔐 Masuk ke Sistem';
            }
        }
        
        // ==================== ALERT HELPERS ====================
        function showAlert(type, message) {
            hideAllAlerts();
            
            const alertMap = {
                'error': 'alertError',
                'success': 'alertSuccess',
                'info': 'alertInfo',
                'warning': 'alertWarning'
            };
            
            const alertId = alertMap[type] || 'alertInfo';
            const alertEl = document.getElementById(alertId);
            const messageEl = document.getElementById(alertId + 'Message');
            
            if (alertEl && messageEl) {
                messageEl.textContent = message;
                alertEl.classList.add('show');
                
                // Auto hide after 8 seconds
                setTimeout(() => {
                    alertEl.classList.remove('show');
                }, 8000);
            }
        }
        
        function hideAllAlerts() {
            document.querySelectorAll('.alert').forEach(alert => {
                alert.classList.remove('show');
            });
        }
        
        function showForgotPassword() {
            showAlert('info', 'Fitur reset password akan segera tersedia. Hubungi administrator untuk bantuan.');
        }
        
        function showRegisterInfo() {
            showAlert('info', 'Pendaftaran akun dilakukan oleh administrator. Silakan hubungi admin instansi Anda.');
        }
    </script>
</body>
