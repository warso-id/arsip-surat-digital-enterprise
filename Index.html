<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Arsip Surat Digital Enterprise v30.1.0 - AI Powered Document Management System">
    <meta name="theme-color" content="#1976D2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Arsip Surat">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    
    <title>Arsip Surat Digital Enterprise v30.1.0</title>
    
    <style>
        /* ========== CSS RESET & VARIABLES ========== */
        :root {
            --primary: #1976D2;
            --primary-dark: #1565C0;
            --primary-light: #42A5F5;
            --secondary: #26A69A;
            --accent: #FF7043;
            --success: #4CAF50;
            --warning: #FF9800;
            --error: #F44336;
            --info: #2196F3;
            --bg: #F5F5F5;
            --surface: #FFFFFF;
            --text: #212121;
            --text-secondary: #757575;
            --border: #E0E0E0;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
            --shadow-lg: 0 4px 16px rgba(0,0,0,0.15);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --sidebar-width: 280px;
            --header-height: 64px;
            --font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        [data-theme="dark"] {
            --bg: #121212;
            --surface: #1E1E1E;
            --text: #FFFFFF;
            --text-secondary: #B0B0B0;
            --border: #333333;
            --shadow: 0 2px 8px rgba(0,0,0,0.4);
            --shadow-lg: 0 4px 16px rgba(0,0,0,0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-family);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            transition: var(--transition);
        }

        /* ========== SCROLLBAR ========== */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

        /* ========== LAYOUT ========== */
        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* ========== SIDEBAR ========== */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--surface);
            border-right: 1px solid var(--border);
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
            box-shadow: var(--shadow);
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .sidebar-logo {
            width: 60px;
            height: 60px;
            margin-bottom: 10px;
        }

        .sidebar-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--primary);
            line-height: 1.3;
        }

        .sidebar-subtitle {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .nav-section {
            margin-bottom: 16px;
        }

        .nav-section-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
            padding: 8px 12px;
            letter-spacing: 1px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            color: var(--text);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            position: relative;
        }

        .nav-item:hover {
            background: rgba(25, 118, 210, 0.08);
            color: var(--primary);
        }

        .nav-item.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 8px rgba(25, 118, 210, 0.3);
        }

        .nav-item .icon {
            font-size: 20px;
            width: 24px;
            text-align: center;
        }

        .nav-item .badge {
            position: absolute;
            right: 12px;
            background: var(--error);
            color: white;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 600;
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
        }

        .user-info:hover {
            background: rgba(0,0,0,0.05);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
        }

        .user-details {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-role {
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* ========== MAIN CONTENT ========== */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            transition: var(--transition);
        }

        /* ========== HEADER ========== */
        .header {
            background: var(--surface);
            height: var(--header-height);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 16px;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: var(--shadow);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text);
            padding: 4px;
        }

        .breadcrumb {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .breadcrumb span {
            color: var(--text);
            font-weight: 600;
        }

        .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-btn {
            background: none;
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 18px;
            color: var(--text);
            transition: var(--transition);
            position: relative;
        }

        .header-btn:hover {
            background: rgba(0,0,0,0.05);
        }

        .header-btn .count {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--error);
            color: white;
            font-size: 10px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .online-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            display: inline-block;
            margin-right: 4px;
        }

        .online-indicator.offline {
            background: var(--error);
        }

        /* ========== PAGE CONTENT ========== */
        .page-content {
            padding: 24px;
            min-height: calc(100vh - var(--header-height));
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
        }

        .page-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* ========== CARDS ========== */
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: var(--transition);
        }

        .card:hover {
            box-shadow: var(--shadow-lg);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
        }

        /* ========== STATS GRID ========== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 16px;
            transition: var(--transition);
            cursor: pointer;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .stat-icon {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .stat-icon.blue { background: rgba(25,118,210,0.1); color: var(--primary); }
        .stat-icon.green { background: rgba(76,175,80,0.1); color: var(--success); }
        .stat-icon.orange { background: rgba(255,152,0,0.1); color: var(--warning); }
        .stat-icon.red { background: rgba(244,67,54,0.1); color: var(--error); }
        .stat-icon.purple { background: rgba(156,39,176,0.1); color: #9C27B0; }

        .stat-info h3 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
        }

        .stat-info p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* ========== TABLES ========== */
        .table-container {
            overflow-x: auto;
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: var(--bg);
            padding: 14px 16px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
        }

        td {
            padding: 12px 16px;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
        }

        tr:hover td {
            background: rgba(25,118,210,0.02);
        }

        /* ========== BUTTONS ========== */
        .btn {
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-family: var(--font-family);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            box-shadow: 0 4px 12px rgba(25,118,210,0.3);
        }

        .btn-success { background: var(--success); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-error { background: var(--error); color: white; }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover {
            background: rgba(0,0,0,0.05);
        }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        .btn-lg { padding: 14px 28px; font-size: 16px; }

        /* ========== FORMS ========== */
        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
        }

        input, textarea, select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: var(--font-family);
            background: var(--surface);
            color: var(--text);
            transition: var(--transition);
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(25,118,210,0.1);
        }

        /* ========== BADGES ========== */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-success { background: rgba(76,175,80,0.1); color: var(--success); }
        .badge-warning { background: rgba(255,152,0,0.1); color: var(--warning); }
        .badge-error { background: rgba(244,67,54,0.1); color: var(--error); }
        .badge-info { background: rgba(33,150,243,0.1); color: var(--info); }
        .badge-primary { background: rgba(25,118,210,0.1); color: var(--primary); }

        /* ========== MODAL ========== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s;
        }

        .modal {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        /* ========== TOAST ========== */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 300;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            color: white;
            font-size: 14px;
            font-weight: 500;
            box-shadow: var(--shadow-lg);
            animation: slideInRight 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 300px;
        }

        /* ========== SEARCH ========== */
        .search-box {
            position: relative;
            flex: 1;
            max-width: 400px;
        }

        .search-box input {
            padding-left: 40px;
            background: var(--bg);
            border: 1px solid var(--border);
        }

        .search-box .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 18px;
        }

        /* ========== PAGINATION ========== */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
        }

        .pagination button {
            padding: 8px 14px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition);
        }

        .pagination button:hover:not(:disabled) {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination button.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* ========== EMPTY STATE ========== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: var(--text);
        }

        .empty-state p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* ========== ANIMATIONS ========== */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 1024px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
            }

            .menu-toggle {
                display: block;
            }

            .stats-grid {
                grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .page-content {
                padding: 16px;
            }

            .page-title {
                font-size: 20px;
            }

            .stats-grid {
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }

            .stat-card {
                padding: 14px;
            }

            .stat-icon {
                width: 44px;
                height: 44px;
                font-size: 22px;
            }

            .stat-info h3 {
                font-size: 22px;
            }

            .header {
                padding: 0 16px;
            }

            .search-box {
                max-width: 200px;
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        /* ========== PRINT ========== */
        @media print {
            .sidebar, .header, .btn, .no-print {
                display: none !important;
            }
            .main-content {
                margin-left: 0;
            }
            .card {
                box-shadow: none;
                border: 1px solid #ddd;
            }
        }
    </style>
</head>
<body>
    <!-- ========== APP CONTAINER ========== -->
    <div class="app-container">
        
        <!-- ========== SIDEBAR ========== -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="/icons/icon-192x192.png" alt="Logo" class="sidebar-logo">
                <div class="sidebar-title">Arsip Surat Digital</div>
                <div class="sidebar-subtitle">Enterprise v30.1.0</div>
            </div>
            
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title" data-i18n="menu_utama">Menu Utama</div>
                    <a href="/" class="nav-item active" data-page="dashboard" onclick="navigateTo('dashboard')">
                        <span class="icon">📊</span>
                        <span data-i18n="dashboard">Dashboard</span>
                    </a>
                    <a href="/surat-masuk" class="nav-item" data-page="surat-masuk" onclick="navigateTo('surat-masuk')">
                        <span class="icon">📨</span>
                        <span data-i18n="surat_masuk">Surat Masuk</span>
                        <span class="badge" id="sm-count">0</span>
                    </a>
                    <a href="/surat-keluar" class="nav-item" data-page="surat-keluar" onclick="navigateTo('surat-keluar')">

                        <span data-i18n="surat_keluar">Surat Keluar</span>
                        <span class="badge" id="sk-count">0</span>
                    </a>
                </div>
                
                <div class="nav-section">
                    <div class="nav-section-title" data-i18n="menu_proses">Proses</div>
                    <a href="/disposisi" class="nav-item" data-page="disposisi" onclick="navigateTo('disposisi')">
                        <span class="icon">📋</span>
                        <span data-i18n="disposisi">Disposisi</span>
                        <span class="badge" id="disp-count">0</span>
                    </a>
                    <a href="/approval" class="nav-item" data-page="approval" onclick="navigateTo('approval')">
                        <span class="icon">✅</span>
                        <span data-i18n="approval">Approval</span>
                        <span class="badge" id="appr-count">0</span>
                    </a>
                </div>
                
                <div class="nav-section">
                    <div class="nav-section-title" data-i18n="menu_lainnya">Lainnya</div>
                    <a href="/arsip" class="nav-item" data-page="arsip" onclick="navigateTo('arsip')">
                        <span class="icon">🗄️</span>
                        <span data-i18n="arsip">Arsip</span>
                    </a>
                    <a href="/laporan" class="nav-item" data-page="laporan" onclick="navigateTo('laporan')">
                        <span class="icon">📈</span>
                        <span data-i18n="laporan">Laporan</span>
                    </a>
                    <a href="/pengaturan" class="nav-item" data-page="pengaturan" onclick="navigateTo('pengaturan')">
                        <span class="icon">⚙️</span>
                        <span data-i18n="pengaturan">Pengaturan</span>
                    </a>
                </div>
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-info" id="userInfo">
                    <div class="user-avatar" id="userAvatar">A</div>
                    <div class="user-details">
                        <div class="user-name" id="userName">Administrator</div>
                        <div class="user-role" id="userRole">Admin</div>
                    </div>
                    <button class="header-btn" onclick="APP.auth.logout()" title="Logout">🚪</button>
                </div>
            </div>

        // ========== NAVIGATION ==========

        function navigateTo(page, params = {}) {
            currentPage = page;

            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.page === page) item.classList.add('active');
            });
            
            // Update breadcrumb
            const breadcrumbMap = {
                'dashboard': 'Dashboard',
                'surat-masuk': 'Surat Masuk',
                'surat-keluar': 'Surat Keluar',
                'disposisi': 'Disposisi',
                'approval': 'Approval',
                'arsip': 'Arsip',
                'laporan': 'Laporan',
                'pengaturan': 'Pengaturan',
                'notifikasi': 'Notifikasi',
            };
            document.querySelector('.breadcrumb span').textContent = breadcrumbMap[page] || page;
            
            // Load page content
            loadPage(page, params);
            
            // Update URL hash
            window.location.hash = page;
            
            // Close sidebar on mobile
            if (window.innerWidth <= 1024) {
                document.getElementById('sidebar').classList.remove('open');
            }
        }
        
        // ========== LOAD PAGE ==========
        async function loadPage(page, params = {}) {
            const content = document.getElementById('pageContent');
            
            // Show loading
            showLoading(true);
            
            try {
                switch(page) {
                    case 'dashboard':
                        content.innerHTML = await renderDashboard();
                        await loadDashboardData();
                        break;
                    case 'surat-masuk':
                        content.innerHTML = await renderSuratMasuk();
                        await loadSuratMasukData(params);
                        break;
                    case 'surat-keluar':
                        content.innerHTML = await renderSuratKeluar();
                        await loadSuratKeluarData(params);
                        break;
                    case 'disposisi':
                        content.innerHTML = await renderDisposisi();
                        await loadDisposisiData(params);
                        break;
                    case 'approval':
                        content.innerHTML = await renderApproval();
                        await loadApprovalData(params);
                        break;
                    case 'arsip':
                        content.innerHTML = await renderArsip();
                        break;
                    case 'laporan':
                        content.innerHTML = await renderLaporan();
                        break;
                    case 'pengaturan':
                        content.innerHTML = await renderPengaturan();
                        await loadPengaturanData();
                        break;
                    case 'notifikasi':
                        content.innerHTML = await renderNotifikasi();
                        await loadNotifikasiData();
                        break;
                    default:
                        content.innerHTML = `
                            <div class="empty-state">
                                <div class="icon">🔍</div>

                content.innerHTML = `

                        <div class="icon">❌</div>
                        <h3>Gagal Memuat Halaman</h3>
                        <p>${error.message}</p>
                        <button class="btn btn-primary" onclick="navigateTo('dashboard')" style="margin-top:16px;">Kembali ke Dashboard</button>
                    </div>
                `;
            }
            
            showLoading(false);
        }
        
        // ========== API HELPER ==========
        async function apiCall(action, params = {}, method = 'GET') {
            const url = new URL(API_URL);
            url.searchParams.set('action', action);
            
            const token = localStorage.getItem('token');
            if (token) url.searchParams.set('token', token);
            
            Object.entries(params).forEach(([k, v]) => {
                if (v !== undefined && v !== null && v !== '') {
                    url.searchParams.set(k, v);
                }
            });
            
            try {
                const options = { method };
                if (method === 'POST') {
                    options.headers = { 'Content-Type': 'application/json' };
                    options.body = JSON.stringify(params);
                    // Remove params from URL for POST
                    Object.keys(params).forEach(k => url.searchParams.delete(k));
                }
                
                const response = await fetch(url.toString(), options);
                const data = await response.json();
                
                if (data.code === 401) {
                    APP.auth.logout();
                    throw new Error('Sesi habis, silakan login kembali');
                }
                
                return data;
            } catch (error) {
                console.error('API Error:', error);
                throw error;
            }
        }

        async function loadDashboardData() {
            try {
                // Load stats
                const statsRes = await apiCall('dashboard.stats');
                if (statsRes.status === 'success') {
                    document.getElementById('stat-sm-total').textContent = statsRes.data.suratMasuk?.total || 0;
                    document.getElementById('stat-sk-total').textContent = statsRes.data.suratKeluar?.total || 0;
                    document.getElementById('stat-disp-pending').textContent = statsRes.data.disposisi?.pending || 0;
                    document.getElementById('stat-appr-pending').textContent = statsRes.data.suratKeluar?.pending || 0;

                // Load chart
                await loadChartData(2026);
                
                // Load recent activities
                const auditRes = await apiCall('auditLog.list', { limit: 10 });

                    const tbody = document.getElementById('recentActivities');
                    if (auditRes.data.items.length === 0) {

                    }
                }
                
                // Update sidebar counts
                await updateSidebarCounts();
                
            } catch (error) {

            }
        }
        
        async function loadChartData(year) {
            try {
                const res = await apiCall('dashboard.chart', { year });
                if (res.status === 'success') {
                    // Simple bar chart using CSS (atau gunakan Chart.js jika tersedia)
                    const canvas = document.getElementById('chartSurat');
                    if (canvas) {
                        const ctx = canvas.getContext('2d');
                        const datasets = res.data.datasets;
                        
                        // Clear canvas
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        
                        const barWidth = 30;
                        const gap = 10;
                        const maxVal = Math.max(
                            ...datasets[0]?.data || [0],
                            ...datasets[1]?.data || [0]
                        ) || 1;
                        
                        canvas.width = canvas.parentElement.clientWidth - 40;
                        
                        datasets[0]?.data?.forEach((val, i) => {
                            const x = i * (barWidth * 2 + gap * 3) + 50;
                            const h1 = (val / maxVal) * (canvas.height - 80);
                            const h2 = ((datasets[1]?.data?.[i] || 0) / maxVal) * (canvas.height - 80);
                            
                            // Bar Surat Masuk
                            ctx.fillStyle = '#1976D2';
                            ctx.fillRect(x, canvas.height - h1 - 40, barWidth, h1);
                            
                            // Bar Surat Keluar
                            ctx.fillStyle = '#388E3C';
                            ctx.fillRect(x + barWidth + gap, canvas.height - h2 - 40, barWidth, h2);
                            
                            // Label
                            ctx.fillStyle = document.documentElement.getAttribute('data-theme') === 'dark' ? '#FFF' : '#333';
                            ctx.font = '11px Inter, sans-serif';
                            ctx.textAlign = 'center';
                            ctx.fillText(['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'][i], x + barWidth, canvas.height - 10);
                        });
                    }
                }
            } catch (error) {
                console.error('Error loading chart:', error);
            }
        }

        }
        
        let smCurrentPage = 1;
        
        async function loadSuratMasukData(params = {}) {
            try {
                const search = document.getElementById('smSearch')?.value || '';
                const status = document.getElementById('smStatus')?.value || '';
                const sifat = document.getElementById('smSifat')?.value || '';
                
                const res = await apiCall('suratMasuk.list', {
                    page: smCurrentPage,
                    limit: 20,
                    search: search || undefined,
                    status: status || undefined,
                    sifat: sifat || undefined,
                    ...params
                });
                
                if (res.status === 'success') {
                    const tbody = document.getElementById('smTableBody');
                    const items = res.data.items;
                    
                    if (!items || items.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state"><div class="icon">📭</div><h3>Tidak ada surat masuk</h3><p>Belum ada data surat masuk</p></div></td></tr>';
                    } else {
                        tbody.innerHTML = items.map(item => `
                            <tr>
                                <td><strong>${item.nomorAgenda || '-'}</strong></td>
                                <td>${item.nomorSurat || '-'}</td>
                                <td>${item.tanggalSurat ? new Date(item.tanggalSurat).toLocaleDateString('id-ID') : '-'}</td>
                                <td>${item.pengirim || '-'}</td>
                                <td>${item.perihal || '-'}</td>
                                <td><span class="badge badge-${item.sifat === 'rahasia' ? 'error' : item.sifat === 'penting' ? 'warning' : item.sifat === 'segera' ? 'info' : 'success'}">${item.sifat || 'biasa'}</span></td>
                                <td><span class="badge badge-${item.status === 'selesai' ? 'success' : item.status === 'diproses' ? 'warning' : 'info'}">${item.status || 'diterima'}</span></td>
                                <td>${(item.aiTags || []).map(t => `<span class="badge badge-primary" style="margin:2px;">${t}</span>`).join('') || '-'}</td>
                                <td>
                                    <button class="btn btn-outline btn-sm" onclick="viewSuratMasuk('${item.id}')">👁️</button>
                                    <button class="btn btn-outline btn-sm" onclick="editSuratMasuk('${item.id}')">✏️</button>
                                    <button class="btn btn-outline btn-sm" onclick="deleteSuratMasuk('${item.id}')" style="color:var(--error);">🗑️</button>
                                </td>
                            </tr>
                        `).join('');
                    }
                    
                    // Pagination
                    renderPagination('smPagination', res.data.pagination, (page) => {
                        smCurrentPage = page;
                        loadSuratMasukData();
                    });
                }
            } catch (error) {
                console.error('Error loading surat masuk:', error);
            }
        }

        async function saveSuratMasuk(event) {
            event.preventDefault();

            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            
            showLoading(true);
            try {
                const res = await apiCall('suratMasuk.create', data, 'POST');
                if (res.status === 'success') {
                    showToast('Surat masuk berhasil disimpan', 'success');
                    form.closest('.modal-overlay').remove();
                    await loadSuratMasukData();
                } else {
                    showToast('Gagal: ' + res.message, 'error');

                showToast('Error: ' + error.message, 'error');
            }
            showLoading(false);
        }

        async function exportData(format) {
            showLoading(true);
            try {
                const res = await apiCall('export.all');
                if (res.status === 'success') {
                    if (format === 'csv') {
                        // Convert to CSV dan download
                        let csv = '';
                        Object.entries(res.data.data).forEach(([key, value]) => {
                            csv += `\n=== ${key} ===\n`;
                            if (value.headers) {
                                csv += value.headers.join(',') + '\n';
                                value.rows.forEach(row => {
                                    csv += row.map(cell => `"${cell}"`).join(',') + '\n';
                                });
                            }
                        });
                        const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        a.download = `export_arsip_${new Date().toISOString().split('T')[0]}.csv`;
                        a.click();
                    } else {
                        const blob = new Blob([JSON.stringify(res.data, null, 2)], { type: 'application/json' });
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        a.download = `export_arsip_${new Date().toISOString().split('T')[0]}.json`;
                        a.click();
                    }
                    showToast('Export berhasil', 'success');
                }
            } catch (error) {
                showToast('Export gagal: ' + error.message, 'error');
            }
            showLoading(false);
        }

        // ========== HELPERS ==========
        function showLoading(show) {

        function showToast(msg, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = type === 'success' ? '#4CAF50' : type === 'error' ? '#F44336' : type === 'warning' ? '#FF9800' : '#2196F3';
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }
        
        function renderPagination(containerId, pagination, callback) {
            const container = document.getElementById(containerId);
            if (!container || !pagination || pagination.totalPages <= 1) {
                if (container) container.innerHTML = '';
                return;
            }
            
            let html = '';
            html += `<button ${pagination.hasPrev ? '' : 'disabled'} onclick="void(0)" data-page="${pagination.page - 1}">«</button>`;
            
            for (let i = 1; i <= pagination.totalPages; i++) {
                if (i === 1 || i === pagination.totalPages || (i >= pagination.page - 2 && i <= pagination.page + 2)) {
                    html += `<button class="${i === pagination.page ? 'active' : ''}" data-page="${i}">${i}</button>`;
                } else if (i === pagination.page - 3 || i === pagination.page + 3) {
                    html += `<button disabled>...</button>`;
                }
            }
            
            html += `<button ${pagination.hasNext ? '' : 'disabled'} data-page="${pagination.page + 1}">»</button>`;
            
            container.innerHTML = html;
            
            container.querySelectorAll('button:not([disabled])').forEach(btn => {
                btn.addEventListener('click', () => callback(parseInt(btn.dataset.page)));
            });
        }

            document.getElementById('sidebar').classList.toggle('open');

                    apiCall('suratMasuk.list', { limit: 1 }),
                    apiCall('suratKeluar.list', { limit: 1 }),
                    apiCall('disposisi.list', { limit: 1 }),
                    apiCall('approval.list', { limit: 1 }),
                    apiCall('notifikasi.unreadCount'),
                ]);
                
                document.getElementById('sm-count').textContent = smRes.data?.pagination?.total || 0;
                document.getElementById('sk-count').textContent = skRes.data?.pagination?.total || 0;
                document.getElementById('disp-count').textContent = dispRes.data?.pagination?.total || 0;
                document.getElementById('appr-count').textContent = apprRes.data?.items?.length || 0;
                
                const unread = notifRes.data?.count || 0;
                const notifCount = document.getElementById('notifCount');
                if (unread > 0) {
                    notifCount.style.display = 'flex';
                    notifCount.textContent = unread > 99 ? '99+' : unread;
                } else {
                    notifCount.style.display = 'none';
                }
            } catch (error) {
                console.error('Error updating counts:', error);
            }
        }
        
        function handleGlobalSearch(event) {
            if (event.key === 'Enter') {
                const query = event.target.value.trim();
                if (query) {
                    navigateTo('surat-masuk', { search: query });
                }
            }
        }
        
        // ========== ONLINE/OFFLINE ==========
        function updateOnlineStatus() {
            const indicator = document.getElementById('onlineIndicator');
            if (navigator.onLine) {
                indicator.className = 'online-indicator';
                indicator.title = 'Online';
            } else {
                indicator.className = 'online-indicator offline';
                indicator.title = 'Offline';
            }
        }
        
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        
        // ========== KEYBOARD SHORTCUTS ==========
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                switch(e.key) {
                    case '1': e.preventDefault(); navigateTo('dashboard'); break;
                    case '2': e.preventDefault(); navigateTo('surat-masuk'); break;
                    case '3': e.preventDefault(); navigateTo('surat-keluar'); break;
                    case '4': e.preventDefault(); navigateTo('disposisi'); break;
                    case '5': e.preventDefault(); navigateTo('approval'); break;
                    case 'd': e.preventDefault(); APP.theme.toggle(); break;
                }
            }
        });
        
        // ========== INITIALIZATION ==========
        async function init() {
            console.log('🚀 Initializing Arsip Surat Digital Enterprise v30.1.0');
            
            // Check auth
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/login.html';
                return;
            }
            
            // Verify token
            try {
                const res = await apiCall('me');
                if (res.status === 'success' && res.data) {
                    const user = res.data;
                    document.getElementById('userName').textContent = user.namaLengkap || user.username;
                    document.getElementById('userRole').textContent = user.role || 'User';
                    document.getElementById('userAvatar').textContent = (user.namaLengkap || user.username || 'A').charAt(0).toUpperCase();
                }
            } catch (error) {
                console.error('Auth check failed:', error);
                window.location.href = '/login.html';
                return;
            }
            
            // Update online status
            updateOnlineStatus();
            
            // Load initial page
            const hash = window.location.hash.replace('#', '');
            if (hash) {
                navigateTo(hash);
            } else {
                navigateTo('dashboard');
            }
            
            // Update sidebar counts
            await updateSidebarCounts();
            
            // Update theme icon
            updateThemeIcon();
            
            // Update language flag
            updateLangFlag();
            
            console.log('✅ Application initialized');
        }
        
        function updateThemeIcon() {
            const icon = document.getElementById('themeIcon');
            if (icon) {
                icon.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
            }
        }
        
        function updateLangFlag() {
            const flag = document.getElementById('langFlag');
            if (flag) {
                flag.textContent = APP.lang === 'id' ? '🇮🇩' : '🇬🇧';
            }
        }
        
        // Handle hash changes
        window.addEventListener('hashchange', () => {
            const hash = window.location.hash.replace('#', '');
            if (hash && hash !== currentPage) {
                navigateTo(hash);
            }
        });
        
        // Start app
        init();
        
        console.log('✅ index.html v30.1.0 loaded successfully');
    </script>
</body>
</html>
