<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Arsip Surat Digital Enterprise</title>
    <meta name="description" content="Login ke Sistem Arsip Surat Digital Enterprise">
    <meta name="theme-color" content="#007bff">
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="../../public/assets/images/favicon.svg">
    <link rel="apple-touch-icon" href="../../public/assets/images/icon-192x192.png">
    
    <!-- Stylesheets -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../../public/css/app.css" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        
        .auth-container {
            width: 100%;
            max-width: 440px;
        }
        
        .auth-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        .auth-header {
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            color: white;
            padding: 35px 30px;
            text-align: center;
        }
        
        .auth-header .logo {
            width: 60px;
            height: 60px;
            margin-bottom: 15px;
            background: white;
            border-radius: 15px;
            padding: 10px;
        }
        
        .auth-header h4 {
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .auth-header p {
            opacity: 0.8;
            font-size: 0.9rem;
            margin-bottom: 0;
        }
        
        .auth-body {
            padding: 35px 30px;
        }
        
        .form-label {
            font-weight: 600;
            color: #333;
            font-size: 0.9rem;
        }
        
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s;
            font-size: 0.95rem;
        }
        
        .form-control:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.15);
        }
        
        .input-group-text {
            background: transparent;
            border: 2px solid #e0e0e0;
            border-right: none;
            color: #999;
        }
        
        .input-group .form-control {
            border-left: none;
        }
        
        .input-group .btn-outline-secondary {
            border: 2px solid #e0e0e0;
            border-left: none;
        }
        
        .btn-primary {
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            font-size: 1rem;
            background: linear-gradient(135deg, #007bff, #0056b3);
            border: none;
            transition: all 0.3s;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 123, 255, 0.3);
        }
        
        .btn-primary:disabled {
            opacity: 0.7;
            transform: none;
        }
        
        .alert {
            border-radius: 10px;
            border: none;
        }
        
        .auth-footer {
            text-align: center;
            padding: 0 30px 30px;
        }
        
        .auth-footer a {
            color: #007bff;
            text-decoration: none;
            font-weight: 600;
        }
        
        .auth-footer a:hover {
            text-decoration: underline;
        }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 0.9rem;
        }
        
        .back-link:hover {
            color: white;
        }
        
        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .loading-content {
            background: white;
            border-radius: 15px;
            padding: 30px 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        
        .loading-content .spinner-border {
            width: 3rem;
            height: 3rem;
        }
        
        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .auth-card {
            animation: fadeInUp 0.5s ease-out;
        }
        
        @media (max-width: 480px) {
            .auth-body { padding: 25px 20px; }
            .auth-header { padding: 25px 20px; }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <!-- Header -->
            <div class="auth-header">
                <img src="../../public/assets/images/logo.svg" alt="Logo" class="logo">
                <h4>Arsip Surat Digital</h4>
                <p>Masuk ke akun Anda</p>
            </div>
            
            <!-- Body -->
            <div class="auth-body">
                <!-- Alert Container -->
                <div id="alertContainer"></div>
                
                <!-- Login Form -->
                <form id="loginForm" onsubmit="return handleLogin(event)" autocomplete="off">
                    <!-- Email -->
                    <div class="mb-3">
                        <label for="email" class="form-label">Alamat Email</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-envelope"></i>
                            </span>
                            <input 
                                type="email" 
                                class="form-control" 
                                id="email" 
                                placeholder="nama@email.com"
                                required 
                                autofocus
                            >
                        </div>
                    </div>
                    
                    <!-- Password -->
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-lock"></i>
                            </span>
                            <input 
                                type="password" 
                                class="form-control" 
                                id="password" 
                                placeholder="Masukkan password"
                                required 
                                minlength="6"
                            >
                            <button 
                                class="btn btn-outline-secondary" 
                                type="button" 
                                onclick="togglePassword()"
                                tabindex="-1"
                            >
                                <i class="bi bi-eye" id="toggleIcon"></i>
                            </button>
                        </div>
                    </div>
                    
                    <!-- Remember Me -->
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="rememberMe">
                        <label class="form-check-label" for="rememberMe">
                            Ingat saya di perangkat ini
                        </label>
                    </div>
                    
                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-primary w-100 mb-3" id="btnLogin">
                        <i class="bi bi-box-arrow-in-right me-2"></i>
                        <span id="btnText">Masuk</span>
                    </button>
                    
                    <!-- Forgot Password -->
                    <div class="text-center mb-2">
                        <a href="forgot-password.html" class="text-decoration-none">
                            <small>Lupa password?</small>
                        </a>
                    </div>
                    
                    <!-- Register Link -->
                    <div class="text-center">
                        <small class="text-muted">
                            Belum punya akun? 
                            <a href="register.html" class="fw-bold">Daftar sekarang</a>
                        </small>
                    </div>
                </form>
            </div>
        </div>
        
        <!-- Back to Home -->
        <a href="../../index.html" class="back-link">
            <i class="bi bi-arrow-left me-1"></i> Kembali ke Beranda
        </a>
    </div>
    
    <!-- Scripts -->
    <script src="../../public/js/api.js"></script>
    <script>
        // ============================================
        // Login Handler
        // ============================================
        
        const API_URL = 'https://script.google.com/macros/s/AKfycbwblauw29Cv8rmrjQHhfXgdl0csBHlxO3xvZJimyBsSyA4F5f9qH25Ej5QYIu--OGy6Bw/exec';
        
        // Cek jika sudah login
        (function() {
            const token = localStorage.getItem('token');
            if (token) {
                window.location.href = '../dashboard/index.html';
            }
            
            // Load saved email
            const savedEmail = localStorage.getItem('savedEmail');
            if (savedEmail) {
                document.getElementById('email').value = savedEmail;
                document.getElementById('rememberMe').checked = true;
            }
        })();
        
        /**
         * Handle form login
         */
        async function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            
            // Validasi dasar
            if (!email || !password) {
                showAlert('Email dan password harus diisi', 'warning');
                return false;
            }
            
            if (password.length < 6) {
                showAlert('Password minimal 6 karakter', 'warning');
                return false;
            }
            
            // Tampilkan loading
            showLoading();
            
            try {
                // Panggil Google Apps Script API
                const formData = new URLSearchParams();
                formData.append('data', JSON.stringify({
                    action: 'login',
                    email: email,
                    password: password
                }));
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData.toString()
                });
                
                const result = await response.json();
                
                hideLoading();
                
                if (result.status === 'success') {
                    // Simpan token dan user data
                    localStorage.setItem('token', result.token);
                    localStorage.setItem('user', JSON.stringify(result.user));
                    
                    // Simpan email jika remember me
                    if (rememberMe) {
                        localStorage.setItem('savedEmail', email);
                    } else {
                        localStorage.removeItem('savedEmail');
                    }
                    
                    // Tampilkan pesan sukses
                    showAlert('Login berhasil! Mengalihkan...', 'success');
                    
                    // Redirect ke dashboard
                    setTimeout(() => {
                        window.location.href = '../dashboard/index.html';
                    }, 1000);
                    
                } else {
                    showAlert(result.message || 'Email atau password salah', 'danger');
                }
                
            } catch (error) {
                hideLoading();
                console.error('Login error:', error);
                showAlert('Gagal terhubung ke server. Silakan coba lagi.', 'danger');
            }
            
            return false;
        }
        
        /**
         * Toggle password visibility
         */
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('bi-eye');
                toggleIcon.classList.add('bi-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('bi-eye-slash');
                toggleIcon.classList.add('bi-eye');
            }
        }
        
        /**
         * Tampilkan alert
         */
        function showAlert(message, type = 'info') {
            const container = document.getElementById('alertContainer');
            
            const icons = {
                success: 'check-circle',
                danger: 'exclamation-circle',
                warning: 'exclamation-triangle',
                info: 'info-circle'
            };
            
            container.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    <i class="bi bi-${icons[type]} me-2"></i>
                    <span>${message}</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            
            // Auto dismiss after 5 seconds
            setTimeout(() => {
                const alert = container.querySelector('.alert');
                if (alert) {
                    alert.classList.remove('show');
                    setTimeout(() => container.innerHTML = '', 300);
                }
            }, 5000);
        }
        
        /**
         * Tampilkan loading overlay
         */
        function showLoading() {
            const overlay = document.createElement('div');
            overlay.className = 'loading-overlay';
            overlay.id = 'loadingOverlay';
            overlay.innerHTML = `
                <div class="loading-content">
                    <div class="spinner-border text-primary mb-3" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mb-0 fw-semibold">Sedang memproses...</p>
                    <small class="text-muted">Mohon tunggu sebentar</small>
                </div>
            `;
            document.body.appendChild(overlay);
            
            // Disable button
            const btn = document.getElementById('btnLogin');
            btn.disabled = true;
            document.getElementById('btnText').textContent = 'Memproses...';
        }
        
        /**
         * Sembunyikan loading overlay
         */
        function hideLoading() {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) {
                overlay.remove();
            }
            
            // Enable button
            const btn = document.getElementById('btnLogin');
            btn.disabled = false;
            document.getElementById('btnText').textContent = 'Masuk';
        }
        
        // Keyboard shortcut: Enter to submit
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && document.activeElement.tagName !== 'BUTTON') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
        
        console.log('Login page ready');
    </script>
</body>
</html>
