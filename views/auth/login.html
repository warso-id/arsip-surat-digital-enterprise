<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Arsip Surat Digital Enterprise</title>
    <meta name="description" content="Login ke Sistem Arsip Surat Digital Enterprise">
    <meta name="theme-color" content="#007bff">
    <link rel="icon" type="image/svg+xml" href="../../public/assets/images/favicon.svg">
    <link rel="manifest" href="../../public/manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../../public/css/app.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            width: 100%;
            max-width: 450px;
        }
        .auth-header {
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .auth-body { padding: 40px; }
        .form-control { border-radius: 10px; padding: 12px; }
        .btn { border-radius: 10px; padding: 12px; font-weight: 600; }
        .spinner-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-header">
            <img src="../../public/assets/images/logo.svg" alt="Logo" width="50" class="mb-3">
            <h4>Arsip Surat Digital</h4>
            <p class="mb-0 small opacity-75">Sistem Manajemen Arsip Surat Enterprise</p>
        </div>
        <div class="auth-body">
            <div id="alertContainer"></div>
            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control" id="email" required autofocus>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-key"></i></span>
                        <input type="password" class="form-control" id="password" required>
                        <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="rememberMe">
                    <label class="form-check-label" for="rememberMe">Ingat saya</label>
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-3">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Login
                </button>
                <div class="text-center">
                    <a href="forgot-password.html" class="text-decoration-none">Lupa Password?</a>
                </div>
                <div class="text-center mt-2">
                    <small class="text-muted">Belum punya akun? <a href="register.html">Daftar</a></small>
                </div>
                <div class="text-center mt-3">
                    <a href="../../index.html" class="text-muted small"><i class="bi bi-arrow-left"></i> Kembali ke Beranda</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../public/js/api.js"></script>
    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwblauw29Cv8rmrjQHhfXgdl0csBHlxO3xvZJimyBsSyA4F5f9qH25Ej5QYIu--OGy6Bw/exec';
        
        async function handleLogin(e) {
            e.preventDefault();
            showLoading();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'login',
                        email: email,
                        password: password
                    })
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '../dashboard/index.html';
                } else {
                    showAlert(data.message || 'Login gagal', 'danger');
                }
            } catch (error) {
                showAlert('Gagal terhubung ke server. Coba lagi.', 'danger');
            } finally {
                hideLoading();
            }
            
            return false;
        }
        
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = event.target.closest('button').querySelector('i');
            input.type = input.type === 'password' ? 'text' : 'password';
            icon.classList.toggle('bi-eye');
            icon.classList.toggle('bi-eye-slash');
        }
        
        function showAlert(message, type) {
            document.getElementById('alertContainer').innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show">${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>`;
        }
        
        function showLoading() {
            const overlay = document.createElement('div');
            overlay.className = 'spinner-overlay';
            overlay.id = 'loadingOverlay';
            overlay.innerHTML = '<div class="text-center text-white"><div class="spinner-border mb-2"></div><p>Memproses...</p></div>';
            document.body.appendChild(overlay);
        }
        
        function hideLoading() {
            document.getElementById('loadingOverlay')?.remove();
        }
    </script>
</body>
</html>
