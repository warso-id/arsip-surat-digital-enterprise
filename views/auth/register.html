<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Arsip Surat Digital Enterprise</title>
    <meta name="description" content="Daftar akun baru Arsip Surat Digital Enterprise">
    <meta name="theme-color" content="#007bff">
    <meta name="robots" content="noindex, nofollow">
    
    <link rel="icon" type="image/svg+xml" href="../../public/assets/images/favicon.svg">
    <link rel="apple-touch-icon" href="../../public/assets/images/icon-192x192.png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../../public/css/app.css" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        
        .auth-container {
            width: 100%;
            max-width: 480px;
        }
        
        .auth-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: fadeInUp 0.5s ease-out;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .auth-header {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .auth-header .icon-circle {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 2rem;
        }
        
        .auth-header h4 {
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .auth-header p {
            opacity: 0.85;
            font-size: 0.9rem;
            margin-bottom: 0;
        }
        
        .auth-body {
            padding: 30px;
        }
        
        .form-label {
            font-weight: 600;
            color: #333;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
        
        .form-control {
            border-radius: 10px;
            padding: 11px 15px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s;
        }
        
        .form-control:focus {
            border-color: #28a745;
            box-shadow: 0 0 0 0.2rem rgba(40, 167, 69, 0.15);
        }
        
        .btn-success {
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            font-size: 1rem;
            background: linear-gradient(135deg, #28a745, #20c997);
            border: none;
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(40, 167, 69, 0.3);
        }
        
        .btn-success:disabled {
            opacity: 0.7;
            transform: none;
        }
        
        .password-strength {
            height: 5px;
            border-radius: 5px;
            margin-top: 5px;
            transition: all 0.3s;
        }
        
        .strength-weak { background: #dc3545; width: 25%; }
        .strength-fair { background: #ffc107; width: 50%; }
        .strength-good { background: #17a2b8; width: 75%; }
        .strength-strong { background: #28a745; width: 100%; }
        
        .loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .loading-content {
            background: white;
            border-radius: 15px;
            padding: 30px 40px;
            text-align: center;
        }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
        }
        
        .back-link:hover { color: white; }
        
        @media (max-width: 480px) {
            .auth-body { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="icon-circle">
                    <i class="bi bi-person-plus"></i>
                </div>
                <h4>Buat Akun Baru</h4>
                <p>Gratis, tidak perlu kartu kredit</p>
            </div>
            
            <div class="auth-body">
                <div id="alertContainer"></div>
                
                <form id="registerForm" onsubmit="return handleRegister(event)" autocomplete="off">
                    <!-- Nama Lengkap -->
                    <div class="mb-3">
                        <label for="nama_lengkap" class="form-label">Nama Lengkap *</label>
                        <input type="text" class="form-control" id="nama_lengkap" 
                               placeholder="Masukkan nama lengkap" required>
                    </div>
                    
                    <!-- Email -->
                    <div class="mb-3">
                        <label for="email" class="form-label">Alamat Email *</label>
                        <input type="email" class="form-control" id="email" 
                               placeholder="nama@email.com" required>
                    </div>
                    
                    <!-- Instansi -->
                    <div class="mb-3">
                        <label for="instansi" class="form-label">Instansi / Perusahaan</label>
                        <input type="text" class="form-control" id="instansi" 
                               placeholder="Nama instansi atau perusahaan">
                    </div>
                    
                    <!-- Password -->
                    <div class="mb-3">
                        <label for="password" class="form-label">Password *</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="password" 
                                   placeholder="Minimal 8 karakter" required minlength="8"
                                   oninput="checkPasswordStrength()">
                            <button class="btn btn-outline-secondary" type="button" 
                                    onclick="togglePassword('password', 'toggleIcon1')" tabindex="-1">
                                <i class="bi bi-eye" id="toggleIcon1"></i>
                            </button>
                        </div>
                        <div class="password-strength" id="passwordStrength"></div>
                        <small class="text-muted">
                            Gunakan minimal 8 karakter dengan kombinasi huruf besar, kecil, dan angka
                        </small>
                    </div>
                    
                    <!-- Konfirmasi Password -->
                    <div class="mb-3">
                        <label for="confirmPassword" class="form-label">Konfirmasi Password *</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="confirmPassword" 
                                   placeholder="Ulangi password" required>
                            <button class="btn btn-outline-secondary" type="button" 
                                    onclick="togglePassword('confirmPassword', 'toggleIcon2')" tabindex="-1">
                                <i class="bi bi-eye" id="toggleIcon2"></i>
                            </button>
                        </div>
                        <div id="passwordMatch" class="form-text"></div>
                    </div>
                    
                    <!-- Submit -->
                    <button type="submit" class="btn btn-success w-100 mb-3" id="btnRegister">
                        <i class="bi bi-person-plus me-2"></i>
                        <span id="btnText">Daftar Sekarang</span>
                    </button>
                    
                    <div class="text-center">
                        <small class="text-muted">
                            Sudah punya akun? 
                            <a href="login.html" class="fw-bold">Login di sini</a>
                        </small>
                    </div>
                </form>
            </div>
        </div>
        
        <a href="../../index.html" class="back-link">
            <i class="bi bi-arrow-left me-1"></i> Kembali ke Beranda
        </a>
    </div>
    
    <script src="../../public/js/api.js"></script>
    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwblauw29Cv8rmrjQHhfXgdl0csBHlxO3xvZJimyBsSyA4F5f9qH25Ej5QYIu--OGy6Bw/exec';
        
        // Cek jika sudah login
        if (localStorage.getItem('token')) {
            window.location.href = '../dashboard/index.html';
        }
        
        function checkPasswordStrength() {
            const password = document.getElementById('password').value;
            const strengthBar = document.getElementById('passwordStrength');
            
            let strength = 0;
            
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]+/)) strength++;
            if (password.match(/[A-Z]+/)) strength++;
            if (password.match(/[0-9]+/)) strength++;
            if (password.match(/[!@#$%^&*(),.?":{}|<>]+/)) strength++;
            
            strengthBar.className = 'password-strength';
            
            if (strength <= 2) {
                strengthBar.classList.add('strength-weak');
            } else if (strength === 3) {
                strengthBar.classList.add('strength-fair');
            } else if (strength === 4) {
                strengthBar.classList.add('strength-good');
            } else {
                strengthBar.classList.add('strength-strong');
            }
        }
        
        // Check password match
        document.getElementById('confirmPassword').addEventListener('input', function() {
            const password = document.getElementById('password').value;
            const confirm = this.value;
            const matchDiv = document.getElementById('passwordMatch');
            
            if (confirm.length === 0) {
                matchDiv.innerHTML = '';
            } else if (password === confirm) {
                matchDiv.innerHTML = '<span class="text-success"><i class="bi bi-check-circle"></i> Password cocok</span>';
            } else {
                matchDiv.innerHTML = '<span class="text-danger"><i class="bi bi-x-circle"></i> Password tidak cocok</span>';
            }
        });
        
        async function handleRegister(event) {
            event.preventDefault();
            
            const nama_lengkap = document.getElementById('nama_lengkap').value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const instansi = document.getElementById('instansi').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Validasi
            if (!nama_lengkap || !email || !password) {
                showAlert('Mohon isi semua field yang wajib', 'warning');
                return false;
            }
            
            if (nama_lengkap.length < 3) {
                showAlert('Nama lengkap minimal 3 karakter', 'warning');
                return false;
            }
            
            if (!email.includes('@') || !email.includes('.')) {
                showAlert('Format email tidak valid', 'warning');
                return false;
            }
            
            if (password.length < 8) {
                showAlert('Password minimal 8 karakter', 'warning');
                return false;
            }
            
            if (password !== confirmPassword) {
                showAlert('Password dan konfirmasi tidak cocok', 'warning');
                return false;
            }
            
            showLoading();
            
            try {
                const formData = new URLSearchParams();
                formData.append('data', JSON.stringify({
                    action: 'register',
                    nama_lengkap: nama_lengkap,
                    email: email,
                    password: password,
                    instansi: instansi
                }));
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData.toString()
                });
                
                const result = await response.json();
                
                hideLoading();
                
                if (result.status === 'success') {
                    showAlert('Pendaftaran berhasil! Silakan login.', 'success');
                    document.getElementById('registerForm').reset();
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    showAlert(result.message || 'Pendaftaran gagal', 'danger');
                }
                
            } catch (error) {
                hideLoading();
                showAlert('Gagal terhubung ke server. Coba lagi.', 'danger');
            }
            
            return false;
        }
        
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }
        
        function showAlert(message, type) {
            const icons = { success: 'check-circle', danger: 'exclamation-circle', warning: 'exclamation-triangle', info: 'info-circle' };
            document.getElementById('alertContainer').innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show">
                    <i class="bi bi-${icons[type]} me-2"></i>${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>`;
        }
        
        function showLoading() {
            const overlay = document.createElement('div');
            overlay.className = 'loading-overlay';
            overlay.id = 'loadingOverlay';
            overlay.innerHTML = `
                <div class="loading-content">
                    <div class="spinner-border text-success mb-3" role="status"></div>
                    <p class="mb-0 fw-semibold">Mendaftarkan akun...</p>
                    <small class="text-muted">Mohon tunggu sebentar</small>
                </div>`;
            document.body.appendChild(overlay);
            document.getElementById('btnRegister').disabled = true;
            document.getElementById('btnText').textContent = 'Memproses...';
        }
        
        function hideLoading() {
            document.getElementById('loadingOverlay')?.remove();
            document.getElementById('btnRegister').disabled = false;
            document.getElementById('btnText').textContent = 'Daftar Sekarang';
        }
        
        console.log('Register page ready');
    </script>
</body>
</html>
