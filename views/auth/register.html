<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Arsip Surat Digital Enterprise</title>
    <meta name="description" content="Daftar akun Arsip Surat Digital Enterprise">
    <meta name="theme-color" content="#007bff">
    <link rel="icon" type="image/svg+xml" href="../../public/assets/images/favicon.svg">
    <link rel="manifest" href="../../public/manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../../public/css/app.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            width: 100%;
            max-width: 500px;
        }
        .auth-header {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .auth-body { padding: 40px; }
        .form-control { border-radius: 10px; padding: 12px; }
        .btn { border-radius: 10px; padding: 12px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-header">
            <i class="bi bi-person-plus fs-1"></i>
            <h4>Daftar Akun</h4>
            <p class="mb-0 small opacity-75">Gratis, tidak perlu kartu kredit</p>
        </div>
        <div class="auth-body">
            <div id="alertContainer"></div>
            <form id="registerForm" onsubmit="return handleRegister(event)">
                <div class="mb-3">
                    <label class="form-label">Nama Lengkap</label>
                    <input type="text" class="form-control" id="nama_lengkap" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" required minlength="8">
                    <small class="text-muted">Minimal 8 karakter dengan huruf besar, kecil, dan angka</small>
                </div>
                <div class="mb-3">
                    <label class="form-label">Konfirmasi Password</label>
                    <input type="password" class="form-control" id="confirmPassword" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Instansi/Perusahaan</label>
                    <input type="text" class="form-control" id="instansi">
                </div>
                <button type="submit" class="btn btn-success w-100 mb-3">
                    <i class="bi bi-person-plus me-2"></i>Daftar Sekarang
                </button>
                <div class="text-center">
                    <small class="text-muted">Sudah punya akun? <a href="login.html">Login</a></small>
                </div>
                <div class="text-center mt-3">
                    <a href="../../index.html" class="text-muted small"><i class="bi bi-arrow-left"></i> Kembali ke Beranda</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../public/js/api.js"></script>
    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwblauw29Cv8rmrjQHhfXgdl0csBHlxO3xvZJimyBsSyA4F5f9qH25Ej5QYIu--OGy6Bw/exec';
        
        async function handleRegister(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                showAlert('Password dan konfirmasi tidak sama', 'danger');
                return false;
            }
            
            if (password.length < 8) {
                showAlert('Password minimal 8 karakter', 'danger');
                return false;
            }
            
            showLoading();
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'register',
                        nama_lengkap: document.getElementById('nama_lengkap').value.trim(),
                        email: document.getElementById('email').value.trim(),
                        password: password,
                        instansi: document.getElementById('instansi').value.trim()
                    })
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    showAlert('Registrasi berhasil! Silakan login.', 'success');
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    showAlert(data.message || 'Registrasi gagal', 'danger');
                }
            } catch (error) {
                showAlert('Gagal terhubung ke server', 'danger');
            } finally {
                hideLoading();
            }
            
            return false;
        }
        
        function showAlert(message, type) {
            document.getElementById('alertContainer').innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show">${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>`;
        }
        
        function showLoading() {
            const overlay = document.createElement('div');
            overlay.className = 'spinner-overlay';
            overlay.id = 'loadingOverlay';
            overlay.innerHTML = '<div class="text-center text-white"><div class="spinner-border mb-2"></div><p>Mendaftarkan...</p></div>';
            document.body.appendChild(overlay);
        }
        
        function hideLoading() {
            document.getElementById('loadingOverlay')?.remove();
        }
    </script>
</body>
</html>
