<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - Arsip Surat Digital Enterprise</title>
    <meta name="description" content="Reset password Arsip Surat Digital Enterprise">
    <meta name="theme-color" content="#007bff">
    <meta name="robots" content="noindex, nofollow">
    
    <link rel="icon" type="image/svg+xml" href="../../public/assets/images/favicon.svg">
    <link rel="apple-touch-icon" href="../../public/assets/images/icon-192x192.png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../../public/css/app.css" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        
        .auth-container { width: 100%; max-width: 440px; }
        
        .auth-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: fadeInUp 0.5s ease-out;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .auth-header {
            background: linear-gradient(135deg, #ffc107 0%, #fd7e14 100%);
            color: #333;
            padding: 30px;
            text-align: center;
        }
        
        .auth-header .icon-circle {
            width: 70px; height: 70px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 2rem;
        }
        
        .auth-body { padding: 30px; }
        
        .form-label { font-weight: 600; color: #333; font-size: 0.9rem; }
        
        .form-control {
            border-radius: 10px;
            padding: 11px 15px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s;
        }
        
        .form-control:focus {
            border-color: #ffc107;
            box-shadow: 0 0 0 0.2rem rgba(255, 193, 7, 0.15);
        }
        
        .btn-warning {
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            font-size: 1rem;
            background: linear-gradient(135deg, #ffc107, #fd7e14);
            border: none;
            color: #333;
        }
        
        .btn-warning:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 193, 7, 0.3);
        }
        
        .btn-warning:disabled { opacity: 0.7; transform: none; }
        
        .loading-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .loading-content {
            background: white;
            border-radius: 15px;
            padding: 30px 40px;
            text-align: center;
        }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
        }
        
        .back-link:hover { color: white; }
        
        .success-icon {
            font-size: 4rem;
            color: #28a745;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="icon-circle">
                    <i class="bi bi-question-circle"></i>
                </div>
                <h4>Lupa Password?</h4>
                <p>Masukkan email Anda untuk mereset password</p>
            </div>
            
            <div class="auth-body">
                <div id="alertContainer"></div>
                
                <!-- Form -->
                <form id="forgotForm" onsubmit="return handleForgotPassword(event)" style="display: block;">
                    <div class="mb-3">
                        <label for="email" class="form-label">Alamat Email Terdaftar</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" id="email" 
                                   placeholder="nama@email.com" required autofocus>
                        </div>
                        <small class="text-muted">
                            Kami akan mengirimkan link reset password ke email ini
                        </small>
                    </div>
                    
                    <button type="submit" class="btn btn-warning w-100 mb-3" id="btnSubmit">
                        <i class="bi bi-send me-2"></i>
                        <span id="btnText">Kirim Link Reset</span>
                    </button>
                    
                    <div class="text-center">
                        <a href="login.html" class="text-decoration-none">
                            <i class="bi bi-arrow-left me-1"></i>Kembali ke Login
                        </a>
                    </div>
                </form>
                
                <!-- Success Message (Hidden by default) -->
                <div id="successMessage" style="display: none; text-align: center;">
                    <div class="success-icon">
                        <i class="bi bi-check-circle-fill"></i>
                    </div>
                    <h5>Email Terkirim!</h5>
                    <p class="text-muted">
                        Link reset password telah dikirim ke <strong id="sentEmail"></strong>.
                        Silakan cek inbox atau folder spam Anda.
                    </p>
                    <a href="login.html" class="btn btn-primary mt-2">
                        <i class="bi bi-arrow-left me-1"></i>Kembali ke Login
                    </a>
                </div>
            </div>
        </div>
        
        <a href="../../index.html" class="back-link">
            <i class="bi bi-arrow-left me-1"></i> Kembali ke Beranda
        </a>
    </div>
    
    <script src="../../public/js/api.js"></script>
    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwblauw29Cv8rmrjQHhfXgdl0csBHlxO3xvZJimyBsSyA4F5f9qH25Ej5QYIu--OGy6Bw/exec';
        
        if (localStorage.getItem('token')) {
            window.location.href = '../dashboard/index.html';
        }
        
        async function handleForgotPassword(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value.trim().toLowerCase();
            
            if (!email || !email.includes('@')) {
                showAlert('Masukkan alamat email yang valid', 'warning');
                return false;
            }
            
            showLoading();
            
            try {
                const formData = new URLSearchParams();
                formData.append('data', JSON.stringify({
                    action: 'forgot_password',
                    email: email
                }));
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });
                
                const result = await response.json();
                
                hideLoading();
                
                // Tampilkan pesan sukses (baik berhasil maupun tidak, untuk keamanan)
                document.getElementById('forgotForm').style.display = 'none';
                document.getElementById('successMessage').style.display = 'block';
                document.getElementById('sentEmail').textContent = email;
                
            } catch (error) {
                hideLoading();
                // Tetap tampilkan sukses untuk keamanan
                document.getElementById('forgotForm').style.display = 'none';
                document.getElementById('successMessage').style.display = 'block';
                document.getElementById('sentEmail').textContent = email;
            }
            
            return false;
        }
        
        function showAlert(message, type) {
            const icons = { success: 'check-circle', danger: 'exclamation-circle', warning: 'exclamation-triangle' };
            document.getElementById('alertContainer').innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show">
                    <i class="bi bi-${icons[type]} me-2"></i>${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>`;
        }
        
        function showLoading() {
            const overlay = document.createElement('div');
            overlay.className = 'loading-overlay';
            overlay.id = 'loadingOverlay';
            overlay.innerHTML = `
                <div class="loading-content">
                    <div class="spinner-border text-warning mb-3" role="status"></div>
                    <p class="mb-0 fw-semibold">Mengirim link reset...</p>
                </div>`;
            document.body.appendChild(overlay);
            document.getElementById('btnSubmit').disabled = true;
            document.getElementById('btnText').textContent = 'Mengirim...';
        }
        
        function hideLoading() {
            document.getElementById('loadingOverlay')?.remove();
            document.getElementById('btnSubmit').disabled = false;
            document.getElementById('btnText').textContent = 'Kirim Link Reset';
        }
        
        console.log('Forgot password page ready');
    </script>
</body>
</html>
